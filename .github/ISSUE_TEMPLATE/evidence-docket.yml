name: Evidence Docket
about: Submit or review evidence for a claim.
title: "[Evidence Docket]: "
labels: [evidence, validator-review]
body:
  - type: input
    id: mission
    attributes:
      label: Mission ID
    validations:
      required: true
  - type: textarea
    id: claim
    attributes:
      label: Bounded claim
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Proof bundle links or hashes
    validations:
      required: true
  - type: textarea
    id: limitations
    attributes:
      label: Known limitations
    validations:
      required: true

  - type: checkboxes
    id: public_safe_boundary_v7
    attributes:
      label: Public-safe boundary confirmation
      options:
        - label: I confirm I am not submitting personal data, customer data, confidential data, regulated data, credentials, wallet information, private keys, seed phrases, payment information, trade secrets, proprietary data, or user funds.
          required: true
