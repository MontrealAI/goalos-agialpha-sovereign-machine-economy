name: GoalOS From Loop to RSI Governance Lab feedback
description: Report a public-safe issue or suggestion for the From Loop to RSI Governance Lab.
title: "[From Loop to RSI] "
labels: ["demo-feedback", "loop", "rsi", "public-alpha"]
body:
  - type: checkboxes
    id: boundary
    attributes:
      label: Public-safe confirmation
      options:
        - label: I confirm I am not submitting personal data, customer data, confidential data, regulated data, credentials, wallet information, private keys, seed phrases, payment information, trade secrets, proprietary data, or user funds.
          required: true
  - type: dropdown
    id: feedback_type
    attributes:
      label: Feedback type
      options:
        - Usability
        - Visual design
        - Decision-state logic
        - Downloaded artifact
        - Boundary / safety
        - Documentation
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Please keep this public-safe. Do not include secrets, personal data, wallet information, or private traces.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: false
