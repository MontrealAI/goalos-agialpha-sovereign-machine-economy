name: Claim Boundary Review
about: Flag language that may overstate evidence.
title: "[Claim Review]: "
labels: [claim-boundary, trust]
body:
  - type: textarea
    id: phrase
    attributes:
      label: Phrase or page to review
    validations:
      required: true
  - type: textarea
    id: concern
    attributes:
      label: Why it may exceed the evidence
    validations:
      required: true

  - type: checkboxes
    id: public_safe_boundary_v7
    attributes:
      label: Public-safe boundary confirmation
      options:
        - label: I confirm I am not submitting personal data, customer data, confidential data, regulated data, credentials, wallet information, private keys, seed phrases, payment information, trade secrets, proprietary data, or user funds.
          required: true
