name: Validator Review
description: Review an Evidence Docket without submitting private data
title: "Validator Review: "
labels: [validator-review, no-user-data]
body:
  - type: markdown
    attributes:
      value: |
        Do not submit personal data, customer data, confidential data, credentials, secrets, regulated data, or trade secrets. Public-safe review only.
  - type: input
    id: artifact
    attributes:
      label: Public artifact reviewed
      placeholder: e.g. evidence/proof-run-001/proof-run-001-docket.json
    validations:
      required: true
  - type: dropdown
    id: verdict
    attributes:
      label: Review verdict
      options: [accept, reject, revise, insufficient-evidence]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Public-safe review notes
      description: Do not include personal, confidential, regulated, credential, or private data.
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I did not include personal, confidential, customer, regulated, credential, or trade-secret data.
          required: true
        - label: My review is public-safe and does not disclose sensitive security details.
          required: true

  - type: checkboxes
    id: public_safe_boundary_v7
    attributes:
      label: Public-safe boundary confirmation
      options:
        - label: I confirm I am not submitting personal data, customer data, confidential data, regulated data, credentials, wallet information, private keys, seed phrases, payment information, trade secrets, proprietary data, or user funds.
          required: true
