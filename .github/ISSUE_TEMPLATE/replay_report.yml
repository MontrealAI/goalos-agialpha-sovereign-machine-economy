name: Replay report
description: Report whether you could reproduce an artifact or proof run
title: "Replay Report: "
labels: ["replay", "validation"]
body:
  - type: textarea
    id: command
    attributes:
      label: Commands run
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: Result
      options: [reproduced, partially reproduced, failed]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes

  - type: checkboxes
    id: public_safe_boundary_v7
    attributes:
      label: Public-safe boundary confirmation
      options:
        - label: I confirm I am not submitting personal data, customer data, confidential data, regulated data, credentials, wallet information, private keys, seed phrases, payment information, trade secrets, proprietary data, or user funds.
          required: true
