name: Website Experience OS feedback
description: Report navigation, usability, accessibility, or route-map issues.
title: "[Website OS] "
labels: ["website", "ux", "navigation", "public-alpha"]
body:
  - type: markdown
    attributes:
      value: |
        Do not submit personal data, customer data, confidential data, credentials, private keys, seed phrases, wallet information, or funds.
  - type: textarea
    id: page
    attributes:
      label: Page or route
      description: Which page, link, or route needs attention?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What happened?
      description: Describe the usability, navigation, accessibility, or content issue.
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Boundary confirmation
      options:
        - label: I did not include personal, customer, confidential, regulated, credential, wallet, private-key, seed-phrase, or trade-secret data.
          required: true
