name: Website Navigation Feedback
description: Public-alpha, claim-bounded issue template. Do not submit private data or funds.
title: "[website-navigation-feedback] "
labels: [public-alpha, human-review-required]
body:
  - type: markdown
    attributes:
      value: |
        Public-safe reminder: no personal, customer, confidential, regulated, credential, wallet, payment, private-key, seed-phrase, trade-secret, proprietary, or user-funds data. No funds. No wallet/private-key material. Human review required.
  - type: checkboxes
    id: boundary
    attributes:
      label: Required public-safe confirmation
      options:
        - label: "I confirm I am not submitting personal data, customer data, confidential data, regulated data, credentials, wallet information, private keys, seed phrases, payment information, trade secrets, proprietary data, or user funds."
          required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Describe the public-safe issue, feedback, review, or proposal.
    validations:
      required: true
  - type: textarea
    id: expected_outcome
    attributes:
      label: Expected outcome
      description: What would a good public-alpha, claim-bounded resolution look like?
    validations:
      required: true
