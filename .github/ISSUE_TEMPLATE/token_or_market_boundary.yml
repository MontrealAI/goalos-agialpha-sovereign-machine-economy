name: Token Or Market Boundary
description: Public-safe token or market boundary for GoalOS public-alpha.
title: "[Token Or Market Boundary] "
labels: ["public-alpha", "needs-human-review"]
body:
  - type: markdown
    attributes:
      value: |
        Public-safe reminder: do not paste private data, customer data, credentials, wallet information, private keys, seed phrases, payment details, trade secrets, proprietary data, or user funds. No funds. No wallet/private-key support. Human review required.
      description: "$AGIALPHA is not available from the repo/site/maintainers. No investment, trading, wallet, bridge, exchange, liquidity, support, or market requests. Third-party market questions are outside repository support; users are responsible for their own review."

  - type: checkboxes
    id: public_safe_confirmation
    attributes:
      label: Public-safe confirmation
      options:
        - label: "I am not submitting personal data, customer data, confidential data, regulated data, credentials, wallet information, private keys, seed phrases, payment information, trade secrets, or user funds."
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Use public-safe, synthetic, or already-public details only.
      placeholder: What should a maintainer or reviewer understand?
    validations:
      required: true
  - type: textarea
    id: expected_outcome
    attributes:
      label: Expected outcome
      description: What result would resolve this issue?
    validations:
      required: true
  - type: textarea
    id: boundary_notes
    attributes:
      label: Boundary notes
      description: Note any claim-boundary, no-data/no-funds, token-boundary, or human-review concern.
    validations:
      required: true

  - type: checkboxes
    id: public_safe_boundary_v7
    attributes:
      label: Public-safe boundary confirmation
      options:
        - label: I confirm I am not submitting personal data, customer data, confidential data, regulated data, credentials, wallet information, private keys, seed phrases, payment information, trade secrets, proprietary data, or user funds.
          required: true
