      - name: Install Loop Contract Lab
        shell: bash
        run: |
          set -euo pipefail
          python .goalos-loop-contract-lab-v1/scripts/install_loop_contract_lab_v1.py

      - name: Run deterministic demo reference
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_loop_contract_lab_v1_demo.py

      - name: Audit Loop Contract Lab
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile scripts/install_loop_contract_lab_v1.py scripts/run_loop_contract_lab_v1_demo.py scripts/goalos_loop_contract_lab_v1_audit.py
          node --check public/assets/goalos-loop-contract-lab-v1.js
          python scripts/goalos_loop_contract_lab_v1_audit.py

      - name: Commit Loop Contract Lab update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github/ISSUE_TEMPLATE issue-bodies || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Loop Contract Lab V1"
            git push
          fi

      - name: Create review tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f issue-bodies/loop-contract-lab-v1.md ]; then
            gh issue create --title "GoalOS Loop Contract Lab V1 — Review" --body-file issue-bodies/loop-contract-lab-v1.md --label "website,public-alpha,demo" || true
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          gh release create "$tag" \
            reports/loop-contract-lab-v1-qa.json \
            reports/loop-contract-lab-v1-demo-run.json \
            reports/loop-contract-lab-v1-install-report.json \
            evidence/demo/loop-contract-lab-v1-reference-docket.json \
            --title "GoalOS Loop Contract Lab V1" \
            --notes "Browser-local public demo: write the loop, not the prompt. No user data. No user funds. Human review required." || true

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0
