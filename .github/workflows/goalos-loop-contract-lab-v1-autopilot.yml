name: GoalOS Loop Contract Lab V1 — Write the Loop, Not the Prompt

"on":
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated Loop Contract Lab files"
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages"
        required: true
        type: boolean
        default: true
      create_issue:
        description: "Create a review tracking issue"
        required: true
        type: boolean
        default: true
      create_release:
        description: "Create GitHub Release"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release tag"
        required: true
        type: string
        default: "v0.33.0-loop-contract-lab-v1"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-loop-contract-lab-v1
  cancel-in-progress: false

jobs:
  loop-contract-lab:
    name: Install Loop Contract Lab
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.x"

