name: GoalOS Proof Mission Control V1 — Public Mission Operating Board

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files back to the repository
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: Deploy GitHub Pages after updating files
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: Create a public tracking issue
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: Create a GitHub Release after visual approval
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: Release tag to use if create_release is true
        required: true
        default: v0.23.5-proof-mission-control-v1

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-proof-mission-control-v1
  cancel-in-progress: false

jobs:
  proof-mission-control:
    name: Install Proof Mission Control V1
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

