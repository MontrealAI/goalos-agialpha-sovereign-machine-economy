      - name: Install page, docs, reports, and index patches
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_proof_mission_control_v1.py

      - name: Generate reference mission-control docket
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_proof_mission_control_v1_demo.py

      - name: Run mission-control QA audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/goalos_proof_mission_control_v1_audit.py
          python -m json.tool reports/proof-mission-control-v1-qa.json > /tmp/proof-mission-control-v1-qa.pretty.json

      - name: Commit Proof Mission Control update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github issue-bodies .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m 'Add GoalOS Proof Mission Control V1'
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh issue list --search "GoalOS Proof Mission Control V1 in:title" --json number --jq '.[0].number' | grep -q '^[0-9]'; then
            echo "Tracking issue already exists."
          else
            gh issue create --title 'GoalOS Proof Mission Control V1' --body-file issue-bodies/proof-mission-control-v1.md --label public-alpha --label proof-mission || true
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG"               --title 'GoalOS Proof Mission Control V1'               --notes 'Adds the browser-local Proof Mission Control board: mission lanes, readiness gates, validator packet, Evidence Docket download, and Proof Run 001 operating path. Boundary: no user data, no user funds, no wallet, no transaction, no production authority.'
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
