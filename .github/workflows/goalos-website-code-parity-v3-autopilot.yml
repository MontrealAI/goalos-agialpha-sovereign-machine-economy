name: GoalOS Website-Code Parity V3 — Repository Matches Website

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated parity files back to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages after updating the parity layer"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a release after the parity run succeeds"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      create_tracking_issue:
        description: "Create a public tracking issue for website-code parity"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag to create when create_release=true"
        required: true
        default: "v0.12.0-website-code-parity-v3"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-website-code-parity-v3-${{ github.ref }}
  cancel-in-progress: false

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Website-Code Parity V3 implementation pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64, zipfile, io
          blob = """"""
          data = base64.b64decode(blob)
          with zipfile.ZipFile(io.BytesIO(data)) as z:
              z.extractall(".")
          print("Installed GoalOS Website-Code Parity V3 pack.")
          PY

      - name: Patch README with parity section
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8") if readme.exists() else "# GoalOS AGIALPHA Ascension — Sovereign Machine Economy\n"
          marker_start = "<!-- GOALOS_WEBSITE_CODE_PARITY_V3_START -->"
          marker_end = "<!-- GOALOS_WEBSITE_CODE_PARITY_V3_END -->"
          section = f"""\n{marker_start}\n\n## Website-Code Parity V3\n\nThe public website now has repository-backed implementation parity for the current public-alpha capability surface.\n\nEvery major website claim is mapped to code, tests, scripts, reports, Evidence Dockets, or issue bodies:\n\n- META-Agentic Institution Foundry → `src/goalos_ascension/agent_foundry.py`\n- AGI Alpha Node Theatre → `src/goalos_ascension/node_runtime.py`\n- AGI Jobs v0/v2 Work OS → `src/goalos_ascension/agi_jobs.py`\n- Mission OS / Proof Console → `src/goalos_ascension/mission_os.py` and `src/goalos_ascension/kernel.py`\n- Frontier Release Room → `src/goalos_ascension/frontier_release.py`\n- Multi-Agent Institution → `src/goalos_ascension/coordination.py`\n- Proof Run 001 → `src/goalos_ascension/proof_run.py`\n- Website-code parity audit → `src/goalos_ascension/website_parity.py`\n\nOpen the parity report:\n\n```text\nreports/website-code-parity-v3.json\n```\n\nOpen the public page:\n\n```text\nhttps://montrealai.github.io/goalos-agialpha-sovereign-machine-economy/capability-parity.html\n```\n\nBoundary: local public-alpha reference implementation only. No wallet, no transaction, no production activation, no user-fund authorization, no mainnet activation, no achieved AGI/ASI claim. Human review remains required.\n\n{marker_end}\n"""
          if marker_start in text and marker_end in text:
              before = text.split(marker_start)[0]
              after = text.split(marker_end, 1)[1]
              text = before + section + after
          else:
              lines = text.splitlines()
              insert_at = 1 if lines and lines[0].startswith("#") else 0
              lines.insert(insert_at, section)
              text = "\n".join(lines) + "\n"
          readme.write_text(text, encoding="utf-8")
          PY

      - name: Run implementation demos, tests, and parity audit
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q
          python scripts/run_agent_foundry_demo.py
          python scripts/run_node_theatre_demo.py
          python scripts/run_agi_jobs_demo.py
          python scripts/run_proof_run_001.py
          python scripts/run_website_code_parity_v3.py
          python - <<'PY'
          from pathlib import Path
          import json, datetime
          Path("reports").mkdir(exist_ok=True)
          install = {
            "status": "installed_and_validated",
            "generated_at": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
            "workflow": "goalos-website-code-parity-v3-autopilot",
            "tests": "pytest passed before this report was written",
            "boundary": {
              "production_authority": False,
              "external_actions_authorized": False,
              "wallet_or_mainnet": False,
              "human_review_required": True
            }
          }
          Path("reports/website-code-parity-v3-install-report.json").write_text(json.dumps(install, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit parity implementation
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md \
            src/goalos_ascension/agent_foundry.py \
            src/goalos_ascension/agi_jobs.py \
            src/goalos_ascension/node_runtime.py \
            src/goalos_ascension/website_parity.py \
            src/goalos_ascension/__init__.py \
            scripts/run_agent_foundry_demo.py \
            scripts/run_node_theatre_demo.py \
            scripts/run_agi_jobs_demo.py \
            scripts/run_website_code_parity_v3.py \
            tests/test_agent_foundry.py \
            tests/test_node_runtime.py \
            tests/test_agi_jobs.py \
            tests/test_website_code_parity_v3.py \
            docs/implementation/WEBSITE_CODE_PARITY_V3.md \
            public/capability-parity.html \
            reports/meta-agentic-foundry-demo.json \
            reports/agi-alpha-node-theatre-demo.json \
            reports/agi-jobs-ledger-demo.json \
            reports/website-code-parity-v3.json \
            reports/website-code-parity-v3-install-report.json \
            reports/proof-run-001-reference-report.json \
            evidence/proof-run-001/proof-run-001-docket.json \
            evidence/proof-run-001/proof-run-001-report.json \
            issue-bodies/website-code-parity-v3.md
          if git diff --cached --quiet; then
            echo "No parity changes to commit."
          else
            git commit -m "Add GoalOS Website-Code Parity V3 implementation"
            git push
          fi

      - name: Create parity tracking issue
        if: ${{ inputs.create_tracking_issue == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Website-Code Parity V3 — repository implementation matches public website';
            const body = [
              '## Goal',
              'Keep the public website capability surface matched by repository code, tests, reports, scripts, and Evidence Dockets.',
              '',
              '## Review checklist',
              '- [ ] Inspect `reports/website-code-parity-v3.json`',
              '- [ ] Confirm `public/capability-parity.html` loads',
              '- [ ] Review `src/goalos_ascension/agent_foundry.py`',
              '- [ ] Review `src/goalos_ascension/node_runtime.py`',
              '- [ ] Review `src/goalos_ascension/agi_jobs.py`',
              '- [ ] Confirm tests passed in the workflow',
              '- [ ] Confirm no wallet, transaction, mainnet, production, or user-fund authority is granted',
              '',
              'This issue was created automatically by the GoalOS Website-Code Parity V3 workflow.'
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            if (!existing.data.some(issue => issue.title === title)) {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
            }

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/release_notes.md <<'EOF'
          GoalOS Website-Code Parity V3

          This release adds repository-backed implementation parity for the public website capability surface.

          Highlights:
          - META-Agentic Institution Foundry reference implementation
          - AGI Alpha Node Theatre reference implementation
          - AGI Jobs v0/v2 lifecycle reference implementation
          - Website-code parity audit
          - Expanded tests and executable scripts
          - Proof Run 001 reference artifact refresh
          - Capability parity public page

          Boundary: public-alpha local reference implementation only. No wallet, no transaction, no production authorization, no user-fund authorization, no mainnet activation, and no achieved AGI/ASI claim.
          EOF
            gh release create "$RELEASE_TAG" --title "GoalOS Website-Code Parity V3" --notes-file /tmp/release_notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v4
