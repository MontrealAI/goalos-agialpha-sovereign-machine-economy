              $('#run-proof').addEventListener('click',()=>{step=0; $('#chronicle').innerHTML=''; applyState(); let i=0; const timer=setInterval(()=>{selectGate(i); chronicle('Gate '+String(i+1).padStart(2,'0')+' complete: '+gates[i]); i++; if(i>=gates.length){clearInterval(timer); chronicle('HUMAN_REVIEW_REQUIRED: proof package is ready for review.','pink');}},520);});
              $('#download-docket').addEventListener('click',()=>download('goalos-frontier-release-docket.json',JSON.stringify(makeDocket(),null,2),'application/json'));
              $('#download-brief').addEventListener('click',()=>download('goalos-frontier-release-review-brief.md',makeBrief(),'text/markdown'));
              $('#download-matrix').addEventListener('click',()=>download('goalos-frontier-access-matrix.csv','tier,purpose,allowed_state,required_evidence\npublic,redacted summary,allowed after approval,public docket\ntrusted preview,limited partner access,conditional,private annex and validator approval\nrestricted,high-consequence capability,hold,additional review\nemergency hold,risk escalation,suspended,rollback trigger\n','text/csv'));
              $('#copy-summary').addEventListener('click',async()=>{const text='GoalOS Frontier Release Room converts frontier AI release disputes into bounded Evidence Dockets, validator reports, access matrices, rollback conditions, and human-authorized decision states.'; try{await navigator.clipboard.writeText(text); chronicle('Executive summary copied.');}catch(e){chronicle('Clipboard unavailable; copy manually.','warn');}});
              addEventListener('keydown',e=>{if(e.key==='?'){chronicle('Command palette: run proof flight · export docket · export brief · inspect gate · preserve human authority','warn');}});
              function makeDocket(){const s=states[current]; return {schema:'goalos.frontier_release_docket.v1',generated_at:new Date().toISOString(),local_only:noExternalAuthority,scenario:s.title,mission:$('#mission-text').value,decision_state:s.decision,readiness_score:s.score,authority_boundary:['no_model_call','no_wallet','no_transaction','no_external_action','human_review_required'],gates:gates.map((g,i)=>({gate:g,status:i<=step?'inspected':'pending',note:gateNotes[g]})),required_evidence:['capability evaluation','safeguard evaluation','access tier matrix','validator report','risk ledger','rollback protocol','redacted public summary','private annex index']};}
              function makeBrief(){const d=makeDocket(); return `# GoalOS Frontier Release Review Brief\n\nScenario: ${d.scenario}\n\nDecision state: ${d.decision_state}\n\nReadiness score: ${d.readiness_score}\n\nBoundary: no model call, no wallet, no transaction, no external action, human review required.\n\n## Mission\n${d.mission}\n\n## Required evidence\n${d.required_evidence.map(x=>'- '+x).join('\n')}\n`;}
              function download(name,body,type){const blob=new Blob([body],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),800);}
              applyState(); selectGate(0); renderGraph(0);
            }
            function enhanceSources(){ $$('.source-list a').forEach(a=>{a.target='_blank';}); }
            canvasAura(); setupConsole(); enhanceSources();
          })();
          '''
          
          
          def homepage() -> str:
              body = '''
