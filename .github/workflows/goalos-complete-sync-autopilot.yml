          def case_study_page() -> str:
              rows = ''.join(f'<tr><td>{html.escape(s["publisher"])}</td><td><a href="{s["url"]}" rel="noopener noreferrer">{html.escape(s["title"])}</a></td><td>{html.escape(s["used_for"])}</td></tr>' for s in SOURCES)
              body = f'''
          <section class="section">
            <h2>Case Study 001: public-source frontier release governance</h2>
            <p class="lead">This case study does not decide whether any specific model should be released or restricted. It shows how a high-consequence release dispute can be converted into a bounded, source-cited, validator-reviewable Evidence Docket.</p>
            <div class="grid two">
              <div class="panel"><h3>The pattern</h3><p>Public reporting and primary-source statements describe frontier model releases moving into limited previews, access suspensions, or government-requested review. The operational question is how to make the release decision auditable without exposing sensitive details.</p></div>
              <div class="panel"><h3>The GoalOS answer</h3><p>Create a Frontier Model Release Evidence Docket with public redactions, private annex indexes, access tiers, validator seats, rollback triggers, and a Governed Decision State.</p></div>
            </div>
          </section>
