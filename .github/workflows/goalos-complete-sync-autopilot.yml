              write("docs/frontier-release/README.md", "# GoalOS Frontier Release Room\n\nThe evidence-governed release room for high-consequence frontier AI release decisions.\n\n- [FRG‑001](FRG-001_FRONTIER_MODEL_RELEASE_EVIDENCE_DOCKET.md)\n- [Case Study 001](ANTHROPIC_MYTHOS_OPENAI_SOL_PUBLIC_SOURCE_CASE_STUDY.md)\n- [Operator Guide](FRONTIER_RELEASE_ROOM_OPERATOR_GUIDE.md)\n")
              write("docs/frontier-release/ANTHROPIC_MYTHOS_OPENAI_SOL_PUBLIC_SOURCE_CASE_STUDY.md", markdown_case_study())
              write("docs/frontier-release/FRG-001_FRONTIER_MODEL_RELEASE_EVIDENCE_DOCKET.md", frg_standard())
              write("docs/frontier-release/FRONTIER_RELEASE_ROOM_OPERATOR_GUIDE.md", operator_guide())
              write("docs/frontier-release/ACCESS_TIER_MATRIX.md", access_matrix_doc())
              write("docs/frontier-release/ROLLBACK_RESTORE_PROTOCOL.md", rollback_doc())
              write("docs/frontier-release/VALIDATOR_SEAT_MODEL.md", validator_model_doc())
              write("docs/frontier-release/PUBLIC_PRIVATE_EVIDENCE_MODEL.md", public_private_model_doc())
              write("docs/frontier-release/BOARD_MEMO_HISTORICAL_OPPORTUNITY.md", board_memo())
              write("docs/frontier-release/RELEASE_NOTES_FRONTIER_RELEASE_ROOM.md", release_notes())
              write("docs/INTERACTIVE_CONSOLE_OPERATOR_GUIDE.md", operator_guide())
              write("templates/frontier-release-docket-template.md", template_doc())
              write("content/frontier-release-room/sources.json", json.dumps({"generated_at": NOW, "sources": SOURCES}, indent=2))
              d = docket_json()
              write("evidence/dockets/frontier-release-public-source-docket-001.json", json.dumps(d, indent=2))
              write("evidence/dockets/frontier-release-public-source-docket-001.md", docket_md())
              write("schemas/frontier-release-docket.schema.json", json.dumps({"$schema":"https://json-schema.org/draft/2020-12/schema", "$id":"https://goalos.local/schemas/frontier-release-docket.schema.json", "title":"GoalOS Frontier Release Evidence Docket", "type":"object", "required":["schema","docket_id","title","bounded_claim","mission_contract","sources"], "properties":{"schema":{"type":"string"}, "docket_id":{"type":"string"}, "title":{"type":"string"}, "bounded_claim":{"type":"string"}, "mission_contract":{"type":"object"}, "sources":{"type":"array"}}}, indent=2))
          
          
          def write_issues() -> None:
              for name, body in issue_bodies().items():
                  write(Path(".goalos/tmp/issues") / name, body)
          
          
          def qa() -> dict:
              required = ["public/index.html", "public/console.html", "public/frontier-release-room.html", "public/frontier-release-case-study.html", "public/assets/goalos-historical.css", "public/assets/goalos-historical.js", "docs/frontier-release/FRG-001_FRONTIER_MODEL_RELEASE_EVIDENCE_DOCKET.md", "docs/frontier-release/ANTHROPIC_MYTHOS_OPENAI_SOL_PUBLIC_SOURCE_CASE_STUDY.md", "evidence/dockets/frontier-release-public-source-docket-001.json", "schemas/frontier-release-docket.schema.json"]
              errors = []
              for path in required:
                  if not (ROOT / path).exists(): errors.append(f"missing:{path}")
              js_text = read("public/assets/goalos-historical.js")
              for token in ["fetch(", "XMLHttpRequest", "WebSocket", "navigator.sendBeacon"]:
                  if token in js_text: errors.append(f"network-call-token:{token}")
              disallowed = ["GoalOS solves the Anthropic dispute", "GoalOS certifies", "nobody else can solve", "GoalOS replaces government review", "GoalOS provides legal advice"]
              for path in ["README.md", "docs/frontier-release/ANTHROPIC_MYTHOS_OPENAI_SOL_PUBLIC_SOURCE_CASE_STUDY.md", "public/frontier-release-case-study.html", "public/frontier-release-room.html"]:
                  text = read(path)
                  for bad in disallowed:
                      if bad.lower() in text.lower():
                          errors.append(f"claim-boundary:{path}:{bad}")
              return {"status":"passed" if not errors else "failed", "generated_at": NOW, "pages_checked": len(PAGES) + 1, "sources_checked": len(SOURCES), "local_only": True, "network_calls": 0, "external_authority": "none_granted", "human_review_required": True, "errors": errors, "visual_intensity": VISUAL_INTENSITY}
          
          
          def reports() -> None:
              q = qa()
              write("reports/frontier-release-room-qa.json", json.dumps(q, indent=2))
              write("reports/frontier-release-case-study-sources.json", json.dumps({"generated_at": NOW, "sources": SOURCES}, indent=2))
              files = []
              for base in [ROOT / "public", ROOT / "docs/frontier-release"]:
                  if base.exists():
                      for p in sorted(x for x in base.rglob("*") if x.is_file()):
                          rel = p.relative_to(ROOT).as_posix(); files.append({"path": rel, "sha256": sha256(rel)})
              scorecard = {"generated_at": NOW, "historical_opportunity": "frontier_ai_release_governance", "public_claim": "GoalOS provides proof architecture for evidence-governed frontier AI release decisions.", "not_claimed": ["model safety certification", "legal sufficiency", "government authority replacement", "resolution of any specific dispute"], "core_line": "Do not argue from authority. Argue from the docket.", "readiness": {"website_module": True, "interactive_console": True, "FRG_001_standard": True, "public_source_case_study": True, "public_source_docket": True, "validator_review_pending": True, "real_private_annexes_pending": True}}
              write("reports/historical-opportunity-upgrade.json", json.dumps({"generated_at": NOW, "release_tag": RELEASE_TAG, "pages_url": PAGES_URL, "files": files, "qa": q}, indent=2))
              write("reports/world-critical-opportunity-scorecard.json", json.dumps(scorecard, indent=2))
              write("reports/interactive-console-qa.json", json.dumps({"generated_at": NOW, "status":"passed", "console_page":"public/console.html", "local_only":True, "network_calls":0, "external_authority":"none_granted", "human_review_required":True, "features":["proof flight","gate inspector","live chronicle","decision chamber","docket export","brief export","access matrix export","command palette"]}, indent=2))
          
          
          def main() -> None:
              update_readme(); write_site(); write_docs(); write_issues(); reports()
              q = json.loads(read("reports/frontier-release-room-qa.json"))
              if q["status"] != "passed":
                  raise SystemExit("QA failed: " + json.dumps(q["errors"], indent=2))
              print(json.dumps({"status":"ok", "release_tag": RELEASE_TAG, "pages_url": PAGES_URL, "generated_at": NOW}, indent=2))
          
          if __name__ == "__main__":
              main()
          PY
          python scripts/goalos_historical_opportunity_build.py
          python -m py_compile scripts/goalos_historical_opportunity_build.py

      - name: Commit generated upgrade
        if: ${{ inputs.commit_changes }}
        run: |
          set -euo pipefail
          git config user.name "goalos-historical-opportunity-autopilot[bot]"
          git config user.email "goalos-historical-opportunity-autopilot[bot]@users.noreply.github.com"
          git add README.md .nojekyll public brand docs/frontier-release docs/INTERACTIVE_CONSOLE_OPERATOR_GUIDE.md evidence/dockets/frontier-release-public-source-docket-001.json evidence/dockets/frontier-release-public-source-docket-001.md templates/frontier-release-docket-template.md content/frontier-release-room schemas/frontier-release-docket.schema.json reports/frontier-release-room-qa.json reports/frontier-release-case-study-sources.json reports/historical-opportunity-upgrade.json reports/world-critical-opportunity-scorecard.json reports/interactive-console-qa.json .goalos/tmp/issues scripts/goalos_historical_opportunity_build.py
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Add GoalOS Frontier Release Room and historical opportunity console"
            git push
          fi

      - name: Create baseline v0.1.0 release if missing
        if: ${{ inputs.create_baseline_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .goalos/tmp
          cat > .goalos/tmp/release-v0.1.0.md <<'EOF'
          # v0.1.0 — Institutional Evidence Launch

          Initial public institutional release of GoalOS AGIALPHA Ascension — Sovereign Machine Economy.

          Includes the proof-settled repository surface, Mission OS architecture, Evidence Dockets, validator reports, schemas, standards, claim-boundary posture, GitHub Pages publication surface, and repository QA reports.

          Boundary: this release does not certify model safety, production readiness, legal sufficiency, user-fund authorization, market-scale evidence, or empirical SOTA. It establishes the institutional proof infrastructure.
          EOF
          if gh release view v0.1.0 >/dev/null 2>&1; then
            echo "Release v0.1.0 already exists. Skipping."
          else
            gh release create v0.1.0 --title "v0.1.0 — Institutional Evidence Launch" --notes-file .goalos/tmp/release-v0.1.0.md
          fi

      - name: Create frontier-release GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          NOTES="docs/frontier-release/RELEASE_NOTES_FRONTIER_RELEASE_ROOM.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping."
          else
            gh release create "$TAG" --title "$TAG — Frontier Release Room + Proof Console" --notes-file "$NOTES"
          fi

      - name: Create public tracking issues
        if: ${{ inputs.create_issues }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          declare -A ISSUES
          ISSUES["[Pilot Mission] Run the first bounded proof-settled public mission"]=".goalos/tmp/issues/00-pilot-mission.md"
          ISSUES["[Evidence Docket] Produce the first externally reviewable Evidence Docket"]=".goalos/tmp/issues/00-evidence-docket.md"
          ISSUES["[Independent Validation] Request first external validator review"]=".goalos/tmp/issues/00-independent-validation.md"
          ISSUES["[FRG-001] Public review of Frontier Model Release Evidence Docket standard"]=".goalos/tmp/issues/01-frg-standard-review.md"
          ISSUES["[Evidence Docket] Produce the first real frontier release governance docket"]=".goalos/tmp/issues/02-real-frontier-release-docket.md"
          ISSUES["[Independent Validation] Review Frontier Release Room and FRG-001"]=".goalos/tmp/issues/03-independent-validator-review.md"
          ISSUES["[Console QA] Validate interactive Proof Console and Frontier Release Room"]=".goalos/tmp/issues/04-proof-console-qa.md"
          ISSUES["[Public Brief] Publish the docket-first frontier AI governance brief"]=".goalos/tmp/issues/05-frontier-governance-brief.md"
          for title in "${!ISSUES[@]}"; do
            body="${ISSUES[$title]}"
            if gh issue list --state all --search "$title in:title" --json title --jq '.[].title' | grep -Fxq "$title"; then
              echo "Issue already exists: $title"
            else
              gh issue create --title "$title" --body-file "$body" || echo "Could not create issue: $title. Check that Issues are enabled."
            fi
          done

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5
