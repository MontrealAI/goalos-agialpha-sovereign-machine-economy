          def js() -> str:
              return r'''
          (function(){
            const $=(s,root=document)=>root.querySelector(s); const $$=(s,root=document)=>Array.from(root.querySelectorAll(s));
            const noExternalAuthority = true;
            function canvasAura(){
              const c=$('#aura-canvas'); if(!c) return; const ctx=c.getContext('2d'); let w,h,dpr,pts=[];
              function resize(){dpr=Math.min(window.devicePixelRatio||1,2);w=c.width=Math.floor(innerWidth*dpr);h=c.height=Math.floor(innerHeight*dpr);c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';pts=Array.from({length:Math.min(120,Math.floor(innerWidth/10))},(_,i)=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.22*dpr,vy:(Math.random()-.5)*.22*dpr,r:(Math.random()*1.8+0.4)*dpr,a:Math.random()}));}
              function draw(){ctx.clearRect(0,0,w,h);for(const p of pts){p.x=(p.x+p.vx+w)%w;p.y=(p.y+p.vy+h)%h;p.a+=.01;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(95,255,210,${.12+Math.sin(p.a)*.06})`;ctx.fill();}for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){const a=pts[i],b=pts[j],dx=a.x-b.x,dy=a.y-b.y,dist=Math.hypot(dx,dy);if(dist<115*dpr){ctx.strokeStyle=`rgba(103,167,255,${(1-dist/(115*dpr))*.09})`;ctx.lineWidth=1*dpr;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}}requestAnimationFrame(draw)}
              addEventListener('resize',resize,{passive:true}); resize(); draw();
            }
            const states={
              generic:{title:'Frontier model release review',mission:'Determine whether a high-consequence frontier model should proceed to limited preview, hold pending evidence, restricted access, or broader release.',score:62,decision:'HOLD_PENDING_STRUCTURED_REVIEW'},
              mythos:{title:'Anthropic Fable / Mythos public-source review',mission:'Convert the public-source Anthropic access-suspension dispute into a bounded release-governance Evidence Docket without claiming inside knowledge or legal conclusions.',score:57,decision:'HOLD_PENDING_PUBLIC_PRIVATE_DOCKET'},
              sol:{title:'OpenAI GPT-5.6 Sol limited preview review',mission:'Assess the public-source governance pattern for a limited trusted-partner preview and define what Evidence Docket would make the release path more inspectable.',score:66,decision:'APPROVE_LIMITED_PREVIEW_WITH_DOCKET'},
              enterprise:{title:'Enterprise trusted-access review',mission:'Evaluate whether a specific enterprise partner should receive trusted access under defined controls, monitoring, rollback conditions, and human authority.',score:74,decision:'APPROVE_TRUSTED_ACCESS_REVIEW'}
            };
            const gates=['Identity','Capability','Safeguards','Access','Evidence','Validators','Risk','Rollback','Chronicle','Human Authority'];
            const gateNotes={Identity:'Confirm the actor, model family, release owner, jurisdictional scope, and accountable human authority.',Capability:'Bound what capabilities are in scope and which misuse thresholds are relevant.',Safeguards:'Inspect mitigations, policy constraints, monitoring, and abuse-response design.',Access:'Define public, preview, trusted, restricted, denied, and emergency-hold access tiers.',Evidence:'Map every release claim to public evidence, private annexes, counterevidence, and unresolved questions.',Validators:'Assign cybersecurity, policy/legal, enterprise-risk, public-interest, and independent validator seats.',Risk:'Classify operational, geopolitical, cybersecurity, misuse, customer, and reputation risks.',Rollback:'Set suspension, restore, and reopening conditions before any high-consequence release.',Chronicle:'Preserve a decision trail so future releases learn from the docket.', 'Human Authority':'No release decision is executed by the console. Human authority remains required.'};
            function chronicle(msg,cls='') { const t=$('#chronicle'); if(!t) return; const line=document.createElement('div'); line.className=cls; line.textContent=new Date().toISOString().slice(11,19)+'  '+msg; t.appendChild(line); t.scrollTop=t.scrollHeight; }
            function renderGraph(step=0){const svg=$('#proof-graph'); if(!svg) return; const cx=360, cy=190, r=142; let html=`<defs><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="100%" height="100%" fill="transparent"/>`; gates.forEach((g,i)=>{const a=(Math.PI*2*i/gates.length)-Math.PI/2, x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r; const done=i<=step; html+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${done?'#5fffd2':'rgba(255,255,255,.16)'}" stroke-width="${done?2:1}" stroke-dasharray="${i>step?'4 8':'0'}"/>`; html+=`<circle cx="${x}" cy="${y}" r="24" fill="${done?'rgba(95,255,210,.18)':'rgba(255,255,255,.05)'}" stroke="${done?'#5fffd2':'rgba(255,255,255,.2)'}" filter="${done?'url(#glow)':''}"/>`; html+=`<text x="${x}" y="${y+5}" fill="#fffaf0" font-size="10" font-weight="900" text-anchor="middle">${g.split(' ')[0].slice(0,3).toUpperCase()}</text>`}); html+=`<circle cx="${cx}" cy="${cy}" r="58" fill="rgba(7,16,26,.9)" stroke="#fff06a" stroke-width="2" filter="url(#glow)"/><text x="${cx}" y="${cy+16}" text-anchor="middle" fill="#fff06a" font-size="54" font-weight="900">α</text>`; svg.innerHTML=html;}
            function setupConsole(){
              if(!$('#run-proof')) return; let step=0, current='generic';
              function applyState(){const s=states[current]; $('#mission-text').value=s.mission; $('#decision-state').textContent=s.decision; $('#readiness-score').textContent=s.score; $('#score-ring').style.setProperty('--score',s.score+'%'); $('#case-title').textContent=s.title; $('#chain-head').textContent='FRG-'+String(Math.abs(hash(s.title))).slice(0,10); chronicle('Loaded scenario: '+s.title,'warn');}
              function selectGate(i){step=i; $$('.gate').forEach((g,idx)=>{g.classList.toggle('active',idx===i);g.classList.toggle('complete',idx<i);}); $('#gate-title').textContent=gates[i]; $('#gate-note').textContent=gateNotes[gates[i]]; renderGraph(i);}
              function hash(s){let h=0; for(let i=0;i<s.length;i++) h=((h<<5)-h+s.charCodeAt(i))|0; return h;}
              const row=$('#gate-row'); row.innerHTML=gates.map((g,i)=>`<button class="gate" data-i="${i}"><strong>${String(i+1).padStart(2,'0')}</strong><small>${g}</small></button>`).join('');
              row.addEventListener('click',e=>{const b=e.target.closest('.gate'); if(b) selectGate(Number(b.dataset.i));});
