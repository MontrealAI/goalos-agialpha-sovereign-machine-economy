e-height:1.55}.panel ul{padding-left:20px;color:var(--muted);line-height:1.7}.doctrine{display:grid;gap:8px}.doctrine span{display:block;padding:12px 14px;border:1px solid rgba(255,240,106,.25);border-radius:14px;background:rgba(255,240,106,.055);font-weight:850}.console-shell{display:grid;grid-template-columns:330px 1fr 320px;gap:14px;align-items:start}.console-panel{padding:18px}.console-panel h2,.console-panel h3{margin:0 0 12px}.field label,.toggle label{display:block;color:var(--muted);font-size:11px;font-weight:950;letter-spacing:.14em;text-transform:uppercase;margin:13px 0 7px}.field select,.field textarea,.field input{width:100%;border:1px solid var(--line);border-radius:15px;background:rgba(0,0,0,.24);color:var(--text);padding:12px;font:inherit;font-weight:750}.field textarea{min-height:112px;resize:vertical}.gate-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:14px 0}.gate{border:1px solid var(--line);border-radius:14px;padding:10px 8px;background:rgba(255,255,255,.04);text-align:center;color:var(--muted);cursor:pointer;transition:.22s}.gate strong{display:block;color:var(--text);font-size:11px}.gate small{font-size:9px;text-transform:uppercase;letter-spacing:.1em}.gate.active,.gate.complete{border-color:var(--mint);box-shadow:0 0 18px rgba(95,255,210,.18);color:var(--text);background:rgba(95,255,210,.08)}.gate.warn{border-color:var(--gold);background:rgba(255,240,106,.06)}.theatre{position:relative;height:390px;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:linear-gradient(180deg,rgba(8,14,30,.88),rgba(5,7,19,.92))}.theatre svg{width:100%;height:100%}.terminal{height:210px;overflow:auto;background:#04060d;border:1px solid var(--line);border-radius:18px;padding:14px;font:12px/1.55 var(--mono);color:#93ffdd}.terminal .warn{color:var(--gold)}.terminal .pink{color:var(--pink)}.score-ring{width:170px;height:170px;border-radius:50%;margin:10px auto 16px;display:grid;place-items:center;background:conic-gradient(var(--mint) var(--score,63%),rgba(255,255,255,.08) 0);box-shadow:0 0 40px rgba(95,255,210,.16)}.score-ring div{width:128px;height:128px;border-radius:50%;background:#07101a;display:grid;place-items:center;text-align:center}.score-ring strong{display:block;font-size:42px}.score-ring span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:900;letter-spacing:.14em}.status-table{border-top:1px solid var(--line);margin-top:14px}.status-table div{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:11px 0;color:var(--muted);font-size:13px}.status-table strong{color:var(--text);text-align:right}.decision{border:1px solid rgba(255,240,106,.32);background:rgba(255,240,106,.06);border-radius:18px;padding:16px;margin:14px 0}.decision strong{display:block;color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:.15em;margin-bottom:6px}.matrix{width:100%;border-collapse:collapse;overflow:hidden;border-radius:18px}.matrix th,.matrix td{border:1px solid var(--line);padding:13px;text-align:left;vertical-align:top}.matrix th{background:rgba(255,255,255,.07);font-size:12px;text-transform:uppercase;letter-spacing:.12em}.matrix td{color:var(--muted)}.source-list{display:grid;gap:10px;padding-left:24px}.source-list li{padding:14px 14px 14px 4px;border-bottom:1px solid var(--line)}.source-list a{color:var(--text);font-weight:900}.source-list span{display:block;color:var(--muted);margin-top:5px}.kbd{font:12px var(--mono);border:1px solid var(--line);border-radius:8px;padding:2px 6px;background:rgba(255,255,255,.08)}.site-footer{display:flex;align-items:center;justify-content:space-between;gap:20px;border-top:1px solid var(--line);padding:34px 0 56px;margin-top:40px;color:var(--muted)}.site-footer p{margin:6px 0 0}.footer-links{display:flex;gap:12px;flex-wrap:wrap}.footer-links a{color:var(--text)}.notice{border:1px solid rgba(255,102,140,.32);background:rgba(255,102,140,.055);border-radius:20px;padding:18px;c