name: GoalOS Complete Sync Autopilot — Postlaunch + Console + Frontier Release Room

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files back to the repository"
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy the generated public/ website to GitHub Pages"
        required: true
        type: boolean
        default: true
      create_release:
        description: "Create the frontier-release GitHub Release if it does not already exist"
        required: true
        type: boolean
        default: true
      create_baseline_release:
        description: "Also create v0.1.0 Institutional Evidence Launch if it does not already exist"
        required: true
        type: boolean
        default: true
      create_issues:
        description: "Create public tracking issues for standards review, real dockets, and validation"
        required: true
        type: boolean
        default: true
      release_tag:
        description: "Release tag to create"
        required: true
        type: string
        default: "v0.2.1-complete-sync"
      visual_intensity:
        description: "Website visual intensity"
        required: true
        type: choice
        default: "sovereign"
        options:
          - sovereign
          - executive
          - restrained

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: goalos-complete-sync-autopilot
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build-commit-release-and-deploy:
    name: "Build complete sync: Postlaunch, Proof Console, Frontier Release Room, Evidence Dockets, and Pages"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6

      - name: Build GoalOS complete sync upgrade
        env:
          GOALOS_VISUAL_INTENSITY: ${{ inputs.visual_intensity }}
          GOALOS_RELEASE_TAG: ${{ inputs.release_tag }}
          GOALOS_REPOSITORY: ${{ github.repository }}
          GOALOS_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          set -euo pipefail
          mkdir -p scripts
          cat > scripts/goalos_historical_opportunity_build.py <<'PY'
          from __future__ import annotations
          
          import datetime as _dt
          import hashlib
          import html
          import json
          import os
          from pathlib import Path
          from textwrap import dedent
          
          ROOT = Path.cwd()
          REPO = os.environ.get("GOALOS_REPOSITORY", "MontrealAI/goalos-agialpha-sovereign-machine-economy")
          if "/" in REPO:
              OWNER, NAME = REPO.split("/", 1)
          else:
              OWNER, NAME = "MontrealAI", REPO
          PAGES_URL = os.environ.get("GOALOS_PAGES_URL", f"https://{OWNER}.github.io/{NAME}/")
          RELEASE_TAG = os.environ.get("GOALOS_RELEASE_TAG", "v0.2.0-frontier-release-room")
          VISUAL_INTENSITY = os.environ.get("GOALOS_VISUAL_INTENSITY", "sovereign")
          NOW = _dt.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"
          
          SYSTEM_TITLE = "GoalOS AGIALPHA Ascension — Sovereign Machine Economy"
          CATEGORY = "Proof-settled autonomous AI work"
          DOCTRINE = [
              "No proof, no settlement.",
              "No Evidence Docket, no strong public claim.",
              "No eval, no propagation.",
              "No rollback, no release.",
              "No claim boundary, no publication.",
              "Public proof, private data.",
          ]
          BOUNDARY = [
              "No model call is performed by the website console.",
              "No wallet, transaction, settlement, external API call, or production activation is performed.",
              "No legal, export-control, safety, security, or investment advice is provided.",
              "No claim is made that GoalOS resolves any specific company-government dispute.",
              "Human authority and independent review remain required for real decisions.",
          ]
          
          SOURCES = [
              {
                  "id": "anthropic-fable-mythos-access",
                  "publisher": "Anthropic",
                  "title": "Fable and Mythos access update",
                  "url": "https://www.anthropic.com/news/fable-mythos-access",
                  "type": "primary_source",
                  "used_for": "Anthropic's public statement on access suspension, foreign-national scope, and its position on transparent, fair, technically grounded government action.",
              },
              {
                  "id": "openai-gpt-56-sol-preview",
                  "publisher": "OpenAI",
                  "title": "Previewing GPT-5.6 Sol",
                  "url": "https://openai.com/index/previewing-gpt-5-6-sol/",
                  "type": "primary_source",
                  "used_for": "OpenAI's public framing of a limited trusted-partner preview and government engagement around a frontier model release.",
              },
              {
                  "id": "reuters-openai-defers-rollout",
                  "publisher": "Reuters",
                  "title": "OpenAI defers public rollout of GPT-5.6 as US seeks early access to frontier AI models",
                  "url": "https://www.reuters.com/legal/litigation/openai-defers-public-rollout-gpt56-us-seeks-early-access-frontier-ai-models-2026-06-26/",
                  "type": "news_report",
                  "used_for": "Public reporting on the government-requested staged release pattern and broader national-security context.",
              },
              {
                  "id": "theverge-anthropic-mythos-standoff",
                  "publisher": "The Verge",
                  "title": "Anthropic's Mythos mess is only getting worse",
                  "url": "https://www.theverge.com/ai-artificial-intelligence/957327/anthropic-mythos-fable-ai-trump-administration-negotiations",
                  "type": "news_report",
                  "used_for": "Public reporting on the unresolved standoff and the absence of a clear operational rulebook.",
              },
              {
                  "id": "ap-openai-limited-preview",
                  "publisher": "Associated Press",
                  "title": "OpenAI limits its latest ChatGPT product to approved customers during cybersecurity review",
                  "url": "https://apnews.com/article/065d5398baac7f16c8265c2cb8ba2baa",
                  "type": "news_report",
                  "used_for": "Public reporting on limited preview access, cybersecurity review, and stakeholder concerns.",
              },
              {
                  "id": "nist-ai-rmf",
                  "publisher": "NIST",
                  "title": "AI Risk Management Framework",
                  "url": "https://www.nist.gov/itl/ai-risk-management-framework",
                  "type": "governance_reference",
                  "used_for": "General risk-management context for govern, map, measure, and manage functions.",
              },
              {
                  "id": "iso-iec-42001",
                  "publisher": "ISO",
                  "title": "ISO/IEC 42001 Artificial intelligence management system",
                  "url": "https://www.iso.org/standard/42001",
                  "type": "governance_reference",
                  "used_for": "AI management-system context for institutional governance practices.",
              },
              {
                  "id": "frontier-model-forum-safety-frameworks",
                  "publisher": "Frontier Model Forum",
                  "title": "Components of frontier AI safety frameworks",
                  "url": "https://www.frontiermodelforum.org/updates/issue-brief-components-of-frontier-ai-safety-frameworks/",
                  "type": "governance_reference",
                  "used_for": "Context on frontier safety frameworks, risk thresholds, evaluations, and mitigation strategies.",
              },
          ]
          
          PAGES = [
              ("index.html", "Home"),
              ("console.html", "Proof Console"),
              ("frontier-release-room.html", "Frontier Release Room"),
              ("frontier-release-case-study.html", "Case Study"),
              ("architecture.html", "Architecture"),
              ("evidence.html", "Evidence"),
              ("trust.html", "Trust Center"),
              ("product.html", "Product"),
              ("launch.html", "Launch"),
          ]
          
          
          def write(path: str | Path, content: str | bytes) -> None:
              path = ROOT / path
              path.parent.mkdir(parents=True, exist_ok=True)
              if isinstance(content, bytes):
                  path.write_bytes(content)
              else:
                  path.write_text(content.rstrip() + "\n", encoding="utf-8")
          
          
          def read(path: str | Path) -> str:
              path = ROOT / path
              return path.read_text(encoding="utf-8") if path.exists() else ""
          
          
          def sha256(path: str | Path) -> str:
              p = ROOT / path
              return hashlib.sha256(p.read_bytes()).hexdigest()
          
          
          def nav(active: str) -> str:
              links = []
              for href, label in PAGES:
                  cls = "active" if href == active else ""
                  links.append(f'<a class="{cls}" href="{href}">{html.escape(label)}</a>')
              return '<nav class="topnav">' + "".join(links) + '</nav>'
          
          
          def source_links() -> str:
              items = []
              for s in SOURCES:
                  items.append(f'<li><a href="{s["url"]}" rel="noopener noreferrer">{html.escape(s["publisher"])} — {html.escape(s["title"])}</a><span>{html.escape(s["used_for"])}</span></li>')
              return '<ol class="source-list">' + "\n".join(items) + '</ol>'
          
          
          def page(title: str, subtitle: str, active: str, body: str, badge: str = "GOALOS") -> str:
              return f'''<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <meta name="theme-color" content="#060812" />
            <meta name="description" content="{html.escape(subtitle)}" />
            <meta property="og:title" content="{html.escape(title)}" />
            <meta property="og:description" content="{html.escape(subtitle)}" />
            <meta property="og:type" content="website" />
            <meta property="og:image" content="assets/goalos-frontier-og.svg" />
            <title>{html.escape(title)}</title>
            <link rel="icon" href="assets/goalos-prestige-mark.svg" type="image/svg+xml" />
            <link rel="stylesheet" href="assets/goalos-historical.css" />
          </head>
          <body data-page="{html.escape(active)}" data-visual-intensity="{html.escape(VISUAL_INTENSITY)}">
            <canvas id="aura-canvas" aria-hidden="true"></canvas>
            <div class="page-shell">
              <header class="site-header">
                <a class="brand" href="index.html" aria-label="GoalOS home">
                  <img src="assets/goalos-prestige-mark.svg" alt="" />
                  <span><strong>GoalOS</strong><small>AGIALPHA Ascension</small></span>
                </a>
                {nav(active)}
              </header>
              <main>
                <section class="hero compact">
                  <p class="eyebrow"><span></span>{html.escape(badge)}</p>
                  <h1>{title}</h1>
                  <p class="hero-subtitle">{subtitle}</p>
                </section>
                {body}
              </main>
              <footer class="site-footer">
                <div>
                  <strong>AI creates output. GoalOS creates proof.</strong>
                  <p>Browser-local public site. No model call, wallet, transaction, settlement, or external authority.</p>
                </div>
                <div class="footer-links"><a href="frontier-release-room.html">Frontier Release Room</a><a href="console.html">Proof Console</a><a href="trust.html">Trust Boundary</a></div>
              </footer>
            </div>
            <script src="assets/goalos-historical.js"></script>
          </body>
          </html>'''
          
          
          def badge_svg() -> str:
              return '''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="GoalOS mark">
            <defs>
              <radialGradient id="g" cx="50%" cy="50%" r="55%"><stop offset="0" stop-color="#fff6a6"/><stop offset=".42" stop-color="#5fffd2"/><stop offset=".72" stop-color="#67a7ff"/><stop offset="1" stop-color="#0a0f1f"/></radialGradient>
              <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <rect width="120" height="120" rx="28" fill="#050713"/>
            <circle cx="60" cy="60" r="42" fill="none" stroke="url(#g)" stroke-width="3" opacity=".95" filter="url(#glow)"/>
            <circle cx="60" cy="60" r="22" fill="url(#g)" opacity=".22"/>
            <path d="M60 24 72 58h19L62 96l8-28H48l12-44Z" fill="#fff6a6" filter="url(#glow)"/>
            <text x="60" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#07101a">α</text>
          </svg>'''
          
          
          def og_svg() -> str:
              return '''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="GoalOS Frontier Release Room social preview">
            <defs>
              <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#050713"/><stop offset=".45" stop-color="#091a2c"/><stop offset="1" stop-color="#1b1233"/></linearGradient>
              <radialGradient id="orb" cx="50%" cy="50%" r="60%"><stop offset="0" stop-color="#fff6a6"/><stop offset=".38" stop-color="#5fffd2"/><stop offset=".7" stop-color="#67a7ff"/><stop offset="1" stop-color="#4f2cff" stop-opacity="0"/></radialGradient>
              <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse"><path d="M46 0H0v46" fill="none" stroke="#ffffff" stroke-opacity=".075"/></pattern>
            </defs>
            <rect width="1280" height="640" fill="url(#bg)"/>
