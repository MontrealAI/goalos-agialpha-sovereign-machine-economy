            <text x="960" y="345" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="900" fill="#fff6a6">α</text>
            <text x="76" y="112" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" letter-spacing="8" fill="#5fffd2">GOALOS AGIALPHA ASCENSION</text>
            <text x="76" y="238" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="82" font-weight="900" fill="#fffaf0">Frontier Release Room</text>
            <text x="76" y="318" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" fill="#fff6a6">Do not argue from authority. Argue from the docket.</text>
            <text x="76" y="394" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#d6e5ff">Evidence Dockets · Validator Reports · Access Matrices · Human Authority</text>
            <rect x="76" y="466" width="690" height="76" rx="38" fill="#fff6a6"/>
            <text x="421" y="515" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900" fill="#070913">Proof-settled autonomous AI work</text>
          </svg>'''
          
          
