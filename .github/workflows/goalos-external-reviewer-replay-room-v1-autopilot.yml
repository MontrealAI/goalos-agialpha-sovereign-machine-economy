name: GoalOS External Reviewer Replay Room V1 — Independent Review Path

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files back to the repository"
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages after the update"
        type: boolean
        default: true
      create_issue:
        description: "Create a public tracking issue"
        type: boolean
        default: true
      create_release:
        description: "Create a GitHub Release after visual approval"
        type: boolean
        default: false
      release_tag:
        description: "Release tag"
        type: string
        default: "v0.24.0-external-reviewer-replay-room-v1"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-external-reviewer-replay-room-v1
  cancel-in-progress: false

jobs:
  reviewer-replay-room:
    name: Install External Reviewer Replay Room
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install External Reviewer Replay Room pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, zipfile
          from pathlib import Path
          data = """"""
          pack = Path('goalos-external-reviewer-replay-room-v1-pack.zip')
          pack.write_bytes(base64.b64decode(data))
          with zipfile.ZipFile(pack) as z:
              z.extractall('.')
          print('Extracted External Reviewer Replay Room V1 pack')
          PY

      - name: Install, generate reference demo, and audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_external_reviewer_replay_room_v1.py
          python scripts/run_external_reviewer_replay_room_v1_demo.py
          python scripts/goalos_external_reviewer_replay_room_v1_audit.py
          python -m py_compile scripts/install_external_reviewer_replay_room_v1.py scripts/run_external_reviewer_replay_room_v1_demo.py scripts/goalos_external_reviewer_replay_room_v1_audit.py

      - name: Commit update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github issue-bodies .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS External Reviewer Replay Room V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue create             --title "External Reviewer Replay Room V1 — independent review path"             --label "review,evidence,replay"             --body-file issue-bodies/external-reviewer-replay-room-v1.md || true

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG"             --title "GoalOS External Reviewer Replay Room V1"             --notes "Adds the browser-local External Reviewer Replay Room: docket review, replay checklist, validator attestation, dissent memo, and public-safe review issue path."

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5
