
name: GoalOS Action-Reason Trace Contract V1 — Every Action Carries Reason

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files to the repository"
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages after generation"
        required: true
        type: boolean
        default: true
      create_issue:
        description: "Create a public tracking issue"
        required: true
        type: boolean
        default: true
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release tag"
        required: true
        type: string
        default: "v0.30.0-action-reason-trace-contract-v1"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PACK_B64: |
    

jobs:
  action-reason-trace-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Action-Reason Trace Contract pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, os, zipfile
          from pathlib import Path
          data = os.environ['PACK_B64'].encode()
          Path('goalos-action-reason-trace-contract-v1-pack.zip').write_bytes(base64.b64decode(data))
          with zipfile.ZipFile('goalos-action-reason-trace-contract-v1-pack.zip') as z:
              z.extractall('.')
          PY
          python scripts/install_action_reason_trace_contract_v1.py

      - name: Generate reference demo artifact
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_action_reason_trace_contract_v1_demo.py

      - name: Audit Action-Reason Trace Contract
        shell: bash
        run: |
          set -euo pipefail
          python scripts/goalos_action_reason_trace_contract_v1_audit.py

      - name: Commit generated files
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github/ISSUE_TEMPLATE issue-bodies || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Action-Reason Trace Contract V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh issue list --search "Action-Reason Trace Contract V1 in:title" --json number --jq '.[0].number' | grep -q .; then
            echo "Tracking issue already exists."
          else
            gh issue create --title "Action-Reason Trace Contract V1" --body-file issue-bodies/action-reason-trace-contract-v1.md --label demo --label public-safe || true
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/deploy-pages@v5

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists."
          else
            gh release create "$tag"               reports/action-reason-trace-contract-v1-qa.json               evidence/demo/action-reason-trace-contract-v1-reference-docket.json               --title "GoalOS Action-Reason Trace Contract V1"               --notes "Every action must carry a reason. Browser-local public demo; no user data, no funds, no wallet, no transaction, no network call."
          fi
