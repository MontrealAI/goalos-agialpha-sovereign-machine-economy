name: GoalOS Evolution Ledger Control Room V2 — Accessibility + Proof Rail Upgrade

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy public/ to GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a tracking issue"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag"
        required: true
        default: "v0.27.6-evolution-ledger-control-room-v2"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "goalos-evolution-ledger-control-room-v2"
  cancel-in-progress: false

jobs:
  evolution-ledger-v2:
    name: Install Evolution Ledger Control Room V2
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.11"

      - name: Install Evolution Ledger Control Room V2 pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, zipfile, io, pathlib
          data = base64.b64decode("""""")
          with zipfile.ZipFile(io.BytesIO(data)) as z:
              z.extractall(".")
          print("Extracted GoalOS Evolution Ledger Control Room V2 pack")
          PY

      - name: Run installer, demo, and QA audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_evolution_ledger_control_room_v2.py
          python scripts/run_evolution_ledger_control_room_v2_demo.py
          python scripts/goalos_evolution_ledger_control_room_v2_audit.py

      - name: Commit Evolution Ledger Control Room V2 update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add public docs examples scripts evidence reports content issue-bodies .github/ISSUE_TEMPLATE README.md .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m 'Upgrade Evolution Ledger Control Room V2'
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -f issue-bodies/evolution-ledger-control-room-v2.md ]; then
            gh issue create \
              --title "Review: Evolution Ledger Control Room V2" \
              --label "demo-feedback" \
              --body-file issue-bodies/evolution-ledger-control-room-v2.md || true
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            --title "GoalOS Evolution Ledger Control Room V2" \
            --notes "High-contrast, browser-local Evolution Ledger proof rail. The ledger remembers proof, not secrets. Includes QA report, reference docket, review docs, and same public URL: /evolution-ledger-control-room.html." || true

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0
