      - name: Show generated summary
        shell: bash
        run: |
          set -euo pipefail
          cat reports/website-experience-os-v1-qa.json
          git status --short

      - name: Commit website experience update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add README.md public docs reports content issue-bodies .github/ISSUE_TEMPLATE
          if git diff --cached --quiet; then
            echo "No Website Experience OS changes to commit."
          else
            git commit -m "Add GoalOS Website Experience OS V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh issue list --search "GoalOS Website Experience OS V1 in:title" --json number --jq '.[0].number' | grep -q '[0-9]'; then
            echo "Tracking issue already exists."
          else
            gh issue create \
              --title "GoalOS Website Experience OS V1 — complete navigation and routeability" \
              --body-file issue-bodies/website-experience-os-v1.md \
              --label "website,ux,navigation,public-alpha" || true
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --title "GoalOS Website Experience OS V1" \
              --notes "Complete navigation, homepage consolidation, route registry, command palette, no-data/no-funds boundary, and website QA." \
              reports/website-experience-os-v1-qa.json \
              content/goalos/website-experience-os-v1.json
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
