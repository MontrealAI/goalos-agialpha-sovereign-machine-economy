name: GoalOS Universal Mission Interface V23 — One Box, Proof Path

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files to the repository
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: Deploy the updated public/ site to GitHub Pages
        required: true
        type: boolean
        default: true
      create_issue:
        description: Create a tracking issue after installation
        required: true
        type: boolean
        default: true
      create_release:
        description: Create a GitHub Release after visual approval
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag to use when create_release is true
        required: true
        type: string
        default: v0.43.0-universal-mission-interface-v23

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PACK_ZIP: .goalos/packs/goalos-universal-mission-interface-v23-pack.zip

jobs:
  universal-mission-interface:
    name: Install Universal Mission Interface
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify pack exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PACK_ZIP"
          ls -lh "$PACK_ZIP"

      - name: Unpack GoalOS Universal Mission Interface pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib, zipfile
          zip_path = pathlib.Path('.goalos/packs/goalos-universal-mission-interface-v23-pack.zip')
          with zipfile.ZipFile(zip_path) as z:
              z.extractall(pathlib.Path.cwd())
          print(f'unpacked {zip_path}')
          PY

      - name: Install Universal Mission Interface
        run: python scripts/install_universal_mission_interface_v23.py

      - name: Run deterministic demo
        run: python scripts/run_universal_mission_interface_v23_demo.py

      - name: Audit browser-local safety and route integrity
        run: python scripts/goalos_universal_mission_interface_v23_audit.py

      - name: Commit Universal Mission Interface update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github issue-bodies .goalos || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Universal Mission Interface V23"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh issue create \
              --title "GoalOS Universal Mission Interface V23 — Review" \
              --body-file issue-bodies/universal-mission-interface-v23.md \
              --label "website" \
              --label "mission-os" \
              --label "review" || true
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          if command -v gh >/dev/null 2>&1; then
            gh release create "$tag" \
              reports/universal-mission-interface-v23-qa.json \
              reports/universal-mission-interface-v23-demo-run.json \
              reports/universal-mission-interface-v23-audit.json \
              evidence/demo/universal-mission-interface-v23-reference-docket.json \
              --title "GoalOS Universal Mission Interface V23" \
              --notes "One-box Mission OS interface. Browser-local. No user data, no funds, no wallet, no transaction. Human review required." || true
          fi
