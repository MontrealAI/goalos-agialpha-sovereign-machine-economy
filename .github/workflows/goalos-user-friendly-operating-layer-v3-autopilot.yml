name: GoalOS User-Friendly Operating Layer V3 — Usable Institution Upgrade

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files back to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages after the update"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issues:
        description: "Create public follow-up issues"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after success"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag when create_release=true"
        required: true
        default: "v0.15.0-user-friendly-operating-layer-v3"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ inputs.release_tag }}

concurrency:
  group: goalos-user-friendly-operating-layer-v3-${{ github.ref }}
  cancel-in-progress: false

jobs:
  user-friendly-operating-layer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

