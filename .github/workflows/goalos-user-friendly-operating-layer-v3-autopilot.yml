      - name: Run installer and QA audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_goalos_user_friendly_operating_layer_v3.py
          python - <<'PY'
          import json, pathlib
          report = json.loads(pathlib.Path('reports/user-friendly-operating-layer-v3-qa.json').read_text())
          if report.get('status') != 'passed':
              raise SystemExit(report)
          print('QA passed:', report['pages_checked'], 'pages checked')
          PY

      - name: Commit User-Friendly Operating Layer V3
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md public docs examples .github/ISSUE_TEMPLATE reports content .nojekyll scripts/install_goalos_user_friendly_operating_layer_v3.py
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'Add GoalOS User-Friendly Operating Layer V3'
            git push
          fi

      - name: Create user-friendly follow-up issues
        if: ${{ inputs.create_issues == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/goalos-issues
          cat > /tmp/goalos-issues/ux_review.md <<'EOF'
          ## Purpose
          Review the new user-friendly operating layer and confirm that a non-technical visitor can understand where to start, what is real, what is simulated, and how to inspect evidence.

          ## Checklist
          - [ ] Start Here is clear.
          - [ ] Try GoalOS is safe and understandable.
          - [ ] Evidence Room is easy to navigate.
          - [ ] Validator Room is actionable.
          - [ ] No Data / No Funds boundary is impossible to miss.
          EOF
          cat > /tmp/goalos-issues/proof_run_live.md <<'EOF'
          ## Purpose
          Prepare the Proof Run 001 Live page for the first empirical proof run.

          ## Checklist
          - [ ] Mission selected.
          - [ ] Docket structure confirmed.
          - [ ] Replay path drafted.
          - [ ] Validator seats opened.
          - [ ] Cost/risk ledger template ready.
          EOF
          cat > /tmp/goalos-issues/evidence_room.md <<'EOF'
          ## Purpose
          Make the Evidence Room the public front door to all dockets, reports, parity audits, legal/privacy boundaries, and review paths.

          ## Checklist
          - [ ] Add latest dockets.
          - [ ] Add latest reports.
          - [ ] Add replay links.
          - [ ] Add review issue links.
          - [ ] Confirm all links are public-safe.
          EOF
          create_issue() {
            local title="$1" body="$2"
            if gh issue list --state open --search "$title in:title" --json title --jq '.[].title' | grep -Fx "$title" >/dev/null 2>&1; then
              echo "Issue already exists: $title"
            else
              gh issue create --title "$title" --body-file "$body" --label "user-friendly" || gh issue create --title "$title" --body-file "$body"
            fi
          }
          create_issue 'User-Friendly V3 review — can a visitor understand GoalOS in 3 minutes?' /tmp/goalos-issues/ux_review.md
          create_issue 'Proof Run 001 Live — prepare empirical proof status page' /tmp/goalos-issues/proof_run_live.md
          create_issue 'Evidence Room — keep public proof artifacts easy to inspect' /tmp/goalos-issues/evidence_room.md

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/release_notes.md <<'EOF'
          GoalOS User-Friendly Operating Layer V3

          Adds Start Here, Try GoalOS, Evidence Room, Proof Run 001 Live, Validator Room, Proof Mission Slots, Proof Metrics Dashboard, Glossary, Run Locally, No Data / No Funds, Help Center, issue templates, docs, examples, and QA reports.

          Boundary: no user data, no user funds, no wallet, no transaction, no production authority, human review required.
          EOF
            gh release create "$RELEASE_TAG" --title 'GoalOS User-Friendly Operating Layer V3' --notes-file /tmp/release_notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
