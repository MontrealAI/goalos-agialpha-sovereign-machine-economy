      - name: Run installer, reference demo, and QA audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_proof_carrying_artifact_foundry_v1.py
          python -m json.tool reports/proof-carrying-artifact-foundry-v1-qa.json >/dev/null
          python -m json.tool reports/proof-carrying-artifact-foundry-v1-demo-run.json >/dev/null
          python -m json.tool evidence/demo/proof-carrying-artifact-foundry-v1-reference-docket.json >/dev/null

      - name: Commit Proof-Carrying Artifact Foundry update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content issue-bodies .github .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Proof-Carrying Artifact Foundry V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh issue list --search "Proof-Carrying Artifact Foundry V1 in:title" --json number --jq '.[0].number' | grep -q '[0-9]'; then
            echo "Tracking issue already exists."
          else
            gh issue create               --title "GoalOS Proof-Carrying Artifact Foundry V1"               --body-file issue-bodies/proof-carrying-artifact-foundry-v1.md               --label "public-alpha" --label "proof-carrying-artifact" || true
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG"               --title "GoalOS Proof-Carrying Artifact Foundry V1"               --notes "Adds the browser-local Proof-Carrying Artifact Foundry: raw output becomes reusable capability only after proof, eval, baseline, rollback, scope, challenge, privacy, and replay gates pass."
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
