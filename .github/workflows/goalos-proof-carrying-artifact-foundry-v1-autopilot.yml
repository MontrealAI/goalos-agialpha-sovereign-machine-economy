
name: GoalOS Proof-Carrying Artifact Foundry V1 — The Artifact Earns Authority

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a tracking issue"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag"
        required: true
        default: "v0.26.5-proof-carrying-artifact-foundry-v1"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PACK_ZIP: /tmp/goalos-proof-carrying-artifact-foundry-v1-pack.zip

concurrency:
  group: goalos-proof-carrying-artifact-foundry-v1
  cancel-in-progress: false

jobs:
  foundry:
    name: Install Proof-Carrying Artifact Foundry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

