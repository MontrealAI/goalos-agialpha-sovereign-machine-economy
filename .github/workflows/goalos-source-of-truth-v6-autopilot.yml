name: GoalOS Source-of-Truth V6 — Canonical Website + Proof Refresh

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated source-of-truth files back to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy the refreshed public/ site to GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a public tracking issue with the V6 review checklist"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create or update the GitHub Release after visual approval"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      strict_claim_scan:
        description: "Fail on claim-review signals as well as claim blockers"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag to use if create_release is true"
        required: true
        default: "v0.31.5-source-of-truth-v6"

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: goalos-source-of-truth-v6
  cancel-in-progress: false

jobs:
  build:
    name: Source sync, claim scan, proof docket, route QA
    runs-on: ubuntu-latest
    outputs:
      qa_status: ${{ steps.read_status.outputs.qa_status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Source-of-Truth V6 generator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p scripts
          python - <<'PY'
          import base64
          from pathlib import Path
          payload = ""
          Path('scripts/install_source_of_truth_v6.py').write_bytes(base64.b64decode(payload.encode()))
          PY

      - name: Run Source-of-Truth V6 generator
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_source_of_truth_v6.py

      - name: Run context-aware claim scan
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.strict_claim_scan }}" == "true" ]]; then
            python scripts/validate_claims.py --strict
          else
            python scripts/validate_claims.py
          fi

      - name: Run existing docs/site QA when available
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f scripts/goalos_docs_quality.py ]]; then python scripts/goalos_docs_quality.py || true; fi
          if [[ -f scripts/goalos_site_quality.py ]]; then python scripts/goalos_site_quality.py || true; fi
          if [[ -f scripts/validate_repo.py ]]; then python scripts/validate_repo.py || true; fi
          if [[ -d tests ]]; then python -m pytest || true; fi
          python -m compileall scripts src tests || true

      - name: Read V6 QA status
        id: read_status
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          p = Path('reports/source-of-truth-v6-final-report.json')
          status = 'missing'
          if p.exists():
              status = json.loads(p.read_text()).get('status', 'unknown')
          print(f'qa_status={status}')
          PY

      - name: Commit Source-of-Truth V6 update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add README.md WORKFLOWS.md package.json pyproject.toml public docs reports evidence replay content scripts issue-bodies .nojekyll 2>/dev/null || true
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "GoalOS Source-of-Truth V6: canonical website, route QA, proof docket"
            git push
          else
            echo "No source-of-truth changes to commit."
          fi

      - name: Create Source-of-Truth V6 tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ -f issue-bodies/source-of-truth-v6.md ]]; then
            gh issue create               --title "GoalOS Source-of-Truth V6 review — website, proof docket, route QA"               --body-file issue-bodies/source-of-truth-v6.md               --label "source-of-truth,website,proof-run-001" || true
          fi

      - name: Prepare release notes
        if: ${{ inputs.create_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/goalos-source-of-truth-v6-release.md <<'MD'
          # GoalOS Source-of-Truth V6

          Canonical source sync, context-aware claim scanner, refreshed Proof Run 001 docket, route-health QA, workflow tiers, release-state metadata, and public website source alignment.

          Boundary: no user data, no user funds, no wallet, no transaction, no network call, no production authority, human review required.
          MD

      - name: Create or update GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          gh release create "$tag" --title "GoalOS Source-of-Truth V6" --notes-file /tmp/goalos-source-of-truth-v6-release.md ||           gh release edit "$tag" --title "GoalOS Source-of-Truth V6" --notes-file /tmp/goalos-source-of-truth-v6-release.md

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Upload Source-of-Truth V6 QA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-of-truth-v6-reports
          path: |
            reports/source-of-truth-v6-*.json
            reports/website-source-of-truth-v6-*.json
            reports/claim-scan.json
            evidence/proof-run-001/proof-run-001-source-of-truth-v6.json
            content/goalos/release-state.json
            content/goalos/demo-ecosystem-registry.json
            WORKFLOWS.md
          if-no-files-found: warn

  deploy:
    name: Deploy GitHub Pages
    if: ${{ inputs.deploy_pages == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
