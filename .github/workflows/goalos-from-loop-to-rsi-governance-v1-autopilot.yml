      - name: Install From Loop to RSI Governance Lab
        run: |
          set -euo pipefail
          python scripts/install_from_loop_to_rsi_governance_v1.py
          python scripts/run_from_loop_to_rsi_governance_v1_demo.py
          python scripts/goalos_from_loop_to_rsi_governance_v1_audit.py

      - name: Show generated report
        run: |
          set -euo pipefail
          cat reports/from-loop-to-rsi-governance-v1-qa.json
          git status --short

      - name: Commit generated update
        if: ${{ inputs.commit_changes == true }}
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "actions@github.com"
          git add README.md public docs examples scripts reports evidence content .github/ISSUE_TEMPLATE issue-bodies || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS From Loop to RSI Governance Lab V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == true }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh issue list --search "From Loop to RSI Governance Lab V1 in:title" --json number --jq '.[0].number' | grep -q .; then
            echo "Tracking issue already exists."
          else
            gh issue create \
              --title "GoalOS From Loop to RSI Governance Lab V1" \
              --body-file issue-bodies/from-loop-to-rsi-governance-v1.md \
              --label "demo-feedback" || true
          fi

      - name: Create release
        if: ${{ inputs.create_release == true }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" \
              --title "GoalOS From Loop to RSI Governance Lab V1" \
              --notes-file docs/demos/FROM_LOOP_TO_RSI_GOVERNANCE_V1.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == true }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == true }}
        id: deployment
        uses: actions/deploy-pages@v5
