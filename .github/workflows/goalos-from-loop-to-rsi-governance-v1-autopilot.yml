name: GoalOS From Loop to RSI Governance Lab V1 — Build the Governance Institution First

'on':
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files to the repository"
        required: true
        default: true
        type: boolean
      deploy_pages:
        description: "Deploy the public site with GitHub Pages"
        required: true
        default: true
        type: boolean
      create_issue:
        description: "Create a tracking issue"
        required: true
        default: true
        type: boolean
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag to use when create_release is true"
        required: true
        default: "v0.33.7-from-loop-to-rsi-governance-v1"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-from-loop-to-rsi-governance-v1
  cancel-in-progress: false

jobs:
  from-loop-to-rsi:
    name: Build From Loop to RSI Governance Lab
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == true }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

