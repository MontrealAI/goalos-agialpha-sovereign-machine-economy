          print('Extracted Public Proof Ledger V1 pack')
          INNERPY
      - name: Generate ledger data, reports, and page indexes
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_public_proof_ledger_v1.py
          python scripts/run_public_proof_ledger_v1_demo.py
          python scripts/goalos_public_proof_ledger_v1_audit.py
      - name: Commit Public Proof Ledger update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add public/proof-ledger.html public/assets/goalos-proof-ledger-v1.css public/assets/goalos-proof-ledger-v1.js public/assets/goalos-proof-ledger-data.js docs/demos/PUBLIC_PROOF_LEDGER_V1.md docs/reviewer/HOW_TO_USE_PUBLIC_PROOF_LEDGER.md examples/proof-ledger/public-safe-review-route.md scripts/install_public_proof_ledger_v1.py scripts/run_public_proof_ledger_v1_demo.py scripts/goalos_public_proof_ledger_v1_audit.py evidence/proof-ledger/public-proof-ledger-v1-reference-ledger.json reports/public-proof-ledger-v1-qa.json reports/public-proof-ledger-v1-demo-run.json reports/public-proof-ledger-v1-install-report.json content/goalos/public-proof-ledger-v1.json .github/ISSUE_TEMPLATE/public_proof_ledger_feedback.yml issue-bodies/public-proof-ledger-v1.md README.md public/index.html public/search-index.json public/sitemap.xml .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Public Proof Ledger V1"
            git push
          fi
      - name: Create public-safe review issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue create --title "Review: GoalOS Public Proof Ledger V1" --body-file issue-bodies/public-proof-ledger-v1.md --label "proof-ledger,review,public-safe" || true
      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" --title "GoalOS Public Proof Ledger V1" --notes "Unified public evidence registry for GoalOS proof surfaces, dockets, reports, review paths, and Proof Run 001 readiness. Boundary: no user data, no user funds, no wallet, no transaction, no network call, human review required."
          fi
      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
