      - name: Commit value realization update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .nojekyll public docs examples scripts evidence reports content .github issue-bodies || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Value Realization Control Room V1"
            git push
          fi
      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh issue list --search "GoalOS Value Realization Control Room V1 in:title" --json number --jq '.[0].number' | grep -q '[0-9]'; then
            echo "Tracking issue already exists."
          else
            gh issue create --title "GoalOS Value Realization Control Room V1" --body-file issue-bodies/value-realization-control-room-v1.md --label "demo" --label "proof" || true
          fi
      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists: $TAG"
          else
            gh release create "$TAG" --title "GoalOS Value Realization Control Room V1" --notes "Adds the browser-local Value Realization Control Room: accepted proof → reusable capability → value ledger → capacity allocation → harder mission. Boundary: no user data, no user funds, no wallet, no transaction, no network call, no production authority."
          fi
      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5
