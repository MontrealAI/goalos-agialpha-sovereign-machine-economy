name: GoalOS Value Realization Control Room V1 — Verified Work Becomes Allocable Capacity

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files back to the repository"
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages"
        type: boolean
        default: true
      create_issue:
        description: "Create a tracking issue"
        type: boolean
        default: true
      create_release:
        description: "Create a GitHub Release"
        type: boolean
        default: false
      release_tag:
        description: "Release tag"
        type: string
        default: "v0.28.5-value-realization-control-room-v1"

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  value-realization-control-room:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
