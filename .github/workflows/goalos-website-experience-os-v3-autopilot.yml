name: GoalOS Website Experience OS V3 — Final Navigation + Dynamic Consoles

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated website updates to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy public/ to GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a tracking issue with the QA summary"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag to use if create_release is true"
        required: true
        default: "v0.31.2-website-experience-os-v3"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  website-experience-os-v3:
    name: Build elite website navigation, consoles, registry, and Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.11"

      - name: Install Website Experience OS V3
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/goalos_website_experience_os_v3.py <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone
          import json, html, re, os, hashlib
          from xml.sax.saxutils import escape

          ROOT = Path('.')
          PUBLIC = ROOT / 'public'
          ASSETS = PUBLIC / 'assets'
          REPORTS = ROOT / 'reports'
          DOCS = ROOT / 'docs'
          WEBSITE_DOCS = DOCS / 'website'
          REVIEWER_DOCS = DOCS / 'reviewer'
          EVIDENCE = ROOT / 'evidence' / 'demo'
          CONTENT = ROOT / 'content' / 'goalos'
          ISSUES = ROOT / 'issue-bodies'
          for d in [PUBLIC, ASSETS, REPORTS, WEBSITE_DOCS, REVIEWER_DOCS, EVIDENCE, CONTENT, ISSUES]:
              d.mkdir(parents=True, exist_ok=True)

          NOW = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z')
          BASE_URL = 'https://montrealai.github.io/goalos-agialpha-sovereign-machine-economy/'

          CANONICAL = [
              {'path':'index.html','title':'Home','category':'Start','role':'front-door','thesis':'Turn AI work into verified capability.','description':'Institutional homepage and proof journey.'},
              {'path':'start-here.html','title':'Start Here','category':'Start','role':'onboarding','thesis':'Find the right path in 60 seconds.','description':'Beginner route for non-technical users.'},
              {'path':'pathfinder.html','title':'Pathfinder','category':'Start','role':'route-engine','thesis':'Choose your role; get a proof path.','description':'Role-based navigation for users, reviewers, builders, and institutions.'},
              {'path':'proof-experience-atlas.html','title':'Proof Experience Atlas','category':'Start','role':'guided-journey','thesis':'One guided public proof journey.','description':'Unified tour across the demo ecosystem.'},
              {'path':'website-operating-system.html','title':'Website Operating System','category':'Start','role':'site-os','thesis':'The public proof institution map.','description':'Complete operating map of the website.'},
              {'path':'demo-ecosystem-registry.html','title':'Demo Ecosystem Registry','category':'Registry','role':'route-registry','thesis':'Every demo becomes routeable.','description':'Canonical registry for demo engines, inputs, gates, outputs, and state transitions.'},
              {'path':'proof-ledger.html','title':'Public Proof Ledger','category':'Evidence','role':'ledger','thesis':'One registry for every proof surface.','description':'Evidence, reports, pages, and reviewer paths in one public ledger.'},
              {'path':'proof-run-001-docket.html','title':'Proof Run 001 Docket','category':'Evidence','role':'evidence-docket','thesis':'Architecture becomes reviewable evidence.','description':'First real repository-readiness Evidence Docket.'},
              {'path':'proof-run-001-execution-room.html','title':'Proof Run 001 Execution Room','category':'Mission','role':'execution-room','thesis':'From architecture to first docket.','description':'Operating room for preparing Proof Run 001.'},
              {'path':'proof-mission-forge.html','title':'Proof Mission Forge','category':'Mission','role':'mission-generator','thesis':'Turn an objective into a proof mission.','description':'Generate a Mission Contract, Evidence Docket plan, validator packet, and issue draft.'},
              {'path':'proof-mission-control.html','title':'Proof Mission Control','category':'Mission','role':'mission-board','thesis':'See what is ready, blocked, and missing.','description':'Public operating board for Proof Run 001 mission readiness.'},
              {'path':'external-reviewer-replay-room.html','title':'External Reviewer Replay Room','category':'Review','role':'reviewer-module','thesis':'Independent review makes proof real.','description':'Replay, accept, reject, revise, or dissent.'},
              {'path':'validator-council-arena.html','title':'Validator Council Arena','category':'Review','role':'validator-module','thesis':'Trust is not one judge. It is a validator council.','description':'Commit-reveal, challenge, dissent, and validation ceremony.'},
              {'path':'multi-agent-institution.html','title':'Multi-Agent Institution','category':'Core Demo','role':'orchestration-layer','thesis':'Not a swarm. An institution.','description':'Compare raw swarms to proof-governed institutions.'},
              {'path':'proof-gradient-lab.html','title':'Proof Gradient Lab','category':'Core Demo','role':'scoring-module','thesis':'No proof, no evolution.','description':'Score is advisory; gates are mandatory.'},
              {'path':'evidence-docket-theatre.html','title':'Evidence Docket Theatre','category':'Core Demo','role':'evidence-module','thesis':'A proof page is not a marketing page.','description':'Turn public-safe claims into reviewable Evidence Dockets.'},
              {'path':'proof-to-action-command-room.html','title':'Proof-to-Action Command Room','category':'Core Demo','role':'orchestration-layer','thesis':'The deliverable is a governed decision state.','description':'Move from objective to docket to decision to action graph.'},
              {'path':'capability-compounding-lab.html','title':'Capability Compounding Lab','category':'Core Demo','role':'capability-package-generator','thesis':'Verified work becomes reusable capability.','description':'Mission → proof → Chronicle → capability → harder mission.'},
              {'path':'sovereign-experience-stream-lab.html','title':'Sovereign Experience Stream Lab','category':'Core Demo','role':'experience-module','thesis':'Proof becomes governed experience.','description':'Experience streams, reward ledgers, router proposals, temporal options.'},
              {'path':'proof-settlement-chronicle-lab.html','title':'Proof-Settlement Chronicle Lab','category':'Core Demo','role':'receipt-audit-module','thesis':'No ProofBundle, no settlement.','description':'Request → Escrow → Execute → ProofBundle → Validate → Settle → Chronicle.'},
              {'path':'falsification-gauntlet.html','title':'Falsification Gauntlet','category':'Core Demo','role':'validator-module','thesis':'Strong claims survive baselines.','description':'Baselines, stress, replay, privacy, risk, and falsification.'},
              {'path':'real-task-benchmark-bridge.html','title':'Real-Task Benchmark Bridge','category':'Benchmark','role':'benchmark-module','thesis':'Demos become benchmark-ready evidence.','description':'Real-task manifest, equal-budget baselines, replay, cost/risk, validators.'},
              {'path':'proof-carrying-artifact-foundry.html','title':'Proof-Carrying Artifact Foundry','category':'Advanced Demo','role':'capability-package-generator','thesis':'The artifact earns authority.','description':'Turn raw output into scoped, evaluated, rollbackable proof-carrying artifacts.'},
              {'path':'evolution-ledger-control-room.html','title':'Evolution Ledger Control Room','category':'Advanced Demo','role':'ledger-module','thesis':'The ledger remembers proof, not secrets.','description':'Public proof commitments, attestations, selection records, challenge windows, rollback receipts.'},
              {'path':'proof-backed-upgrade-rights-room.html','title':'Proof-Backed Upgrade Rights Room','category':'Advanced Demo','role':'upgrade-rights-module','thesis':'The artifact earns an upgrade right.','description':'Proof, eval, scope, canary, monitoring, rollback, and challenge window.'},
              {'path':'institutional-deployment-wedge.html','title':'Institutional Deployment Wedge','category':'Adoption','role':'adoption-module','thesis':'One workflow earns the right to scale.','description':'Start with one workflow, docket it, canary it, monitor it, rollback if needed.'},
              {'path':'value-realization-control-room.html','title':'Value Realization Control Room','category':'Adoption','role':'value-module','thesis':'Verified work becomes allocable capacity.','description':'Accepted proof → capability → value ledger → capacity allocation → harder missions.'},
              {'path':'open-ended-work-engine.html','title':'Open-Ended Work Engine','category':'Advanced Demo','role':'generation-module','thesis':'Generate tasks. Gate descendants.','description':'Open-ended work generation tethered to proof gates.'},
              {'path':'action-reason-trace-contract.html','title':'Action-Reason Trace Contract','category':'Action','role':'action-governance-module','thesis':'Every action must carry a reason.','description':'Scope, reason, observation, validation, cost/risk, rollback, and evidence pointer.'},
              {'path':'frontier-release-room.html','title':'Frontier Release Room','category':'Frontier','role':'release-governance','thesis':'Evidence-governed frontier release decisions.','description':'Restriction, access, rollback, and restore decisions under proof gates.'},
              {'path':'console.html','title':'Proof Console','category':'Hands-on','role':'console','thesis':'The console makes proof visible.','description':'Interactive command center and proof state visibility.'},
              {'path':'try-goalos.html','title':'Try GoalOS','category':'Hands-on','role':'user-demo','thesis':'Try the proof loop safely.','description':'Browser-local user entry demo.'},
              {'path':'docket-builder.html','title':'Docket Builder','category':'Hands-on','role':'docket-generator','thesis':'Build a public-safe docket.','description':'Guided construction of proof artifacts.'},
              {'path':'site-map.html','title':'Site Map','category':'Start','role':'site-index','thesis':'Everything remains discoverable.','description':'Complete route list.'},
              {'path':'trust-boundary.html','title':'Trust Boundary','category':'Trust','role':'boundary','thesis':'No user data. No user funds.','description':'Privacy, data, token, claim, and public-alpha boundary.'},
              {'path':'privacy.html','title':'Privacy','category':'Trust','role':'boundary','thesis':'We do not want your data.','description':'Privacy notice.'},
              {'path':'data-boundary.html','title':'Data Boundary','category':'Trust','role':'boundary','thesis':'Do not submit private data.','description':'Data boundary guidance.'},
              {'path':'token-boundary.html','title':'Token Boundary','category':'Trust','role':'boundary','thesis':'Public contract identification only.','description':'$AGIALPHA is not available from us.'},
              {'path':'no-data-no-funds.html','title':'No Data / No Funds','category':'Trust','role':'boundary','thesis':'No user data. No user funds.','description':'Public-alpha hard boundary.'},
              {'path':'research-spine.html','title':'Research Spine','category':'Docs','role':'research','thesis':'The papers are the canon.','description':'Research lineage and paper-to-product mapping.'},
              {'path':'meta-agentic-alpha-agi.html','title':'Meta-Agentic α-AGI','category':'Legacy / Canon','role':'legacy-demo','thesis':'A mind that builds minds.','description':'Original meta-agentic concept surface.'},
              {'path':'agi-alpha-node-v0.html','title':'AGI Alpha Node v0','category':'Legacy / Canon','role':'legacy-demo','thesis':'The sovereign node theatre.','description':'Node runtime concept surface.'},
              {'path':'agi-jobs-v0-v2.html','title':'AGI Jobs v0/v2','category':'Legacy / Canon','role':'legacy-demo','thesis':'Proof-bearing machine labor.','description':'AGI Jobs concept surface.'},
          ]

          created_pages = {
              'index.html','pathfinder.html','website-operating-system.html','demo-ecosystem-registry.html','site-map.html','trust-boundary.html'
          }

          existing_html = sorted([p for p in PUBLIC.glob('*.html') if p.is_file()])
          existing_paths = {p.name for p in existing_html} | created_pages
          canonical_by_path = {item['path']: item for item in CANONICAL}
          routes = []
          for item in CANONICAL:
              live = item['path'] in existing_paths
              e = dict(item)
              e['live'] = live
              e['url'] = item['path']
              e['absoluteUrl'] = BASE_URL + item['path']
              routes.append(e)
          for p in existing_html:
              if p.name not in canonical_by_path:
                  title = p.stem.replace('-', ' ').replace('_', ' ').title()
                  text = p.read_text(errors='ignore')[:5000]
                  m = re.search(r'<title>(.*?)</title>', text, re.I|re.S)
                  if m:
                      title = re.sub(r'\s+', ' ', html.unescape(m.group(1))).strip()
                  routes.append({'path':p.name,'url':p.name,'absoluteUrl':BASE_URL+p.name,'title':title,'category':'Additional','role':'additional-page','thesis':'Additional public page.','description':'Existing public site page preserved and indexed.','live':True})
          routes = sorted(routes, key=lambda r: (not r.get('live', False), r.get('category',''), r.get('title','')))
          live_routes = [r for r in routes if r.get('live')]
          categories = sorted(set(r['category'] for r in live_routes))
          core_demo_count = len([r for r in live_routes if r['category'] in ['Core Demo','Advanced Demo','Benchmark','Adoption','Action','Review']])

          def jdump(obj):
              return json.dumps(obj, ensure_ascii=False, indent=2)

          site_index = {
              'generatedAt': NOW,
              'baseUrl': BASE_URL,
              'boundary': {
                  'noUserData': True,
                  'noUserFunds': True,
                  'noWallet': True,
                  'noTransaction': True,
                  'noNetworkCall': True,
                  'noProductionAuthority': True,
                  'humanReviewRequired': True,
                  'tokenBoundary': '$AGIALPHA public contract identification only; not available from us.'
              },
              'stats': {
                  'institutions': 1,
                  'livePages': len(live_routes),
                  'coreDemos': core_demo_count,
                  'externalActions': 0,
                  'missionSpace': '∞',
                  'humanBoundary': 1,
              },
              'routes': live_routes,
              'expectedButNotFound': [r for r in routes if not r.get('live')],
              'categories': categories,
              'journey': [r for r in live_routes if r['path'] in [
                  'multi-agent-institution.html','proof-gradient-lab.html','evidence-docket-theatre.html','proof-to-action-command-room.html','capability-compounding-lab.html','sovereign-experience-stream-lab.html','proof-settlement-chronicle-lab.html','falsification-gauntlet.html','real-task-benchmark-bridge.html','proof-carrying-artifact-foundry.html','evolution-ledger-control-room.html','proof-backed-upgrade-rights-room.html','institutional-deployment-wedge.html','value-realization-control-room.html','open-ended-work-engine.html','validator-council-arena.html','action-reason-trace-contract.html'
              ]]
          }

          (ASSETS/'goalos-site-index-data-v3.js').write_text('window.GOALOS_SITE_INDEX_V3 = '+json.dumps(site_index, ensure_ascii=False, indent=2)+';\n', encoding='utf-8')
          (CONTENT/'public-proof-navigation-v3.json').write_text(jdump(site_index), encoding='utf-8')
          (CONTENT/'website-experience-os-v3.json').write_text(jdump({'name':'GoalOS Website Experience OS V3','generatedAt':NOW,'routes':len(live_routes),'coreDemos':core_demo_count,'status':'generated'}), encoding='utf-8')

          CSS = r'''
          :root{
            --bg:#030812; --ink:#f9f6ec; --muted:#b7c6d8; --dim:#8191a7; --line:rgba(255,255,255,.16);
            --glass:rgba(255,255,255,.075); --glass2:rgba(255,255,255,.12); --gold:#ffe86c; --mint:#66ffd2; --cyan:#7be7ff; --violet:#a78bff; --rose:#ff78a8;
            --shadow:0 28px 80px rgba(0,0,0,.42); --radius:28px; --max:1360px;
          }
          *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:radial-gradient(circle at 10% 20%,rgba(64,255,210,.16),transparent 34%),radial-gradient(circle at 92% 10%,rgba(82,142,255,.16),transparent 32%),linear-gradient(135deg,#061716,#0b1324 55%,#030711);color:var(--ink);font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;overflow-x:hidden} a{color:inherit} button,input,select,textarea{font:inherit}.gos-page{min-height:100vh;position:relative}.gos-grid-bg{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:56px 56px;mask-image:linear-gradient(to bottom,black,rgba(0,0,0,.82),transparent 95%);z-index:-4}.gos-nebula{position:fixed;inset:-20%;pointer-events:none;background:radial-gradient(circle at 30% 40%,rgba(102,255,210,.2),transparent 28%),radial-gradient(circle at 70% 45%,rgba(167,139,255,.16),transparent 27%),conic-gradient(from 0deg,rgba(255,232,108,.08),rgba(102,255,210,.04),rgba(123,231,255,.08),rgba(255,120,168,.04),rgba(255,232,108,.08));filter:blur(38px);animation:gos-drift 18s linear infinite;z-index:-5}.gos-particles{position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(102,255,210,.5) 0 1px,transparent 1.5px),radial-gradient(circle,rgba(255,232,108,.34) 0 1px,transparent 1.5px);background-size:170px 170px,230px 230px;background-position:0 0,40px 70px;opacity:.38;animation:gos-float 30s linear infinite;z-index:-3}@keyframes gos-drift{to{transform:rotate(360deg)}}@keyframes gos-float{to{background-position:200px -260px,-180px 240px}}
          .gos-wrap{width:min(var(--max),calc(100% - 44px));margin:auto}.gos-nav{position:sticky;top:18px;z-index:50;margin:28px auto 0;width:min(var(--max),calc(100% - 44px));display:flex;align-items:center;justify-content:space-between;gap:20px;padding:16px 18px;border:1px solid rgba(255,255,255,.18);border-radius:28px;background:rgba(3,8,18,.78);backdrop-filter:blur(22px);box-shadow:0 20px 70px rgba(0,0,0,.35)}.gos-brand{display:flex;gap:14px;align-items:center;text-decoration:none}.gos-logo{width:42px;height:42px;border-radius:14px;background:radial-gradient(circle at 25% 22%,var(--gold),var(--mint) 32%,var(--cyan) 65%,var(--violet));box-shadow:0 0 36px rgba(102,255,210,.35);position:relative}.gos-logo:after{content:'α';position:absolute;inset:0;display:grid;place-items:center;color:#07101a;font-size:24px;font-weight:1000}.gos-brand strong{display:block;letter-spacing:.25em;font-size:14px}.gos-brand span{display:block;color:var(--muted);letter-spacing:.28em;font-size:10px;margin-top:3px}.gos-links{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:wrap}.gos-links a,.gos-links button{border:0;text-decoration:none;color:#eff6ff;background:transparent;border-radius:999px;padding:10px 13px;font-weight:850;font-size:13px;cursor:pointer}.gos-links a:hover,.gos-links button:hover,.gos-links .active{background:rgba(255,255,255,.13)}.gos-menu-button{display:none}.gos-hero{padding:130px 0 70px}.gos-hero-grid{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(460px,.85fr);gap:70px;align-items:center}.gos-kicker{display:flex;gap:10px;align-items:center;color:var(--gold);letter-spacing:.44em;text-transform:uppercase;font-size:13px;font-weight:1000;margin:0 0 22px}.gos-kicker:before{content:'';width:10px;height:10px;border-radius:50%;background:var(--mint);box-shadow:0 0 22px var(--mint)}.gos-h1{font-size:clamp(64px,8.6vw,132px);line-height:.82;letter-spacing:-.085em;margin:0 0 28px}.gos-h1 em{font-family:Georgia,serif;font-style:italic;font-weight:400;background:linear-gradient(100deg,var(--gold),var(--mint),var(--cyan),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent}.gos-subtitle{font-size:clamp(24px,3vw,35px);line-height:1.04;letter-spacing:-.04em;font-weight:950;margin:0 0 22px}.gos-copy{max-width:760px;color:#d3deec;font-size:18px;line-height:1.65}.gos-actions{display:flex;flex-wrap:wrap;gap:12px;margin:28px 0}.gos-btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border:1px solid rgba(255,255,255,.17);border-radius:999px;padding:14px 19px;text-decoration:none;font-weight:950;color:#06101a;background:linear-gradient(90deg,var(--gold),var(--mint));box-shadow:0 10px 32px rgba(102,255,210,.18)}.gos-btn.secondary{color:#fff;background:rgba(255,255,255,.1)}.gos-btn.ghost{color:var(--mint);background:transparent}.gos-boundary{border:1px solid rgba(255,120,168,.46);background:linear-gradient(110deg,rgba(255,120,168,.12),rgba(102,255,210,.05));border-radius:18px;padding:16px 18px;color:#fff;font-weight:850;line-height:1.45;margin-top:26px}.gos-console{position:relative;border:1px solid rgba(255,255,255,.20);background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.045));backdrop-filter:blur(20px);border-radius:34px;box-shadow:var(--shadow);overflow:hidden}.gos-console:before{content:'';position:absolute;inset:-1px;background:linear-gradient(120deg,rgba(255,232,108,.18),transparent,rgba(102,255,210,.18),transparent,rgba(167,139,255,.16));opacity:.85;pointer-events:none}.gos-console-head{position:relative;display:flex;align-items:center;justify-content:space-between;padding:22px 24px;border-bottom:1px solid rgba(255,255,255,.12)}.gos-console-title{letter-spacing:.28em;text-transform:uppercase;font-size:12px;font-weight:1000;color:#fff}.gos-pill{border:1px solid rgba(102,255,210,.4);color:var(--mint);border-radius:999px;padding:8px 12px;font-weight:950;font-size:12px;background:rgba(102,255,210,.08)}.gos-orbit-stage{position:relative;min-height:350px;display:grid;place-items:center;background:radial-gradient(circle at center,rgba(102,255,210,.12),transparent 45%),linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:auto,28px 28px,28px 28px;overflow:hidden}.gos-core{width:128px;height:128px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 28% 25%,var(--gold),var(--mint) 32%,var(--cyan) 62%,var(--violet));color:#06101a;font-size:62px;font-weight:1000;box-shadow:0 0 80px rgba(102,255,210,.55);z-index:2}.gos-ring{position:absolute;width:300px;height:300px;border:1px dashed rgba(255,232,108,.35);border-radius:50%;animation:gos-spin 24s linear infinite}.gos-ring.r2{width:410px;height:410px;border-color:rgba(123,231,255,.2);animation-duration:38s;animation-direction:reverse}@keyframes gos-spin{to{transform:rotate(360deg)}}.gos-node{position:absolute;width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:#030914;border:1px solid rgba(102,255,210,.78);box-shadow:0 0 26px rgba(102,255,210,.16);font-weight:1000}.gos-node:nth-child(1){transform:translate(0,-190px)}.gos-node:nth-child(2){transform:translate(170px,-80px)}.gos-node:nth-child(3){transform:translate(170px,90px)}.gos-node:nth-child(4){transform:translate(0,190px)}.gos-node:nth-child(5){transform:translate(-170px,90px)}.gos-node:nth-child(6){transform:translate(-170px,-80px)}.gos-console-body{position:relative;padding:24px;display:grid;gap:16px}.gos-proof-rail{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.gos-step{border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:12px;background:rgba(3,8,18,.55)}.gos-step b{display:block;color:#fff;font-size:13px}.gos-step span{display:block;color:var(--muted);font-size:11px;margin-top:5px}.gos-step.active{border-color:rgba(102,255,210,.8);box-shadow:0 0 28px rgba(102,255,210,.18)}.gos-console-log{min-height:126px;border:1px solid rgba(102,255,210,.22);background:rgba(0,0,0,.38);border-radius:16px;padding:14px;color:#7dffd7;font:800 12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace}.gos-stats{display:grid;grid-template-columns:repeat(6,1fr);gap:0;margin:28px 0 74px;border:1px solid rgba(255,255,255,.16);border-radius:24px;overflow:hidden;background:rgba(255,255,255,.075);backdrop-filter:blur(14px)}.gos-stat{padding:24px 18px;border-right:1px solid rgba(255,255,255,.14)}.gos-stat:last-child{border-right:0}.gos-stat strong{display:block;color:var(--gold);font-size:34px}.gos-stat span{display:block;color:#d6e2f0;letter-spacing:.26em;text-transform:uppercase;font-size:11px;font-weight:950;margin-top:8px}.gos-section{padding:62px 0}.gos-section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:24px}.gos-section h2{font-size:clamp(42px,5vw,82px);line-height:.88;letter-spacing:-.07em;margin:0}.gos-section p.lead{color:#ced9e8;font-size:18px;line-height:1.6;max-width:780px}.gos-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.gos-card{position:relative;border:1px solid rgba(255,255,255,.16);background:linear-gradient(145deg,rgba(255,255,255,.105),rgba(255,255,255,.045));border-radius:26px;padding:26px;min-height:210px;box-shadow:0 18px 50px rgba(0,0,0,.24);overflow:hidden}.gos-card:after{content:'';position:absolute;inset:auto -20% -50% 30%;height:150px;background:radial-gradient(circle,rgba(102,255,210,.16),transparent 70%);pointer-events:none}.gos-card h3{font-size:28px;line-height:1;margin:10px 0 12px;letter-spacing:-.04em}.gos-card p{color:#d1dced;line-height:1.55}.gos-tag{display:inline-flex;color:var(--gold);letter-spacing:.28em;text-transform:uppercase;font-size:11px;font-weight:1000}.gos-journey{display:grid;gap:12px}.gos-journey-item{display:grid;grid-template-columns:72px minmax(0,1fr) auto;gap:20px;align-items:center;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.064);border-radius:22px;padding:18px;text-decoration:none}.gos-journey-num{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),var(--mint));color:#06101a;font-weight:1000}.gos-journey h3{margin:0;font-size:22px}.gos-journey p{margin:5px 0 0;color:#c8d5e7}.gos-arrow{color:var(--mint);font-weight:1000}.gos-registry-tools{display:flex;gap:12px;flex-wrap:wrap;margin:18px 0}.gos-input,.gos-select{border:1px solid rgba(255,255,255,.18);background:rgba(4,8,18,.75);border-radius:999px;color:#fff;padding:13px 16px;min-width:240px}.gos-library{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.gos-route{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.065);border-radius:22px;padding:18px;min-height:178px}.gos-route h3{font-size:22px;margin:8px 0}.gos-route p{color:#cbd7e7}.gos-route .meta{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.gos-route .meta span{font-size:11px;border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:6px 8px;color:#dce8f7}.gos-footer{padding:60px 0 90px;color:#cbd7e7}.gos-map-button{position:fixed;right:24px;bottom:22px;z-index:60;border:0;border-radius:999px;padding:13px 18px;background:linear-gradient(90deg,var(--gold),var(--mint));color:#06101a;font-weight:1000;box-shadow:0 16px 44px rgba(0,0,0,.35);cursor:pointer}.gos-palette{position:fixed;inset:0;z-index:100;display:none;place-items:start center;background:rgba(0,0,0,.65);backdrop-filter:blur(16px);padding-top:9vh}.gos-palette.open{display:grid}.gos-palette-box{width:min(780px,calc(100% - 32px));border:1px solid rgba(255,255,255,.18);border-radius:26px;background:#08111e;box-shadow:var(--shadow);overflow:hidden}.gos-palette-header{padding:16px;border-bottom:1px solid rgba(255,255,255,.12)}.gos-palette input{width:100%;border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:15px;background:rgba(255,255,255,.07);color:#fff}.gos-palette-results{max-height:60vh;overflow:auto;padding:10px}.gos-palette-results a{display:block;text-decoration:none;padding:14px;border-radius:16px}.gos-palette-results a:hover,.gos-palette-results a.active{background:rgba(255,255,255,.1)}.gos-palette-results b{display:block}.gos-palette-results span{display:block;color:#aebdd2;font-size:13px;margin-top:3px}.gos-hidden{display:none!important}.gos-a11y-focus:focus{outline:3px solid var(--mint);outline-offset:4px}@media(max-width:1080px){.gos-hero-grid{grid-template-columns:1fr}.gos-card-grid,.gos-library{grid-template-columns:1fr 1fr}.gos-stats{grid-template-columns:repeat(3,1fr)}.gos-proof-rail{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){.gos-nav{align-items:flex-start}.gos-links{display:none}.gos-menu-button{display:inline-flex}.gos-hero{padding-top:80px}.gos-h1{font-size:62px}.gos-card-grid,.gos-library,.gos-stats{grid-template-columns:1fr}.gos-stat{border-right:0;border-bottom:1px solid rgba(255,255,255,.14)}.gos-journey-item{grid-template-columns:1fr}.gos-orbit-stage{min-height:280px}.gos-node{display:none}.gos-ring{width:220px;height:220px}.gos-ring.r2{width:280px;height:280px}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
          '''
          (ASSETS/'goalos-website-os-v3.css').write_text(CSS, encoding='utf-8')

          SHIM_CSS = r'''
          .gos-map-button{position:fixed;right:24px;bottom:22px;z-index:2147483000;border:0;border-radius:999px;padding:13px 18px;background:linear-gradient(90deg,#ffe86c,#66ffd2);color:#06101a;font:900 13px/1 Inter,ui-sans-serif,system-ui,sans-serif;box-shadow:0 16px 44px rgba(0,0,0,.35);cursor:pointer}.gos-palette{position:fixed;inset:0;z-index:2147482999;display:none;place-items:start center;background:rgba(0,0,0,.65);backdrop-filter:blur(16px);padding-top:9vh}.gos-palette.open{display:grid}.gos-palette-box{width:min(780px,calc(100% - 32px));border:1px solid rgba(255,255,255,.18);border-radius:26px;background:#08111e;color:#f9f6ec;box-shadow:0 28px 80px rgba(0,0,0,.42);overflow:hidden}.gos-palette-header{padding:16px;border-bottom:1px solid rgba(255,255,255,.12)}.gos-palette input{width:100%;border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:15px;background:rgba(255,255,255,.07);color:#fff;font:800 15px/1.2 Inter,ui-sans-serif,system-ui,sans-serif}.gos-palette-results{max-height:60vh;overflow:auto;padding:10px}.gos-palette-results a{display:block;text-decoration:none;color:#f9f6ec;padding:14px;border-radius:16px;font-family:Inter,ui-sans-serif,system-ui,sans-serif}.gos-palette-results a:hover,.gos-palette-results a.active{background:rgba(255,255,255,.1)}.gos-palette-results b{display:block}.gos-palette-results span{display:block;color:#aebdd2;font-size:13px;margin-top:3px}.gos-a11y-focus:focus{outline:3px solid #66ffd2;outline-offset:4px}
          '''
          (ASSETS/'goalos-command-palette-v3.css').write_text(SHIM_CSS, encoding='utf-8')

          JS = r'''
          (()=>{
            const data = window.GOALOS_SITE_INDEX_V3 || {routes:[],journey:[],stats:{}};
            const $ = (s,root=document)=>root.querySelector(s);
            const $$ = (s,root=document)=>Array.from(root.querySelectorAll(s));
            const safeRoutes = (data.routes||[]).filter(r=>r.live!==false);
            function openPalette(){let p=$('#gos-palette'); if(p){p.classList.add('open'); const i=$('#gos-palette-input'); if(i){i.focus(); i.select(); renderPalette(i.value||'');}}}
            function closePalette(){let p=$('#gos-palette'); if(p)p.classList.remove('open')}
            function renderPalette(q=''){
              const box=$('#gos-palette-results'); if(!box)return;
              const query=q.trim().toLowerCase();
              const rs=safeRoutes.filter(r=>!query || [r.title,r.category,r.role,r.thesis,r.description].join(' ').toLowerCase().includes(query)).slice(0,70);
              box.innerHTML = rs.map((r,i)=>`<a class="gos-a11y-focus ${i===0?'active':''}" href="${r.url}"><b>${r.title}</b><span>${r.category} · ${r.thesis}</span></a>`).join('') || '<div style="padding:18px;color:#b7c6d8">No route found. Try “docket”, “validator”, “mission”, “token”, “action”, or “benchmark”.</div>';
            }
            function mountPalette(){
              if($('#gos-palette'))return;
              const p=document.createElement('div'); p.id='gos-palette'; p.className='gos-palette'; p.innerHTML=`<div class="gos-palette-box"><div class="gos-palette-header"><input id="gos-palette-input" aria-label="Search GoalOS routes" placeholder="Search GoalOS: docket, validator, mission, action, token, benchmark…"></div><div id="gos-palette-results" class="gos-palette-results"></div></div>`;
              document.body.appendChild(p);
              $('#gos-palette-input').addEventListener('input',e=>renderPalette(e.target.value));
              p.addEventListener('click',e=>{if(e.target===p)closePalette()});
              if(!$('.gos-map-button')){const b=document.createElement('button'); b.className='gos-map-button'; b.textContent='Open site map'; b.addEventListener('click',openPalette); document.body.appendChild(b)}
            }
            document.addEventListener('keydown',e=>{if(e.key==='/' && !/input|textarea|select/i.test(e.target.tagName)){e.preventDefault();openPalette()} if(e.key==='Escape')closePalette()});
            document.addEventListener('click',e=>{if(e.target.matches('[data-command-open]'))openPalette()});
            function proofConsole(){
              const steps=$$('.gos-step'); if(!steps.length)return;
              const log=$('#gos-console-log');
              const lines=['Objective received.','Mission Contract bounded.','Autonomous work simulated locally.','Evidence Docket assembled.','Validator route prepared.','Governed Decision State review-ready.','Chronicle + capability package linked.'];
              let idx=0;
              function tick(){steps.forEach((s,i)=>s.classList.toggle('active',i===idx)); if(log){log.innerHTML=lines.slice(0,idx+1).map((l,i)=>`<div>${String(i+1).padStart(2,'0')} · ${l}</div>`).join('')} idx=(idx+1)%steps.length;}
              tick(); setInterval(tick,1800);
            }
            function routeFilters(){
              const q=$('#gos-registry-query'); const c=$('#gos-registry-category'); const target=$('#gos-registry-list');
              if(!target)return;
              const cats=[...new Set(safeRoutes.map(r=>r.category))].sort(); if(c){c.innerHTML='<option value="">All categories</option>'+cats.map(x=>`<option>${x}</option>`).join('')}
              function render(){
                const query=(q?.value||'').toLowerCase(); const cat=c?.value||'';
                const rs=safeRoutes.filter(r=>(!cat||r.category===cat)&&(!query||[r.title,r.thesis,r.description,r.role,r.category].join(' ').toLowerCase().includes(query))).slice(0,120);
                target.innerHTML=rs.map(r=>`<article class="gos-route"><span class="gos-tag">${r.category}</span><h3>${r.title}</h3><p>${r.description}</p><div class="meta"><span>${r.role}</span><span>${r.thesis}</span></div><a class="gos-btn ghost" href="${r.url}">Open →</a></article>`).join('');
              }
              q?.addEventListener('input',render); c?.addEventListener('change',render); render();
            }
            function pathfinder(){
              const output=$('#gos-path-output'); if(!output)return;
              const paths={
                new:['start-here.html','proof-experience-atlas.html','demo-ecosystem-registry.html'],
                reviewer:['proof-ledger.html','proof-run-001-docket.html','external-reviewer-replay-room.html','validator-council-arena.html'],
                mission:['proof-mission-forge.html','proof-mission-control.html','proof-run-001-execution-room.html'],
                developer:['website-operating-system.html','demo-ecosystem-registry.html','site-map.html'],
                institution:['institutional-deployment-wedge.html','value-realization-control-room.html','trust-boundary.html']
              };
              function label(p){const r=safeRoutes.find(x=>x.path===p);return r?r.title:p}
              function draw(k){const ps=paths[k]||paths.new; output.innerHTML=ps.map((p,i)=>`<a class="gos-journey-item" href="${p}"><span class="gos-journey-num">${i+1}</span><span><h3>${label(p)}</h3><p>${(safeRoutes.find(x=>x.path===p)||{}).thesis||''}</p></span><span class="gos-arrow">Open →</span></a>`).join('')}
              $$('[data-path]').forEach(b=>b.addEventListener('click',()=>draw(b.dataset.path))); draw('new');
            }
            mountPalette(); proofConsole(); routeFilters(); pathfinder();
          })();
          '''
          (ASSETS/'goalos-website-os-v3.js').write_text(JS, encoding='utf-8')

          def nav(active='Start'):
              items=[('index.html','Start'),('proof-experience-atlas.html','Atlas'),('proof-ledger.html','Proof Ledger'),('proof-run-001-docket.html','Proof Run 001'),('demo-ecosystem-registry.html','Registry'),('external-reviewer-replay-room.html','Reviewer Room')]
              links=''.join([f'<a class="gos-a11y-focus {"active" if lab==active else ""}" href="{href}">{lab}</a>' for href,lab in items])
              return f'''<nav class="gos-nav"><a class="gos-brand" href="index.html"><span class="gos-logo"></span><span><strong>GOALOS</strong><span>AGIALPHA ASCENSION</span></span></a><div class="gos-links">{links}<button class="gos-a11y-focus" data-command-open>Search</button></div><button class="gos-menu-button gos-btn secondary" data-command-open>Menu</button></nav>'''

          def shell(title, active, body):
              return f'''<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>{html.escape(title)}</title><meta name="description" content="GoalOS AGIALPHA Ascension — public-alpha proof operating system for autonomous AI work."><meta property="og:title" content="{html.escape(title)}"><meta property="og:description" content="AI creates output. GoalOS creates proof."><meta property="og:image" content="assets/social-preview.svg"><link rel="stylesheet" href="assets/goalos-website-os-v3.css"></head><body><div class="gos-page"><div class="gos-grid-bg"></div><div class="gos-nebula"></div><div class="gos-particles"></div>{nav(active)}{body}</div><script src="assets/goalos-site-index-data-v3.js"></script><script src="assets/goalos-website-os-v3.js"></script></body></html>'''

          journey_items = site_index['journey']
          journey_html = ''.join([f'<a class="gos-journey-item" href="{r["url"]}"><span class="gos-journey-num">{i+1:02d}</span><span><h3>{html.escape(r["title"])}</h3><p>{html.escape(r["thesis"])} · {html.escape(r["description"])}</p></span><span class="gos-arrow">Open →</span></a>' for i,r in enumerate(journey_items)])
          stats = site_index['stats']
          stats_html = ''.join([f'<div class="gos-stat"><strong>{v}</strong><span>{k.replace("livePages","Live Pages").replace("coreDemos","Core Demos").replace("externalActions","External Actions").replace("missionSpace","Mission Space").replace("humanBoundary","Human Boundary").title()}</span></div>' for k,v in stats.items()])
          proof_steps = ['Objective','Mission','Evidence','Validate','Decision','Chronicle','Capability','Review']
          proof_steps_html = ''.join([f'<div class="gos-step"><b>{s}</b><span>{d}</span></div>' for s,d in zip(proof_steps,['Bound the work','Set gates','Assemble docket','Run validator path','Emit state','Store memory','Package reuse','Human boundary'])])
          index_body = f'''
          <main>
            <section class="gos-hero gos-wrap" id="start"><div class="gos-hero-grid">
              <div><p class="gos-kicker">GoalOS AGIALPHA Ascension · Sovereign Machine Economy</p><h1 class="gos-h1">Turn AI work<br>into <em>verified</em><br><em>capability.</em></h1><p class="gos-subtitle">A model can answer. An agent can act. An institution must prove.</p><p class="gos-copy">GoalOS is the proof-governed operating regime for autonomous AI work: Mission Contracts, Evidence Dockets, validator review, governed decision states, Chronicle memory, public proof ledgers, and human-review boundaries.</p><div class="gos-actions"><a class="gos-btn" href="start-here.html">Start Here</a><a class="gos-btn secondary" href="proof-experience-atlas.html">Open the Atlas</a><a class="gos-btn secondary" href="proof-run-001-docket.html">Review Proof Run 001</a><a class="gos-btn ghost" href="demo-ecosystem-registry.html">Demo Registry</a></div><div class="gos-boundary"><b>PUBLIC-ALPHA BOUNDARY</b> &nbsp; No user data. No user funds. No wallet. No transaction. No network call. No production authority. Human review required.</div></div>
              <aside class="gos-console" aria-label="GoalOS proof operating console"><div class="gos-console-head"><span class="gos-console-title">Sovereign Proof Console</span><span class="gos-pill">Browser-local · 0 external actions</span></div><div class="gos-orbit-stage"><div class="gos-ring"></div><div class="gos-ring r2"></div><div class="gos-core">α</div><div class="gos-node">M1</div><div class="gos-node">R2</div><div class="gos-node">V3</div><div class="gos-node">S6</div><div class="gos-node">P6</div><div class="gos-node">N8</div></div><div class="gos-console-body"><div class="gos-proof-rail">{proof_steps_html}</div><div id="gos-console-log" class="gos-console-log"></div><div class="gos-actions"><a class="gos-btn" href="pathfinder.html">Choose Your Path</a><button class="gos-btn secondary" data-command-open>Open Command Palette</button></div></div></aside>
            </div><div class="gos-stats">{stats_html}</div></section>
            <section class="gos-section gos-wrap"><div class="gos-section-head"><div><span class="gos-tag">Choose your path</span><h2>A spectacular launch becomes a usable institution.</h2><p class="lead">Start with a guided path: understand GoalOS, try the proof journey, inspect Evidence Dockets, join external review, propose a mission, or evaluate the institutional adoption wedge.</p></div></div><div class="gos-card-grid"><article class="gos-card"><span class="gos-tag">New User</span><h3>Understand in minutes.</h3><p>Use the Pathfinder and Atlas to see the proof loop without technical background.</p><a class="gos-btn" href="pathfinder.html">Open Pathfinder</a></article><article class="gos-card"><span class="gos-tag">Reviewer</span><h3>Inspect the proof.</h3><p>Open the ledger, review Proof Run 001, replay the reviewer path, and file accept / reject / revise / dissent.</p><a class="gos-btn" href="external-reviewer-replay-room.html">Reviewer Room</a></article><article class="gos-card"><span class="gos-tag">Institution</span><h3>Start with one workflow.</h3><p>Use the deployment wedge and value room to understand how governed improvement can begin safely.</p><a class="gos-btn" href="institutional-deployment-wedge.html">Deployment Wedge</a></article></div></section>
            <section class="gos-section gos-wrap"><div class="gos-section-head"><div><span class="gos-tag">Public proof journey</span><h2>One coherent route through every major demo.</h2><p class="lead">The demos are now a curriculum: institutions, proof gates, dockets, action, capability, experience, settlement, falsification, benchmarks, artifacts, ledgers, validators, and action traces.</p></div><a class="gos-btn secondary" href="demo-ecosystem-registry.html">Open full registry</a></div><div class="gos-journey">{journey_html}</div></section>
            <section class="gos-section gos-wrap"><div class="gos-section-head"><div><span class="gos-tag">Trust boundary</span><h2>Proof-native. Not data-hungry. Not wallet-first.</h2><p class="lead">GoalOS keeps intelligence private and makes public-safe proof inspectable. The demos remain browser-local and do not ask for user data, funds, wallets, transactions, secrets, or production authority.</p></div></div><div class="gos-card-grid"><article class="gos-card"><h3>We do not want your data.</h3><p>Do not submit personal, customer, confidential, regulated, credential, wallet, payment, private-key, seed-phrase, privileged, trade-secret, or proprietary data.</p><a class="gos-btn" href="trust-boundary.html">Read Trust Boundary</a></article><article class="gos-card"><h3>$AGIALPHA boundary.</h3><p>Public contract identification only. Not available from us. No sale, custody, wallet support, investment, trading, legal, tax, exchange, bridge, liquidity, or regulatory advice.</p><a class="gos-btn secondary" href="token-boundary.html">Token Boundary</a></article><article class="gos-card"><h3>Human review required.</h3><p>Every high-impact claim, proof route, upgrade right, action trace, or rollout remains review-ready, not production-authorized.</p><a class="gos-btn secondary" href="proof-run-001-docket.html">Review Docket</a></article></div></section>
          </main><footer class="gos-footer gos-wrap">GoalOS AGIALPHA Ascension — public-alpha proof operating system. AI creates output. GoalOS creates proof.</footer>
          '''
          (PUBLIC/'index.html').write_text(shell('GoalOS AGIALPHA Ascension — Sovereign Machine Economy', 'Start', index_body), encoding='utf-8')

          path_cards = ''.join([f'<article class="gos-card"><span class="gos-tag">{lab}</span><h3>{title}</h3><p>{desc}</p><button class="gos-btn secondary" data-path="{key}">Show path</button></article>' for key,lab,title,desc in [('new','New user','Understand GoalOS','A guided, non-technical route.'),('reviewer','Reviewer','Inspect proof','Dockets, replay, verdict, dissent.'),('mission','Mission owner','Propose a proof mission','Forge, control, execute, review.'),('developer','Developer','Find the implementation map','Registry, site map, docs, QA.'),('institution','Institution','Start safely','One workflow, canary, rollback, value.')]])
          path_body = f'<main class="gos-wrap gos-section"><span class="gos-tag">Pathfinder</span><h1 class="gos-h1" style="font-size:clamp(58px,7vw,108px)">Choose your proof path.</h1><p class="gos-copy">Select your role. GoalOS will show the fastest safe route through the website. No data leaves your browser.</p><div class="gos-card-grid">{path_cards}</div><section class="gos-section"><h2>Your route</h2><div id="gos-path-output" class="gos-journey"></div></section></main>'
          (PUBLIC/'pathfinder.html').write_text(shell('GoalOS Pathfinder — Choose Your Proof Path', 'Start', path_body), encoding='utf-8')

          grouped = {}
          for r in live_routes:
              grouped.setdefault(r['category'], []).append(r)
          os_sections = ''.join([f'<section class="gos-section"><div class="gos-section-head"><div><span class="gos-tag">{html.escape(cat)}</span><h2>{html.escape(cat)}</h2></div></div><div class="gos-library">' + ''.join([f'<article class="gos-route"><h3>{html.escape(r["title"])}</h3><p>{html.escape(r["description"])}</p><div class="meta"><span>{html.escape(r["role"])}</span><span>{html.escape(r["thesis"])}</span></div><a class="gos-btn ghost" href="{r["url"]}">Open →</a></article>' for r in rs]) + '</div></section>' for cat,rs in grouped.items()])
          os_body = f'<main class="gos-wrap gos-section"><span class="gos-tag">Website Operating System</span><h1 class="gos-h1" style="font-size:clamp(58px,7vw,108px)">One site. One proof journey. Every page discoverable.</h1><p class="gos-copy">The public website is organized as an institutional proof front door: start, evidence, review, mission, demos, trust boundary, and docs.</p><div class="gos-actions"><a class="gos-btn" href="pathfinder.html">Open Pathfinder</a><a class="gos-btn secondary" href="demo-ecosystem-registry.html">Demo Registry</a><button class="gos-btn secondary" data-command-open>Search</button></div>{os_sections}</main>'
          (PUBLIC/'website-operating-system.html').write_text(shell('GoalOS Website Operating System', 'Atlas', os_body), encoding='utf-8')

          reg_body = '<main class="gos-wrap gos-section"><span class="gos-tag">Canonical registry</span><h1 class="gos-h1" style="font-size:clamp(58px,7vw,108px)">Every demo becomes routeable.</h1><p class="gos-copy">Search the complete ecosystem by purpose, category, gates, role, or state transition.</p><div class="gos-registry-tools"><input id="gos-registry-query" class="gos-input" placeholder="Search: validator, docket, action, token, mission…"><select id="gos-registry-category" class="gos-select"></select><button class="gos-btn secondary" data-command-open>Command Palette</button></div><div id="gos-registry-list" class="gos-library"></div></main>'
          (PUBLIC/'demo-ecosystem-registry.html').write_text(shell('GoalOS Demo Ecosystem Registry', 'Registry', reg_body), encoding='utf-8')

          sitemap_body = '<main class="gos-wrap gos-section"><span class="gos-tag">Complete Site Map</span><h1 class="gos-h1" style="font-size:clamp(58px,7vw,108px)">Everything remains discoverable.</h1><p class="gos-copy">No pages were removed. This site map is generated from the public route registry.</p>'+os_sections+'</main>'
          (PUBLIC/'site-map.html').write_text(shell('GoalOS Site Map', 'Search', sitemap_body), encoding='utf-8')

          trust_body = '''<main class="gos-wrap gos-section"><span class="gos-tag">Trust Boundary</span><h1 class="gos-h1" style="font-size:clamp(58px,7vw,108px)">No user data. No user funds. Human review required.</h1><p class="gos-copy">GoalOS is a public-alpha proof architecture. The browser demos do not request accounts, wallets, secrets, private data, or funds. Do not submit personal, customer, confidential, regulated, credential, wallet, payment, private-key, seed-phrase, privileged, trade-secret, or proprietary data through public channels.</p><div class="gos-card-grid"><article class="gos-card"><span class="gos-tag">Privacy</span><h3>We do not want your data.</h3><p>Keep private intelligence private. Public proof should use commitments, hashes, attestations, Evidence Dockets, and public-safe summaries.</p></article><article class="gos-card"><span class="gos-tag">Token boundary</span><h3>Public contract address only.</h3><p>$AGIALPHA is not available from us. No sale, custody, wallet support, exchange support, bridge support, liquidity support, or investment/trading/legal/tax/regulatory advice.</p></article><article class="gos-card"><span class="gos-tag">Claim boundary</span><h3>Public-alpha, review-ready.</h3><p>No achieved AGI, achieved ASI, empirical SOTA, production certification, mainnet authorization, or guaranteed outcomes are claimed.</p></article></div></main>'''
          (PUBLIC/'trust-boundary.html').write_text(shell('GoalOS Trust Boundary', 'Search', trust_body), encoding='utf-8')

          # social preview svg
          svg = '''<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#061716"/><stop offset=".55" stop-color="#0b1324"/><stop offset="1" stop-color="#030711"/></linearGradient><radialGradient id="a" cx="35%" cy="35%" r="60%"><stop offset="0" stop-color="#ffe86c"/><stop offset=".34" stop-color="#66ffd2"/><stop offset=".68" stop-color="#7be7ff"/><stop offset="1" stop-color="#a78bff"/></radialGradient></defs><rect width="1200" height="630" fill="url(#g)"/><g opacity=".18" stroke="#fff"><path d="M0 90h1200M0 180h1200M0 270h1200M0 360h1200M0 450h1200M0 540h1200M100 0v630M200 0v630M300 0v630M400 0v630M500 0v630M600 0v630M700 0v630M800 0v630M900 0v630M1000 0v630M1100 0v630"/></g><circle cx="945" cy="315" r="110" fill="none" stroke="#ffe86c" stroke-dasharray="6 8" opacity=".65"/><circle cx="945" cy="315" r="72" fill="url(#a)"/><text x="945" y="345" text-anchor="middle" font-size="86" font-family="Arial Black,Arial" fill="#04111a">α</text><text x="84" y="120" font-size="26" font-weight="900" letter-spacing="10" font-family="Arial" fill="#ffe86c">GOALOS AGIALPHA ASCENSION</text><text x="84" y="250" font-size="76" font-weight="900" font-family="Arial" fill="#f9f6ec">AI creates output.</text><text x="84" y="340" font-size="86" font-weight="900" font-family="Arial" fill="#66ffd2">GoalOS creates proof.</text><text x="84" y="430" font-size="32" font-family="Arial" fill="#d6e2f0">No user data. No user funds. Human review required.</text><rect x="84" y="490" width="560" height="64" rx="24" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.25)"/><text x="112" y="532" font-size="24" font-weight="800" font-family="Arial" fill="#f9f6ec">Public-alpha proof operating system</text></svg>'''
          (ASSETS/'social-preview.svg').write_text(svg, encoding='utf-8')

          # Inject command palette and CSS into existing pages without replacing content
          inject_css = '<link rel="stylesheet" href="assets/goalos-command-palette-v3.css">'
          inject_scripts = '<script src="assets/goalos-site-index-data-v3.js"></script><script src="assets/goalos-website-os-v3.js"></script>'
          for p in PUBLIC.glob('*.html'):
              if p.name in created_pages:
                  continue
              txt = p.read_text(errors='ignore')
              changed = False
              if 'goalos-website-os-v3.css' not in txt and '</head>' in txt.lower():
                  txt = re.sub(r'</head>', inject_css + '\n</head>', txt, flags=re.I)
                  changed = True
              if 'goalos-website-os-v3.js' not in txt and '</body>' in txt.lower():
                  txt = re.sub(r'</body>', inject_scripts + '\n</body>', txt, flags=re.I)
                  changed = True
              if changed:
                  p.write_text(txt, encoding='utf-8')

          # search index + sitemap
          (PUBLIC/'search-index.json').write_text(json.dumps([{'title':r['title'],'url':r['url'],'category':r['category'],'description':r['description'],'thesis':r['thesis']} for r in live_routes], ensure_ascii=False, indent=2), encoding='utf-8')
          urls='\n'.join([f'  <url><loc>{escape(BASE_URL+r["url"])}</loc></url>' for r in live_routes])
          (PUBLIC/'sitemap.xml').write_text(f'<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n{urls}\n</urlset>\n', encoding='utf-8')
          (PUBLIC/'.nojekyll').write_text('', encoding='utf-8')

          # Docs and reports
          WEBSITE_DOCS.joinpath('WEBSITE_EXPERIENCE_OS_V3.md').write_text(f'''# GoalOS Website Experience OS V3\n\nGenerated: {NOW}\n\nGoalOS Website Experience OS V3 turns the public site into a coherent proof operating surface: homepage, Pathfinder, command palette, demo registry, site map, and trust boundary.\n\n## What changed\n\n- Rebuilt `public/index.html` as an institutional front door.\n- Added `public/pathfinder.html` for role-based routing.\n- Added `public/website-operating-system.html` as a complete operating map.\n- Refreshed `public/demo-ecosystem-registry.html`.\n- Refreshed `public/site-map.html`.\n- Added `public/trust-boundary.html`.\n- Added browser-local command palette.\n\n## Boundary\n\nNo user data. No user funds. No wallet. No transaction. No network call. No production authority. Human review required.\n''', encoding='utf-8')
          REVIEWER_DOCS.joinpath('HOW_TO_REVIEW_WEBSITE_EXPERIENCE_OS_V3.md').write_text('''# How to Review Website Experience OS V3\n\n1. Open `public/index.html` or the live website.\n2. Confirm the route to Start, Atlas, Proof Ledger, Proof Run 001, Registry, and Reviewer Room is visible.\n3. Press `/` and confirm the command palette opens.\n4. Search for `validator`, `docket`, `mission`, `action`, `token`, and `benchmark`.\n5. Open Pathfinder and verify role-based routes.\n6. Open Registry and Site Map and confirm pages remain discoverable.\n7. Confirm boundary language is visible: no user data, no user funds, no wallet, no transaction, no network call, no production authority, human review required.\n''', encoding='utf-8')

          # QA audit
          forbidden = ['fetch(', 'XMLHttpRequest', 'sendBeacon', 'localStorage', 'sessionStorage', 'window.ethereum']
          js_files = [ASSETS/'goalos-website-os-v3.js', ASSETS/'goalos-site-index-data-v3.js']
          errors=[]
          for f in js_files:
              txt=f.read_text(errors='ignore')
              for bad in forbidden:
                  if bad in txt:
                      errors.append(f'Forbidden browser API {bad} in {f}')
          required = [PUBLIC/'index.html', PUBLIC/'pathfinder.html', PUBLIC/'website-operating-system.html', PUBLIC/'demo-ecosystem-registry.html', PUBLIC/'site-map.html', PUBLIC/'trust-boundary.html', ASSETS/'goalos-website-os-v3.css', ASSETS/'goalos-command-palette-v3.css', ASSETS/'goalos-website-os-v3.js']
          for f in required:
              if not f.exists(): errors.append(f'Missing required file {f}')
          idx = (PUBLIC/'index.html').read_text(errors='ignore')
          for phrase in ['No user data','No user funds','No wallet','No transaction','Human review required']:
              if phrase not in idx: errors.append(f'Missing boundary phrase in index: {phrase}')
          if len(live_routes) < 6: errors.append('Route registry unexpectedly small')
          status = 'passed' if not errors else 'failed'
          qa = {'status': status, 'generatedAt': NOW, 'routes': len(live_routes), 'coreDemos': core_demo_count, 'noNetworkCall': True, 'noUserData': True, 'noUserFunds': True, 'walletOrMainnet': False, 'humanReviewRequired': True, 'errors': errors}
          (REPORTS/'website-experience-os-v3-qa.json').write_text(jdump(qa), encoding='utf-8')
          (REPORTS/'website-experience-os-v3-install-report.json').write_text(jdump({'status':status,'generatedAt':NOW,'files':[str(p) for p in required]}), encoding='utf-8')
          (REPORTS/'website-experience-os-v3-demo-run.json').write_text(jdump({'status':status,'generatedAt':NOW,'checks':['homepage','pathfinder','registry','site-map','trust-boundary','command-palette']}), encoding='utf-8')
          (EVIDENCE/'website-experience-os-v3-reference-docket.json').write_text(jdump({'docket':'website-experience-os-v3','generatedAt':NOW,'claim':'The website has a coherent, browser-local navigation and proof journey layer.','boundary':site_index['boundary'],'qa':qa}), encoding='utf-8')
          (ISSUES/'website-experience-os-v3.md').write_text(f'''# Website Experience OS V3 installed\n\nGenerated: {NOW}\n\n## Review checklist\n\n- [ ] Homepage is beautiful, legible, and useful.\n- [ ] Pathfinder works.\n- [ ] Command palette opens with `/`.\n- [ ] Demo Registry is searchable.\n- [ ] Site Map is complete.\n- [ ] Trust boundary is visible.\n- [ ] No pages were intentionally removed.\n\nQA status: `{status}`\n''', encoding='utf-8')

          # README patch
          readme = ROOT/'README.md'
          block = '''\n\n## GoalOS Website Experience OS V3\n\nThe public website now includes a consolidated navigation and proof journey layer:\n\n- **Homepage:** `public/index.html`\n- **Pathfinder:** `public/pathfinder.html`\n- **Website Operating System:** `public/website-operating-system.html`\n- **Demo Ecosystem Registry:** `public/demo-ecosystem-registry.html`\n- **Site Map:** `public/site-map.html`\n- **Trust Boundary:** `public/trust-boundary.html`\n\nBoundary: no user data, no user funds, no wallet, no transaction, no network call, no production authority, human review required.\n'''
          existing = readme.read_text(errors='ignore') if readme.exists() else '# GoalOS AGIALPHA Ascension — Sovereign Machine Economy\n\nAI creates output. GoalOS creates proof.\n'
          if '## GoalOS Website Experience OS V3' not in existing:
              readme.write_text(existing.rstrip()+block+'\n', encoding='utf-8')

          if errors:
              raise SystemExit('Website Experience OS V3 QA failed: '+str(errors))
          PY
          python /tmp/goalos_website_experience_os_v3.py

      - name: Show generated QA report
        shell: bash
        run: |
          set -euo pipefail
          cat reports/website-experience-os-v3-qa.json

      - name: Commit generated website upgrade
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "goalos-autopilot"
            git config user.email "goalos-autopilot@users.noreply.github.com"
            git add README.md public docs reports evidence content issue-bodies
            git commit -m "Upgrade GoalOS Website Experience OS V3"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue create \
            --title "GoalOS Website Experience OS V3 — Final Navigation + Dynamic Consoles" \
            --body-file issue-bodies/website-experience-os-v3.md || true

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ inputs.release_tag }}" \
            --title "GoalOS Website Experience OS V3" \
            --notes-file docs/website/WEBSITE_EXPERIENCE_OS_V3.md || \
          gh release edit "${{ inputs.release_tag }}" \
            --title "GoalOS Website Experience OS V3" \
            --notes-file docs/website/WEBSITE_EXPERIENCE_OS_V3.md

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0
