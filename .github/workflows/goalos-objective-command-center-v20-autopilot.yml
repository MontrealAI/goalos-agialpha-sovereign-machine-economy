name: GoalOS Objective Command Center V20 — Tell GoalOS What You Want

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files to repository
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: Deploy updated public/ to GitHub Pages
        required: true
        type: boolean
        default: true
      create_issue:
        description: Create tracking issue after install
        required: true
        type: boolean
        default: true
      create_release:
        description: Create GitHub Release after visual approval
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag to use when create_release is true
        required: true
        type: string
        default: v0.41.0-objective-command-center-v20

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PACK_ZIP: .goalos/packs/goalos-objective-command-center-v20-pack.zip

jobs:
  objective-command-center:
    name: Install Objective Command Center
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify pack exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PACK_ZIP"
          ls -lh "$PACK_ZIP"

      - name: Unpack Objective Command Center pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib, zipfile
          zip_path = pathlib.Path('.goalos/packs/goalos-objective-command-center-v20-pack.zip')
          with zipfile.ZipFile(zip_path) as z:
              z.extractall(pathlib.Path.cwd())
          print(f'unpacked {zip_path}')
          PY

      - name: Install Mission Command page and navigation
        run: python scripts/install_objective_command_center_v20.py

      - name: Run deterministic demo
        run: python scripts/run_objective_command_center_v20_demo.py

      - name: Audit browser-local safety and links
        run: python scripts/goalos_objective_command_center_v20_audit.py

      - name: Commit Objective Command Center update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github issue-bodies .goalos || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Objective Command Center V20"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh issue create --title "GoalOS Objective Command Center V20 — Review" --body-file issue-bodies/objective-command-center-v20.md --label "website" --label "review" || true
          else
            echo "gh CLI unavailable; skipping issue creation."
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          if command -v gh >/dev/null 2>&1; then
            gh release create "$tag" \
              reports/objective-command-center-v20-qa.json \
              reports/objective-command-center-v20-demo-run.json \
              reports/objective-command-center-v20-audit.json \
              evidence/demo/objective-command-center-v20-reference-docket.json \
              --title "GoalOS Objective Command Center V20" \
              --notes "Tell GoalOS what you want. Browser-local Mission Command. No data, no funds, no wallet, no transaction, no network call, human review required." || true
          else
            echo "gh CLI unavailable; skipping release creation."
          fi
