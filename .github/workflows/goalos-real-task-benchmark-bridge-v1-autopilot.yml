name: GoalOS Real-Task Benchmark Bridge V1 — From Demos to Evidence

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy updated public site to GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a tracking issue"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag"
        required: true
        default: "v0.26.0-real-task-benchmark-bridge-v1"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-real-task-benchmark-bridge-v1
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  benchmark-bridge:
    name: Install Real-Task Benchmark Bridge
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install embedded GoalOS benchmark bridge pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, zipfile, pathlib
          data = ''''''
          root = pathlib.Path('.')
          archive = root / 'goalos-real-task-benchmark-bridge-v1-pack.zip'
          archive.write_bytes(base64.b64decode(data))
          with zipfile.ZipFile(archive) as z:
              z.extractall(root)
          archive.unlink()
          PY

      - name: Run installer, reference demo, and audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_real_task_benchmark_bridge_v1.py
          python scripts/run_real_task_benchmark_bridge_v1_demo.py
          python scripts/goalos_real_task_benchmark_bridge_v1_audit.py

      - name: Commit benchmark bridge update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github issue-bodies .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m 'Add GoalOS Real-Task Benchmark Bridge V1'
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh issue list --state open --search "GoalOS Real-Task Benchmark Bridge V1 in:title" --json number --jq '.[0].number' | grep -q '[0-9]'; then
            echo "Tracking issue already exists."
          else
            gh issue create --title "GoalOS Real-Task Benchmark Bridge V1" --body-file issue-bodies/real-task-benchmark-bridge-v1.md --label "benchmark,public-alpha,website" || true
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --title "GoalOS Real-Task Benchmark Bridge V1" \
              --notes "Adds the browser-local Real-Task Benchmark Bridge: demos to real-task evidence, baselines, replay, cost/risk ledgers, validator packet, delayed-outcome plan, and public-safe no-data/no-funds boundary."
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
