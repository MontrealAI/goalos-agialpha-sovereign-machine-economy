name: GoalOS Falsification Gauntlet V1.1 — Stress Claim Hotfix

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files to the repository
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      deploy_pages:
        description: Deploy GitHub Pages after update
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      create_issue:
        description: Create a tracking issue
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      create_release:
        description: Create GitHub Release after visual approval
        required: true
        default: 'false'
        type: choice
        options: ['true','false']
      release_tag:
        description: Release tag to use if create_release is true
        required: true
        default: v0.21.1-falsification-gauntlet-hotfix

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  RELEASE_TAG: ${{ inputs.release_tag }}

jobs:
  falsification-gauntlet-hotfix:
    name: Install Falsification Gauntlet V1.1 hotfix
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Falsification Gauntlet V1.1 hotfix pack
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, zipfile
          from pathlib import Path
          encoded = """"""
          pack = Path('goalos-falsification-gauntlet-v1-1-hotfix-pack.zip')
          pack.write_bytes(base64.b64decode(encoded))
          with zipfile.ZipFile(pack) as z:
              z.extractall('.')
          print('Installed embedded GoalOS Falsification Gauntlet V1.1 hotfix pack')
          PY

      - name: Patch repository surfaces
        run: |
          set -euo pipefail
          python scripts/install_falsification_gauntlet_v1_1.py

      - name: Run reference demo and QA audit
        run: |
          set -euo pipefail
          python scripts/run_falsification_gauntlet_v1_1_demo.py
          node --check public/assets/goalos-falsification-gauntlet-v1-1.js
          python scripts/goalos_falsification_gauntlet_v1_1_audit.py

      - name: Commit Falsification Gauntlet V1.1 hotfix
        if: ${{ inputs.commit_changes == 'true' }}
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "actions@github.com"
          git add README.md public docs examples scripts evidence reports content .github issue-bodies .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix Falsification Gauntlet stress claim behavior"
            git push
          fi

      - name: Create hotfix tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh issue list --search "Falsification Gauntlet V1.1 stress hotfix in:title" --json number --jq '.[0].number' | grep -q .; then
            echo "Tracking issue already exists."
          else
            gh issue create --title "Falsification Gauntlet V1.1 stress hotfix" --body-file issue-bodies/falsification-gauntlet-v1-1.md --label demo --label user-feedback --label bug ||             gh issue create --title "Falsification Gauntlet V1.1 stress hotfix" --body-file issue-bodies/falsification-gauntlet-v1-1.md
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG"               --title "GoalOS Falsification Gauntlet V1.1"               --notes "Fixes stress-claim behavior on /falsification-gauntlet.html: custom claims are preserved, stress visibly changes baseline pressure, and downloads retain the claim under test."
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
