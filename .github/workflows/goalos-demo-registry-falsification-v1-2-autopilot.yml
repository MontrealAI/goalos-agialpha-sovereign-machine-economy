name: GoalOS Demo Registry + Falsification V1.2 — Claim-Sensitive Stress

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create tracking issue"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create GitHub release"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag"
        required: true
        default: "v0.27.0-demo-registry-falsification-v1-2"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-demo-registry-falsification-v1-2
  cancel-in-progress: false

jobs:
  demo-registry-falsification:
    name: Install demo registry and claim-sensitive falsification hotfix
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install embedded GoalOS pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, zipfile, io
          data = """"""
          z = zipfile.ZipFile(io.BytesIO(base64.b64decode(data)))
          z.extractall(".")
          PY

      - name: Run installer and QA
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_demo_registry_falsification_v1_2.py
          python scripts/goalos_demo_registry_falsification_v1_2_audit.py

      - name: Commit update
        if: ${{ github.event.inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add README.md public content docs reports scripts issue-bodies .github/ISSUE_TEMPLATE .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS demo registry and Falsification Gauntlet V1.2"
            git push
          fi

      - name: Create tracking issue
        if: ${{ github.event.inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh issue list --search "GoalOS Demo Registry + Falsification V1.2 in:title" --json number --jq 'length' | grep -q '^0$'; then
            gh issue create \
              --title "GoalOS Demo Registry + Falsification V1.2" \
              --body-file issue-bodies/demo-registry-falsification-v1-2.md \
              --label "goalos,proof,demo-registry,falsification" || true
          else
            echo "Tracking issue already exists."
          fi

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --title "GoalOS Demo Registry + Falsification V1.2" \
              --notes "Adds canonical demo ecosystem registry and claim-sensitive Falsification Gauntlet stress scoring." \
              reports/demo-registry-falsification-v1-2-qa.json \
              content/goalos/demo-ecosystem-registry-v1.json
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
