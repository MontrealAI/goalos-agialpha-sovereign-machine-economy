name: GoalOS Website Experience OS V5 — Production UX + Sitewide QA + Route Integrity

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated website/documentation updates"
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy public/ to GitHub Pages"
        required: true
        type: boolean
        default: true
      create_issue:
        description: "Create a review issue after the upgrade"
        required: true
        type: boolean
        default: true
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release tag to use if create_release is true"
        required: true
        type: string
        default: "v0.31.4-website-experience-os-v5"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-website-experience-os-v5
  cancel-in-progress: false

jobs:
  website-experience-os-v5:
    name: Production UX, route integrity, and sitewide QA
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.x"

      - name: Install Website Experience OS V5
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/goalos_website_v5.py <<'PY'
          import json, re, html, hashlib, datetime
          from pathlib import Path

          ROOT = Path('.').resolve()
          PUBLIC = ROOT / 'public'
          ASSETS = PUBLIC / 'assets'
          REPORTS = ROOT / 'reports'
          CONTENT = ROOT / 'content' / 'goalos'
          DOCS = ROOT / 'docs' / 'website'
          REVIEWER = ROOT / 'docs' / 'reviewer'
          EVIDENCE = ROOT / 'evidence' / 'demo'
          ISSUE_BODIES = ROOT / 'issue-bodies'
          for d in [PUBLIC, ASSETS, REPORTS, CONTENT, DOCS, REVIEWER, EVIDENCE, ISSUE_BODIES]:
              d.mkdir(parents=True, exist_ok=True)

          NOW = datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat()
          TOKEN = '0xA61a3B3a130a9c20768EEBF97E21515A6046a1fA'
          BOUNDARY = 'No user data. No user funds. No wallet. No transaction. No network call. No production authority. Human review required.'
          TOKEN_BOUNDARY = '$AGIALPHA public contract address only. Not available from us. No sale. No custody. No wallet support. No investment, trading, legal, tax, exchange, bridge, liquidity, or regulatory advice.'

          ROUTE_SEED = [
            ('index.html','Home','Start','Institutional front door: proof thesis, dynamic console, core routes, and public-alpha boundary.','homepage','None','Path selection, proof journey, route map','Boundary, route integrity, no external actions','START'),
            ('pathfinder.html','Pathfinder','Start','Role-based guide for new users, reviewers, developers, institutions, and mission proposers.','adoption module','User role / intent','Recommended route','Public-safe path, boundary reminder','ROUTE_SELECTED'),
            ('proof-experience-atlas.html','Proof Experience Atlas','Start','Guided public proof journey across the GoalOS demos.','orchestration layer','Role path, tour selection','Atlas docket, route summary','No data, no funds, human-review boundary','ATLAS_READY'),
            ('proof-ledger.html','Public Proof Ledger','Evidence','Unified evidence registry for dockets, reports, pages, and reviewer routes.','receipt/audit module','Repository artifacts and pages','Public ledger index','Docket presence, QA report, route integrity','LEDGER_REVIEW_READY'),
            ('public-proof-ledger.html','Public Proof Ledger','Evidence','Unified evidence registry for dockets, reports, pages, and reviewer routes.','receipt/audit module','Repository artifacts and pages','Public ledger index','Docket presence, QA report, route integrity','LEDGER_REVIEW_READY'),
            ('proof-run-001-docket.html','Proof Run 001 Docket','Evidence','Repository-readiness Evidence Docket: gates, claims matrix, replay path, validator packet, and decision state.','reviewer module','Repository scan, claims, gate ledger','Evidence Docket, validator packet, replay path','10 mandatory repository-readiness gates','REVIEW_READY'),
            ('external-reviewer-replay-room.html','External Reviewer Replay Room','Review','Independent review path: inspect, replay, challenge, accept, reject, revise, or dissent.','reviewer module','Docket, claims, baselines, replay checklist','Reviewer report, dissent memo, validator attestation','Replay, baselines, claim boundary, privacy boundary','REVIEW_READY'),
            ('proof-mission-forge.html','Proof Mission Forge','Mission','Turn an objective into a proof mission: contract, claims matrix, docket plan, validator packet, and GitHub-ready issue.','orchestration layer','Objective, decision support, risk class, proof gates','Mission Contract, Evidence Docket plan, Validator Packet, GitHub issue draft','Mission contract, claims matrix, replay checklist, validator packet, boundary','MISSION_FORGE_READY'),
            ('proof-mission-control.html','Proof Mission Control','Mission','Public operating board for proof mission readiness: ready, blocked, missing evidence, and reviewer next steps.','orchestration layer','Mission preset, gate state, validator/replay readiness','Mission docket, validator packet, mission issue draft','Evidence, replay, validator packet, risk/cost, boundary','MISSION_CONTROL_READY'),
            ('demo-ecosystem-registry.html','Demo Ecosystem Registry','Registry','Routeable index of every public demo: inputs, outputs, gates, states, and workflow role.','documentation module','Public page inventory','Route registry JSON/table','No broken routes, boundary labels','REGISTRY_READY'),
            ('site-map.html','Site Map','Registry','Complete public page map, organized by user-facing route and system page.','navigation module','Public page inventory','Categorized page map','Internal link integrity','SITE_MAP_READY'),
            ('website-operating-system.html','Website Operating System','Registry','Operating map for the complete GoalOS website ecosystem.','navigation module','User intent, route category','Route by category','Route integrity, boundary visibility','OPERATING_MAP_READY'),
            ('site-health.html','Site Health','Registry','Public page health dashboard: routes, checks, reports, dockets, and safety boundary.','receipt/audit module','QA reports, route scans','Site health report','Route, boundary, forbidden API checks','SITE_HEALTH_READY'),
            ('trust-boundary.html','Trust Boundary','Trust','Public-alpha boundary: no user data, no user funds, no wallet, no production authority.','trust module','None','Boundary explanation','No data/no funds/token/claim boundary','BOUNDARY_VISIBLE'),
            ('token-boundary.html','$AGIALPHA Boundary','Trust','Public contract identification only; not available from us; no sale, custody, wallet support, or advice.','trust module','Public contract address','Token-boundary statement','No investment/trading/legal/tax advice','TOKEN_BOUNDARY_VISIBLE'),
            ('privacy.html','Privacy','Trust','GoalOS does not want user data and does not operate the public site as a data funnel.','trust module','None','Privacy notice','No personal/confidential/regulated data','PRIVACY_VISIBLE'),
            ('data-boundary.html','Data Boundary','Trust','Do not submit personal, customer, confidential, regulated, credential, wallet, or trade-secret data.','trust module','None','Data boundary notice','No sensitive data submission','DATA_BOUNDARY_VISIBLE'),
            ('no-data-no-funds.html','No Data / No Funds','Trust','Plain-language page: GoalOS demos are browser-local and request no data or funds.','trust module','None','No-data/no-funds notice','No wallet, no funds, no secrets','NO_DATA_NO_FUNDS_VISIBLE'),
            ('docs.html','Docs','Docs','Documentation hub for users, reviewers, developers, maintainers, and institutions.','documentation module','User role','Documentation route','Docs quality, boundary visibility','DOCS_READY'),
            ('search.html','Search','Start','Browser-local route search over pages and demos.','navigation module','Search query','Matching routes','No external calls, no stored queries','SEARCH_READY'),
            ('multi-agent-institution.html','Multi-Agent Institution','Core demos','Not a swarm. An institution. Compare raw swarms with proof-governed coordination.','orchestration layer','Mission preset, agent topology, risk posture','Evidence Docket, institution report, review brief','Mission contract, evidence, validator, no-data boundary','INSTITUTION_REVIEW_READY'),
            ('proof-gradient-lab.html','Proof Gradient Lab','Core demos','No proof, no evolution. Score is advisory; gates are mandatory.','scoring module','Candidate upgrade, proof strength, risk, rollback status','Selection score, gate ledger, reviewer brief','ProofValid, EvalPass, Risk, Rollback, Scope, Challenge','SELECTION_GATE_READY'),
            ('evidence-docket-theatre.html','Evidence Docket Theatre','Core demos','A proof page is not a marketing page. Convert a claim into a review-ready docket.','receipt/audit module','Claim, sources, baselines, risk/cost context','Claims Matrix, Evidence Docket, reviewer brief','Claim support, baselines, replay, risk/cost, boundary','DOCKET_REVIEW_READY'),
            ('proof-to-action-command-room.html','Proof-to-Action Command Room','Core demos','The deliverable is a governed decision state, not a document.','orchestration layer','Objective, docket, action class, risk class','Governed Decision State, Action Graph, Chronicle entry','Evidence, validation, risk, rollback, human review','DECISION_REVIEW_READY'),
            ('capability-compounding-lab.html','Capability Compounding Lab','Core demos','Verified work becomes reusable capability.','capability-package generator','Mission result, proof gates, reuse lift, proof debt','Capability Package, Chronicle entry, harder mission plan','Evidence Docket, validator, Chronicle, reuse, risk','CAPABILITY_REVIEW_READY'),
            ('sovereign-experience-stream.html','Sovereign Experience Stream Lab','Core demos','Proof becomes governed experience: memory, reward ledger, router proposals, temporal options.','capability-package generator','Experience event, reward, validator, risk, memory update','Experience stream entry, router proposal, reviewer brief','Provenance, replay, validator reward separation, boundary','EXPERIENCE_REVIEW_READY'),
            ('proof-settlement-chronicle-lab.html','Proof-Settlement Chronicle Lab','Core demos','No ProofBundle, no settlement. Request → Escrow → Execute → Proof → Validate → Settle → Chronicle.','receipt/audit module','Job spec, proof bundle, replay path, validation state','Simulated settlement receipt, Chronicle entry, docket','ProofBundle, replay, validator, challenge window, boundary','SETTLEMENT_REVIEW_READY'),
            ('falsification-gauntlet.html','Falsification Gauntlet','Core demos','Strong claims survive baselines. Stress broad claims and require real falsification conditions.','scoring module','Claim text, baseline ladder, replay/evidence gates','Falsification report, baseline matrix, docket','Baselines, replay, claim boundary, privacy, cost/risk','CLAIM_REVIEW_READY'),
            ('real-task-benchmark-bridge.html','Real-Task Benchmark Bridge','Advanced demos','Demos become benchmark-ready evidence through real tasks, equal-budget baselines, and replay.','benchmark module','Task family, claim, baselines, proof gates','Benchmark plan, baseline matrix, Evidence Docket plan','Real task, equal budget, baselines, replay, external review','BENCHMARK_BRIDGE_READY'),
            ('proof-carrying-artifact-foundry.html','Proof-Carrying Artifact Foundry','Advanced demos','The artifact earns authority: reusable intelligence must carry proof, scope, version, and rollback.','capability-package generator','Artifact candidate, artifact class, proof history, scope','Artifact JSON, Selection Certificate, Rollback Receipt','Proof history, eval, baseline, rollback, challenge, boundary','ARTIFACT_REVIEW_READY'),
            ('evolution-ledger-control-room.html','Evolution Ledger Control Room','Advanced demos','The ledger remembers proof, not secrets.','ledger module','ProofRoot, EvalAttestation, SelectionCertificate, RollbackReceipt','Public ledger entry, selection certificate, boundary map','ProofRoot, eval, rollback, challenge, validator quorum, boundary','LEDGER_REVIEW_READY'),
            ('proof-backed-upgrade-rights-room.html','Proof-Backed Upgrade Rights Room','Advanced demos','The artifact earns an upgrade right only after proof, eval, scope, canary, and rollback.','capability-package generator','Artifact candidate, requested scope, risk class, rollout posture','Upgrade right JSON, selection certificate, rollback receipt','Proof, eval, baseline, canary, rollback, scope, challenge','UPGRADE_REVIEW_READY'),
            ('institutional-deployment-wedge.html','Institutional Deployment Wedge','Adoption','Start with one workflow. Earn the right to scale.','adoption module','Workflow, repeatability, evidence readiness, rollback maturity','Deployment plan, GoalOSCommit, Evidence Docket plan','Mission, evidence, replay, canary, rollback, boundary','CANARY_READY'),
            ('value-realization-control-room.html','Value Realization Control Room','Adoption','Verified work becomes allocable capacity under proof and governance.','adoption module','Capability, verified work score, reusability, governance, risk','Value ledger, capacity plan, strategic asset map','Evidence, validator, capability package, value ledger, risk','VALUE_REVIEW_READY'),
            ('open-ended-work-engine.html','Open-Ended Work Engine','Advanced demos','Generate tasks. Gate descendants. Keep open-endedness tethered to proof.','orchestration layer','Seed objective, generation scenario, proof gates','Mission set, validator lattice, proof template pack','Syntax, sandbox, validator-bound, replayable, risk-bounded','ENGINE_REVIEW_READY'),
            ('validator-council-arena.html','Validator Council Arena','Review','Trust is not one judge. It is a validator council with commit, reveal, challenge, attest, decide.','validator module','Claim, quorum, validator diversity, evidence integrity','Attestation, dissent memo, challenge record, docket','Commit-reveal, quorum, diversity, replay, dissent, boundary','VALIDATION_REVIEW_READY'),
            ('action-reason-trace-contract.html','Action-Reason Trace Contract','Action','Every action must carry a reason, scope, observation, validation, rollback, and evidence.','action-governance module','Action intent, tool surface, risk class, evidence completeness','Trace contract, action graph, rollback playbook','Scope, reason, observation, validator, rollback, evidence, boundary','ACTION_REVIEW_READY'),
            ('frontier-release-room.html','Frontier Release Room','Frontier','Evidence-governed decision room for release, restriction, rollback, and restore decisions.','orchestration layer','Release scenario, access constraints, evidence state','Docket, review brief, access matrix','Identity, capability, safeguards, evidence, validators, rollback','HOLD_PENDING_REVIEW'),
            ('console.html','Proof Console','Hands-on','Interactive console for public-safe proof flight and proof route exploration.','UI demo','Mission preset, proof gates','Proof trace, downloadable artifacts where supported','Browser-local, no data, human review','CONSOLE_READY'),
            ('try-goalos.html','Try GoalOS','Hands-on','Beginner-friendly browser-local demo path.','UI demo','Mission preset or user role','Guided demo route','No user data, no funds, no wallet','TRY_READY'),
            ('meta-agentic-alpha-agi.html','Meta-Agentic α‑AGI','Legacy / canon','Meta-agentic institution foundry surface from the Ascension lineage.','UI demo','Mission objective, archetype, posture','Institution lineage, proof docket','Local-only, no external authority','LEGACY_CANON'),
            ('agi-alpha-node-v0.html','AGI Alpha Node v0','Legacy / canon','Sovereign node theatre: proof flight, route, authority, and review boundary.','UI demo','Mission preset, node identity, proof route','Evidence docket, review brief','Human review required, no external authority','LEGACY_CANON'),
            ('agi-jobs-v0-v2.html','AGI Jobs v0/v2','Legacy / canon','AGI Jobs proof-settlement work OS surface.','UI demo','Job spec, proof bundle, validator path','Settlement simulation, docket, chronicle','No ProofBundle, no settlement; no replay, no settlement','LEGACY_CANON'),
            ('404.html','404 / Route Recovery','System','Friendly route recovery page. Preserved but not listed as a normal demo.','system page','Missing route','Recovery links','No data, no funds','ROUTE_RECOVERY')
          ]

          def e(s): return html.escape(str(s), quote=True)
          def write(path, text):
              path = Path(path); path.parent.mkdir(parents=True, exist_ok=True); path.write_text(text, encoding='utf-8')
          def title_from(path):
              txt = path.read_text(encoding='utf-8', errors='ignore')
              m = re.search(r'<title[^>]*>(.*?)</title>', txt, re.I|re.S)
              if m: return re.sub(r'\s+', ' ', html.unescape(m.group(1))).strip()
              m = re.search(r'<h1[^>]*>(.*?)</h1>', txt, re.I|re.S)
              if m: return re.sub(r'\s+', ' ', re.sub(r'<[^>]+>', '', html.unescape(m.group(1)))).strip()
              return path.stem.replace('-', ' ').title()
          def discover():
              out=[]
              for p in sorted(PUBLIC.glob('*.html')):
                  txt = p.read_text(encoding='utf-8', errors='ignore')
                  out.append({'path':p.name,'title':title_from(p),'sha256':hashlib.sha256(txt.encode('utf-8','ignore')).hexdigest(),'bytes':len(txt.encode('utf-8','ignore'))})
              return out

          before = discover()
          routes = {r[0]: {'path':r[0], 'title':r[1], 'category':r[2], 'description':r[3], 'role':r[4], 'inputs':r[5], 'outputs':r[6], 'gates':r[7], 'state':r[8]} for r in ROUTE_SEED}
          for p in before:
              routes.setdefault(p['path'], {'path':p['path'], 'title':p['title'], 'category':'Additional / preserved', 'description':'Existing public page preserved by Website Experience OS V5.', 'role':'preserved page', 'inputs':'Page-specific', 'outputs':'Page-specific', 'gates':'Boundary and route integrity where applicable', 'state':'PRESERVED'})
          route_list = sorted(routes.values(), key=lambda r:(r['category'], r['title']))

          CSS = '''
          :root{--ink:#f7f4e8;--muted:#b9c9d8;--line:rgba(255,255,255,.17);--gold:#ffe86a;--mint:#63ffd4;--aqua:#7ee7ff;--violet:#a98cff;--danger:#ff6f9c;--shadow:0 30px 120px rgba(0,0,0,.55);--radius:30px;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--sans:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--serif:Georgia,"Times New Roman",serif}*{box-sizing:border-box}html{scroll-behavior:smooth}body.goalos-v5,.goalos-v5-body{margin:0;min-height:100vh;background:radial-gradient(circle at 8% 16%,rgba(99,255,212,.20),transparent 30%),radial-gradient(circle at 78% 12%,rgba(126,231,255,.18),transparent 32%),radial-gradient(circle at 55% 84%,rgba(169,140,255,.16),transparent 40%),linear-gradient(120deg,#031015,#081526 55%,#040711);color:var(--ink);font-family:var(--sans);line-height:1.45;overflow-x:hidden}body.goalos-v5:before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:64px 64px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.9),rgba(0,0,0,.22));pointer-events:none;z-index:-2}body.goalos-v5:after{content:"GOALOS";position:fixed;left:-3vw;bottom:-10vh;font-size:18vw;letter-spacing:-.12em;font-weight:1000;color:rgba(255,255,255,.035);pointer-events:none;z-index:-1}a{color:inherit}.gx-wrap{width:min(1380px,calc(100% - 52px));margin:0 auto}.gx-nav{position:sticky;top:18px;z-index:50;margin-top:18px;display:flex;align-items:center;justify-content:space-between;gap:22px;padding:18px 22px;border:1px solid var(--line);border-radius:28px;background:rgba(2,7,17,.80);backdrop-filter:blur(28px);box-shadow:0 14px 60px rgba(0,0,0,.35)}.gx-brand{display:flex;align-items:center;gap:14px;text-decoration:none}.gx-mark{display:grid;place-items:center;width:42px;height:42px;border-radius:14px;background:radial-gradient(circle at 30% 20%,#fff86b,#63ffd4 42%,#8ca7ff);color:#020711;font-s