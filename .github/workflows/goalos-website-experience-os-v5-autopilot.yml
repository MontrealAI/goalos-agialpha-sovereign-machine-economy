      - name: Show V5 QA report
        shell: bash
        run: |
          set -euo pipefail
          cat reports/website-experience-os-v5-qa.json

      - name: Commit website experience upgrade
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md public docs reports evidence content issue-bodies || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Upgrade GoalOS Website Experience OS V5"
            git push
          fi

      - name: Create review issue
        if: ${{ inputs.create_issue }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f issue-bodies/website-experience-os-v5.md ]; then
            gh issue create --title "Review Website Experience OS V5 — Production UX + Route Integrity" --body-file issue-bodies/website-experience-os-v5.md || true
          fi

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/deploy-pages@v5

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          NOTES="reports/website-experience-os-v5-qa.json"
          gh release create "$TAG" --title "GoalOS Website Experience OS V5" --notes-file "$NOTES" || gh release edit "$TAG" --title "GoalOS Website Experience OS V5" --notes-file "$NOTES"
