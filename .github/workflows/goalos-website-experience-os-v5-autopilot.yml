inline-block;border:1px solid rgba(255,111,156,.55);background:rgba(60,14,38,.50);padding:14px 18px;border-radius:18px;font-weight:900;color:#fff;max-width:760px}.gx-metrics{display:grid;grid-template-columns:repeat(6,1fr);border:1px solid var(--line);border-radius:24px;overflow:hidden;margin:26px 0 70px;background:rgba(255,255,255,.07)}.gx-metric{padding:25px;border-right:1px solid var(--line)}.gx-metric b{font-size:36px;color:var(--gold)}.gx-metric span{display:block;font-size:11px;letter-spacing:.32em;text-transform:uppercase;font-weight:900;color:#dbe6f4}.gx-panel{border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(140deg,rgba(255,255,255,.115),rgba(255,255,255,.055));box-shadow:var(--shadow);backdrop-filter:blur(22px)}.gx-console{padding:24px;position:relative;overflow:hidden}.gx-console:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 45% 34%,rgba(99,255,212,.30),transparent 34%),linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:auto,32px 32px,32px 32px;pointer-events:none}.gx-console>*{position:relative}.gx-console-head{display:flex;justify-content:space-between;gap:12px;align-items:center;font-size:12px;font-weight:1000;letter-spacing:.32em;text-transform:uppercase}.gx-pill{letter-spacing:0;text-transform:none;border:1px solid rgba(99,255,212,.45);color:var(--mint);background:rgba(99,255,212,.10);border-radius:999px;padding:7px 10px;font-size:12px}.gx-orbit{height:300px;position:relative;display:grid;place-items:center;margin:16px 0}.gx-core{width:108px;height:108px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 30% 25%,#fff36b,#63ffd4 42%,#8fa8ff);color:#020711;font-size:66px;font-weight:1000;box-shadow:0 0 75px rgba(99,255,212,.42)}.gx-ring{position:absolute;border:1px dashed rgba(255,232,106,.38);border-radius:50%;animation:gx-spin 18s linear infinite}.gx-ring.r1