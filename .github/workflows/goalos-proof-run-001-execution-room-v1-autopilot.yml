      - name: Run demo and QA audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_proof_run_001_execution_room_v1_demo.py
          python scripts/goalos_proof_run_001_execution_room_v1_audit.py

      - name: Commit Proof Run 001 Execution Room update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content issue-bodies .github .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Proof Run 001 Execution Room V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Proof Run 001 Execution Room V1 — first Evidence Docket path';
            const body = [
              '## Purpose',
              'Track review of the Proof Run 001 Execution Room.',
              '',
              '## Review checklist',
              '- [ ] Page renders at `/proof-run-001-execution-room.html`',
              '- [ ] Evidence Docket download works',
              '- [ ] Validator Packet download works',
              '- [ ] No-data / no-funds boundary is visible',
              '- [ ] QA report passes',
              '- [ ] First real Proof Run 001 mission is selected',
              '',
              'Boundary: no user data, no user funds, no wallet, no transaction, no network call, no production authority, human review required.'
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            const existing = issues.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['proof-run-001','review','public-alpha'] });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body: 'Execution Room workflow reran and refreshed the artifacts.' });
            }

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG"               --title "GoalOS Proof Run 001 Execution Room V1"               --notes "Adds the Proof Run 001 Execution Room: the public-safe bridge from architecture to the first real Evidence Docket. Boundary: no user data, no user funds, no wallet, no transaction, no network call, no production authority, human review required."               reports/proof-run-001-execution-room-v1-qa.json               reports/proof-run-001-execution-room-v1-demo-run.json               evidence/proof-run-001/proof-run-001-execution-room-reference-docket.json
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
