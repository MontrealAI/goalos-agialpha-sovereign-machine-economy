name: GoalOS Proof Run 001 Execution Room V1 — From Architecture to First Docket

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files to the repository
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      deploy_pages:
        description: Deploy GitHub Pages after update
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      create_issue:
        description: Create or update a public tracking issue
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      create_release:
        description: Create a GitHub Release after visual approval
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']
      release_tag:
        description: Release tag to use when create_release is true
        required: true
        default: v0.22.0-proof-run-001-execution-room

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PYTHON_VERSION: '3.11'

concurrency:
  group: goalos-proof-run-001-execution-room-v1
  cancel-in-progress: false

jobs:
  proof-run-execution-room:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

