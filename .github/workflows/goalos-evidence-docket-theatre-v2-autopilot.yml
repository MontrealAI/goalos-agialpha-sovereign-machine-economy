    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Evidence Docket Theatre V2 pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, base64, zipfile
          from pathlib import Path
          raw = ''.join(os.environ['PACK_B64'].split())
          pack = Path('/tmp/goalos-evidence-docket-theatre-v2-pack.zip')
          pack.write_bytes(base64.b64decode(raw))
          with zipfile.ZipFile(pack) as z:
              z.extractall('.')
          PY
          python scripts/install_evidence_docket_theatre_v2.py

      - name: Run demo and audit
        shell: bash
        run: |
          set -euo pipefail
          node --check public/assets/goalos-docket-theatre-v2.js
          python scripts/run_evidence_docket_theatre_v2_demo.py
          python scripts/goalos_evidence_docket_theatre_v2_audit.py

      - name: Commit Evidence Docket Theatre update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .nojekyll public/evidence-docket-theatre.html public/assets/goalos-docket-theatre-v2.css public/assets/goalos-docket-theatre-v2.js public/index.html public/search-index.json public/sitemap.xml docs/demos/EVIDENCE_DOCKET_THEATRE_V2.md docs/reviewer/HOW_TO_REVIEW_EVIDENCE_DOCKET_THEATRE.md examples/evidence-docket-theatre/public-safe-scenarios.md scripts/install_evidence_docket_theatre_v2.py scripts/goalos_evidence_docket_theatre_v2_audit.py scripts/run_evidence_docket_theatre_v2_demo.py evidence/demo/evidence-docket-theatre-v2-reference-docket.json reports/evidence-docket-theatre-v2-qa.json reports/evidence-docket-theatre-v2-install-report.json reports/evidence-docket-theatre-v2-demo-run.json reports/evidence-docket-theatre-v2-manifest.json content/goalos/evidence-docket-theatre-v2.json .github/ISSUE_TEMPLATE/evidence_docket_theatre_feedback.yml issue-bodies/evidence-docket-theatre-v2.md
          if git diff --cached --quiet; then
            echo "No Evidence Docket Theatre changes to commit."
          else
            git commit -m 'Add GoalOS Evidence Docket Theatre V2'
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TITLE='Evidence Docket Theatre V2 — public proof room review'
          if gh issue list --state open --search "$TITLE in:title" --json title --jq '.[].title' | grep -Fx "$TITLE" >/dev/null 2>&1; then
            echo "Tracking issue already exists."
          else
            gh issue create --title "$TITLE" --body-file issue-bodies/evidence-docket-theatre-v2.md --label evidence-docket --label public-demo || gh issue create --title "$TITLE" --body-file issue-bodies/evidence-docket-theatre-v2.md
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/release_notes.md <<'EOF'
          GoalOS Evidence Docket Theatre V2

          Adds a browser-local proof room demonstrating the core GoalOS idea: a proof page is not a marketing page.

          Included:
          - interactive Evidence Docket 6.1 theatre
          - claim-to-docket flow
          - claims matrix, baselines, proof packets, evaluator notes, risk/cost ledgers, replay path
          - governed decision state
          - downloadable docket, public report, review checklist, claims matrix, proof card
          - no-data / no-funds / no-wallet / no-transaction boundary
          EOF
            gh release create "$RELEASE_TAG" --title 'GoalOS Evidence Docket Theatre V2' --notes-file /tmp/release_notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
