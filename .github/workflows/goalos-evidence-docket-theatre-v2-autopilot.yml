name: GoalOS Evidence Docket Theatre V2 — A Proof Page Is Not Marketing

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files back to the repository
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: Deploy GitHub Pages after the build
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: Create a public tracking issue
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: Create a GitHub Release after success
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: Release tag
        required: true
        default: "v0.18.5-evidence-docket-theatre-v2"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: evidence-docket-theatre-v2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evidence-docket-theatre:
    runs-on: ubuntu-latest
