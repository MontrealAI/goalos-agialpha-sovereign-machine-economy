name: GoalOS Website Experience OS V4 — Production Navigation + Dynamic Proof Console

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated website updates to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy public/ to GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a tracking issue with the QA summary"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag to use if create_release is true"
        required: true
        default: "v0.31.3-website-experience-os-v4"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  website-experience-os-v4:
    name: Install final website UX, route QA, and Pages deployment
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0
      - name: Setup Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.11"
      - name: Decode Website Experience OS V4 pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/goalos-website-experience-os-v4
          cat > /tmp/goalos-website-experience-os-v4/pack.zip.b64 <<'B64'
          
          B64
          base64 -d /tmp/goalos-website-experience-os-v4/pack.zip.b64 > /tmp/goalos-website-experience-os-v4/pack.zip
          python - <<'PY'
          from zipfile import ZipFile
          ZipFile('/tmp/goalos-website-experience-os-v4/pack.zip').extractall('/tmp/goalos-website-experience-os-v4')
          PY
      - name: Install production-grade website experience
        shell: bash
        run: |
          set -euo pipefail
          python /tmp/goalos-website-experience-os-v4/scripts/install_website_experience_os_v4.py
          python -m json.tool reports/website-experience-os-v4-qa.json >/dev/null
      - name: Commit website experience upgrade
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs reports evidence content issue-bodies || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Upgrade GoalOS Website Experience OS V4"
            git push
          fi
      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          BODY="$(cat issue-bodies/website-experience-os-v4.md 2>/dev/null || echo 'Website Experience OS V4 installed.')"
          gh issue create --title "Website Experience OS V4 — production navigation and proof console" --body "$BODY" || true
      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6.0.0
      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: public
      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0
      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
          gh release create "$TAG" --title "GoalOS Website Experience OS V4" --notes "Production-grade navigation, dynamic proof console, route registry, trust boundary, token-boundary fix, command palette, and QA reports." || true
