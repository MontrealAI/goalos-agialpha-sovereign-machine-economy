      - name: Install pages, run demos, and audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_goalos_autonomous_demo_layer_v4.py
          python scripts/run_autonomous_demo_pack.py
          python scripts/goalos_autonomous_demo_audit.py
          python - <<'PY'
          import json, pathlib
          report=json.loads(pathlib.Path('reports/autonomous-demo-layer-v4-qa.json').read_text())
          if report.get('status')!='passed':
              raise SystemExit(report)
          print('Autonomous demo QA passed:', report['pages_checked'], 'pages')
          PY

      - name: Commit autonomous demo layer
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md public docs examples scripts src reports evidence content .nojekyll
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'Add GoalOS Autonomous Demo Layer V4'
            git push
          fi

      - name: Create autonomous demo review issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/autonomous-demo-review.md <<'EOF'
          ## Purpose
          Review the Autonomous Demo Layer V4 for user delight and public-alpha safety.

          ## Acceptance checklist
          - [ ] A non-technical user can open Demo Launcher and understand what to run.
          - [ ] Proof Flight runs without account, API key, wallet, or backend.
          - [ ] Evidence Docket Builder produces downloadable public-safe JSON.
          - [ ] Agent Constellation Demo is dynamic and understandable.
          - [ ] Proof Card Studio downloads a local SVG.
          - [ ] Local Autopilot Demo commands are copyable.
          - [ ] No demo asks for user data or funds.
          - [ ] Reports show status: passed.
          EOF
          title='Autonomous Demo Layer V4 review — can users run everything themselves?'
          if gh issue list --state open --search "$title in:title" --json title --jq '.[].title' | grep -Fx "$title" >/dev/null 2>&1; then
            echo 'Issue already exists.'
          else
            gh issue create --title "$title" --body-file /tmp/autonomous-demo-review.md --label 'user-friendly' || gh issue create --title "$title" --body-file /tmp/autonomous-demo-review.md
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/release-notes.md <<'EOF'
          GoalOS Autonomous Demo Layer V4

          Adds delightful, browser-local, self-run demos: Demo Launcher, Proof Flight, Evidence Docket Builder, Agent Constellation Demo, Proof Card Studio, Local Autopilot Demo, Demo Gallery, and Demo Safety Boundary.

          Boundary: no user data, no user funds, no wallet, no transaction, no network call, no production authority, human review required.
          EOF
            gh release create "$RELEASE_TAG" --title 'GoalOS Autonomous Demo Layer V4' --notes-file /tmp/release-notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
