          if '<!-- GOALOS-HISTORICAL-MASTER-START -->' in existing:
              existing = re.sub(r'<!-- GOALOS-HISTORICAL-MASTER-START -->.*?<!-- GOALOS-HISTORICAL-MASTER-END -->', block, existing, flags=re.S)
