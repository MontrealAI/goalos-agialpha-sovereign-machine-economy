      - name: Validate generated site and artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f public/index.html
          test -f public/historical-command-center.html
          test -f public/frontier-release-room.html
          test -f public/proof-run-001.html
          test -f public/coordination-console.html
          test -f public/assets/goalos-master.css
          test -f public/assets/goalos-master.js
          node --check public/assets/goalos-master.js
          python - <<'PY'
          from pathlib import Path
          required = [
            'reports/goalos-historical-master-qa.json',
            'reports/paper-leverage-scorecard.json',
            'reports/optimal-holy-grail-leverage-scorecard.json',
            'reports/multi-agent-leverage-scorecard.json',
            'evidence/dockets/proof-run-001-genesis-docket.json',
            'evidence/dockets/coordination-run-001-genesis-docket.json',
            'standards/PGR-001_PROOF_GATED_WORK_MACHINE.md',
            'standards/MAC-001_PROOF_GATED_MULTI_AGENT_COORDINATION.md'
          ]
          missing=[p for p in required if not Path(p).exists()]
          if missing:
              raise SystemExit('Missing required artifacts: '+', '.join(missing))
          pages=list(Path('public').glob('*.html'))
          if len(pages) < 15:
              raise SystemExit('Expected at least 15 public pages, found '+str(len(pages)))
          print('Historical master validation passed with', len(pages), 'HTML pages.')
          PY

      - name: Commit generated files
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .nojekyll public docs standards schemas evidence templates reports content issue-bodies
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Install GoalOS historical master update"
            git push
          fi

      - name: Create public tracking issues
        if: ${{ inputs.create_issues == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issues = [
              ['[Proof Run 001] Publish first public Evidence Docket', 'Run Proof Run 001 and publish the first public Evidence Docket with validator note, risk ledger, Chronicle entry, capability package, and settlement simulation.'],
              ['[Coordination Run 001] Prove the multi-agent institution loop', 'Run a bounded multi-agent coordination mission and compare it against an unstructured swarm baseline.'],
              ['[Frontier Release Room] Review FRG-001 and public-source case study', 'Review the Frontier Release Room standard and case-study framing. Preserve claim boundaries and source-bounded evidence.'],
              ['[$AGIALPHA Control Rail] Simulate proof-conditioned settlement', 'Create a settlement simulation for mission budgets, proof bonds, validator pressure, settlement, and treasury reinvestment.'],
              ['[Research Spine] Validate paper-to-product traceability', 'Review AGI ALPHA, Mission OS, and Proof-of-Evolution mappings to docs, standards, schemas, dockets, and reports.']
            ];
            const { data: existing } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            for (const [title, body] of issues) {
              if (!existing.some(i => i.title === title)) {
                await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
              }
            }

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/goalos-release-notes.md <<'EOF'
          # GoalOS Historical Master Update

          This release consolidates the full public-alpha stack:

          - Research Spine and paper-to-product lineage
          - Premium Proof Console
          - Frontier Release Room V2
          - Holy Grail Candidate doctrine
          - Proof Run 001 path
          - $AGIALPHA Proof Control Rail
          - Multi-Agent Institution and Coordination Console
          - Standards, schemas, genesis dockets, reports, and tracking issues

          Boundary: public-alpha proof architecture. Not achieved AGI, ASI, empirical SOTA, production authorization, legal approval, user-fund authorization, mainnet activation, or guaranteed outcome.
          EOF
            gh release create "$RELEASE_TAG" --title "GoalOS Historical Master Update" --notes-file /tmp/goalos-release-notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v4
