name: GoalOS Historical Master Update — Everything So Far, Proved Forward

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files back to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      create_issues:
        description: "Create public tracking issues"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag"
        required: true
        default: "v0.7.0-historical-master"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-historical-master-${{ github.ref }}
  cancel-in-progress: false

jobs:
  historical-master-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

