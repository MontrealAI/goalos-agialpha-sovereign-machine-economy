name: GoalOS $AGIALPHA Token Boundary V2.1 — Public Market, Not Available From Us

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated token-boundary files"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a token-boundary tracking issue"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create GitHub Release (literal token symbol safe)"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag"
        required: true
        default: "v0.14.2-agialpha-token-boundary"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: agialpha-token-boundary-v2-1-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  token-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install $AGIALPHA token-boundary pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64, zipfile, io, json, re
          data = ''
          raw = base64.b64decode(data)
          with zipfile.ZipFile(io.BytesIO(raw)) as z:
              z.extractall('.')
          marker_start = '<!-- GOALOS_AGIALPHA_TOKEN_BOUNDARY_START -->'
          marker_end = '<!-- GOALOS_AGIALPHA_TOKEN_BOUNDARY_END -->'
          block = "\n".join([
              marker_start,
              "",
              "## $AGIALPHA public-market boundary",
              "",
              "Canonical public Ethereum contract address for identification only:",
              "",
              "`0xA61a3B3a130a9c20768EEBF97E21515A6046a1fA`",
              "",
              "$AGIALPHA is **not available from GoalOS, this website, this GitHub repository, GitHub Issues, GitHub Discussions, pull requests, public demos, or public proof runs**.",
              "",
              "No token sale. No offer. No custody. No wallet support. No user-fund authorization. No investment advice. No trading advice. No tax advice. No legal advice. Third parties are solely responsible for their own legal, financial, tax, technical, operational, and security review.",
              "",
              "See: [docs/legal/AGIALPHA_TOKEN_PUBLIC_MARKET_BOUNDARY.md](docs/legal/AGIALPHA_TOKEN_PUBLIC_MARKET_BOUNDARY.md) and the website page `/agialpha-token-boundary.html`.",
              "",
              marker_end,
              ""
          ])
          readme = Path('README.md')
          txt = readme.read_text(encoding='utf-8', errors='ignore') if readme.exists() else '# GoalOS AGIALPHA Ascension — Sovereign Machine Economy\n'
          if marker_start in txt and marker_end in txt:
              txt = re.sub(re.escape(marker_start)+r'.*?'+re.escape(marker_end), block.strip(), txt, flags=re.S)
          else:
              txt = txt.rstrip()+"\n\n"+block
          readme.write_text(txt.rstrip()+"\n", encoding='utf-8')
          home = Path('public/index.html')
          if home.exists():
              html = home.read_text(encoding='utf-8', errors='ignore')
              hstart='<!-- GOALOS_TOKEN_BOUNDARY_CARD_START -->'
              hend='<!-- GOALOS_TOKEN_BOUNDARY_CARD_END -->'
              card = hstart + '<section style="max-width:1120px;margin:32px auto;padding:0 22px;position:relative;z-index:3"><div style="border:1px solid rgba(255,255,255,.14);background:linear-gradient(135deg,rgba(243,205,118,.12),rgba(111,255,226,.05));border-radius:24px;padding:22px;color:#f7fbff;font-family:Inter,system-ui,sans-serif"><div style="font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#f3cd76;font-weight:900">$AGIALPHA Boundary</div><h2 style="margin:.4em 0;font-size:clamp(26px,4vw,46px);letter-spacing:-.04em">Public contract address only. Not available from us.</h2><p style="color:#c6d1ea;line-height:1.65;max-width:900px">Canonical public Ethereum contract address for identification: <code style="word-break:break-all;color:#eafffb">0xA61a3B3a130a9c20768EEBF97E21515A6046a1fA</code>. GoalOS does not sell, distribute, custody, broker, recommend, support, or make available $AGIALPHA. No user funds. No wallet support. No investment, trading, tax, legal, or regulatory advice.</p><a href="agialpha-token-boundary.html" style="display:inline-block;margin-top:8px;padding:12px 16px;border-radius:999px;background:#ffe79a;color:#07101c;text-decoration:none;font-weight:900">Read the token boundary</a></div></section>' + hend
              if hstart in html and hend in html:
                  html = re.sub(re.escape(hstart)+r'.*?'+re.escape(hend), card, html, flags=re.S)
              elif '</main>' in html:
                  html = html.replace('</main>', card+'\n</main>')
              elif '</body>' in html:
                  html = html.replace('</body>', card+'\n</body>')
              else:
                  html += card
              home.write_text(html, encoding='utf-8')
          sm = Path('public/sitemap.xml')
          if sm.exists():
              s=sm.read_text(encoding='utf-8', errors='ignore')
              base_url='https://montrealai.github.io/goalos-agialpha-sovereign-machine-economy/'
              for page in ['agialpha-token-boundary.html','investment-token-boundary.html','token.html']:
                  loc=f'<loc>{base_url}{page}</loc>'
                  if loc not in s:
                      s=s.replace('</urlset>', f'  <url><loc>{base_url}{page}</loc></url>\n</urlset>') if '</urlset>' in s else s+f'\n{loc}\n'
              sm.write_text(s, encoding='utf-8')
          idx=Path('public/search-index.json')
          if idx.exists():
              try:
                  obj=json.loads(idx.read_text(encoding='utf-8'))
              except Exception:
                  obj=[]
              items = obj.get('items') if isinstance(obj,dict) else obj if isinstance(obj,list) else []
              existing = {i.get('url') for i in items if isinstance(i,dict)}
              for page,title in [('agialpha-token-boundary.html','$AGIALPHA Public-Market Boundary'),('investment-token-boundary.html','Token & Investment Boundary')]:
                  if page not in existing:
                      items.append({'title':title,'url':page,'description':'$AGIALPHA is not available from GoalOS. No sale, no support, no custody, no user funds.'})
              out={'items':items} if isinstance(obj,dict) else items
              idx.write_text(json.dumps(out,indent=2)+"\n", encoding='utf-8')
          Path('.nojekyll').write_text('', encoding='utf-8')
          PY

      - name: Run token-boundary audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/goalos_token_boundary_audit.py

      - name: Commit token-boundary update (literal token symbol safe)
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs reports scripts content .github .nojekyll || true
          if git diff --cached --quiet; then echo "No token-boundary changes to commit."; else git commit -m 'Add $AGIALPHA public-market token boundary'; git push; fi

      - name: Create token-boundary tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          title='$AGIALPHA boundary review — public market, not available from us'
          if gh issue list --state open --search "$title in:title" --json title --jq '.[].title' | grep -Fx "$title" >/dev/null 2>&1; then
            echo "Tracking issue already exists."
          else
            cat > /tmp/token_boundary_issue.md <<'EOF'
          ## Purpose

          Review the $AGIALPHA public-market boundary now added to the repository and website.

          ## Core boundary

          - Public Ethereum contract address is listed for identification only: `0xA61a3B3a130a9c20768EEBF97E21515A6046a1fA`
          - $AGIALPHA is not available from GoalOS, the website, the GitHub repository, Issues, Discussions, pull requests, demos, or public proof runs.
          - No token sale, no custody, no wallet support, no user-fund authorization, no investment advice, no trading advice, no tax advice, no legal advice.
          - Third parties are responsible for their own compliance, technical, operational, tax, and security review.

          ## Review checklist

          - [ ] Website pages render: `/agialpha-token-boundary.html`, `/investment-token-boundary.html`, `/token.html`
          - [ ] README boundary block is visible
          - [ ] `reports/agialpha-token-boundary-qa.json` says `passed`
          - [ ] No public page suggests that tokens are available from us
          - [ ] No page invites users to send funds, keys, or wallet signatures

          Human review required.
          EOF
            gh issue create --title "$title" --body-file /tmp/token_boundary_issue.md --label token-boundary --label legal-boundary --label human-review-required || gh issue create --title "$title" --body-file /tmp/token_boundary_issue.md
          fi

      - name: Create GitHub Release (literal token symbol safe)
        if: ${{ inputs.create_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/release_notes.md <<'EOF'
          GoalOS $AGIALPHA Token Boundary V2

          Adds a clear public-market and token boundary:
          - $AGIALPHA public Ethereum contract address listed for identification only
          - Not available from GoalOS, the website, GitHub repository, Issues, Discussions, PRs, demos, or public proof runs
          - No sale, no custody, no wallet support, no user-fund authorization
          - No investment, trading, tax, legal, or regulatory advice
          - Third-party responsibility preserved
          EOF
            gh release create "$RELEASE_TAG" --title 'GoalOS $AGIALPHA Token Boundary V2.1' --notes-file /tmp/release_notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
