name: GoalOS Capability Compounding Lab V2 — Verified Work Becomes Reusable Capability

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files to the repository
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: Deploy GitHub Pages after updating files
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: Create a public review issue
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: Create a GitHub Release after visual approval
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: Release tag to use if create_release is true
        required: true
        default: v0.19.6-capability-compounding-lab-v2

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-capability-compounding-lab-v2
  cancel-in-progress: false

jobs:
  capability-compounding-lab-v2:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

