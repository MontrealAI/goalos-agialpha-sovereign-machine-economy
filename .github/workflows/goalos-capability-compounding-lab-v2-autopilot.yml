      - name: Run demo artifact generator and QA audit
        shell: bash
        run: |
          set -euo pipefail
          node --check public/assets/goalos-capability-compounding-lab-v2.js
          python scripts/run_capability_compounding_lab_v2_demo.py
          python scripts/goalos_capability_compounding_lab_v2_audit.py

      - name: Commit Capability Compounding Lab V2 update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content issue-bodies .github/ISSUE_TEMPLATE .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m 'Upgrade Capability Compounding Lab V2'
            git push
          fi

      - name: Create review issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          title='Review: Capability Compounding Lab V2'
          if gh issue list --search "$title in:title" --json number --jq '.[0].number' | grep -q '^[0-9]'; then
            echo "Review issue already exists."
          else
            gh issue create --title "$title" --body-file issue-bodies/capability-compounding-lab-v2.md --label demo --label capability-compounding ||             gh issue create --title "$title" --body-file issue-bodies/capability-compounding-lab-v2.md
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG"               --title 'GoalOS Capability Compounding Lab V2'               --notes 'Upgrades /capability-compounding-lab.html into a resilient browser-local compounding demo with static fallback visuals, dynamic gates, downloads, QA audit, and no-data/no-funds boundary.'               reports/capability-compounding-lab-v2-qa.json               reports/capability-compounding-lab-v2-demo-run.json               evidence/demo/capability-compounding-lab-v2-reference-docket.json
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
