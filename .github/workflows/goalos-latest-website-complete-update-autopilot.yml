name: GoalOS Latest Website Complete Update — Full Ascension Stack

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit the latest generated website/docs back to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy the generated public/ site to GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after success"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      create_issues:
        description: "Create public tracking issues for Proof Run 001, validators, and mission slots"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag to use when create_release=true"
        required: true
        default: "v0.10.0-latest-website"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  RELEASE_TAG: ${{ inputs.release_tag }}
  PACK_NAME: goalos-latest-website-complete-update-pack.zip

concurrency:
  group: goalos-latest-website-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-website:
    name: Install latest GoalOS website, docs, reports, issues, and Pages deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

