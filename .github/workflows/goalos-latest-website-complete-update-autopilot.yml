      - name: Patch README and generate install report
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json, datetime, os
          readme = Path('README.md')
          current = readme.read_text(encoding='utf-8') if readme.exists() else '# GoalOS AGIALPHA Ascension — Sovereign Machine Economy\n'
          start = '<!-- GOALOS-LATEST-WEBSITE:START -->'
          end = '<!-- GOALOS-LATEST-WEBSITE:END -->'
          section_lines = [
              start,
              '',
              '## GoalOS Latest Website Update',
              '',
              'The live website has been refreshed to the latest public-alpha stack: Historical Command Center, Frontier Release Room, Proof Console, META-Agentic α-AGI, AGI Alpha Node, AGI Jobs, Research Spine, Document Series, Launch Narrative, Validator Seats, Proof Mission Slots, Proof Metrics Dashboard, and Falsification Box.',
              '',
              '**Operating law:** AI creates output. GoalOS creates proof.',
              '',
              '**Boundary:** public-alpha proof architecture; no achieved AGI/ASI claim, no production authorization, no legal approval, no user-fund authorization, no mainnet activation, and no guaranteed outcomes.',
              '',
              end
          ]
          section = '\n'.join(section_lines)
          if start in current and end in current:
              before = current.split(start)[0]
              after = current.split(end, 1)[1]
              current = before + section + after
          else:
              current = current.rstrip() + '\n\n' + section + '\n'
          readme.write_text(current, encoding='utf-8')
          pages = sorted(str(p.relative_to('public')) for p in Path('public').glob('*.html'))
          report = {
              'status': 'installed',
              'generated_at': datetime.datetime.now(datetime.UTC).isoformat(),
              'workflow': 'GoalOS Latest Website Complete Update',
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'sha': os.environ.get('GITHUB_SHA'),
              'pages_count': len(pages),
              'pages': pages,
              'claim_boundary': ['public-alpha proof architecture','no achieved AGI claim','no achieved ASI claim','no empirical SOTA claim without Evidence Docket','human review required']
          }
          Path('reports').mkdir(exist_ok=True)
          Path('reports/goalos-latest-website-install-report.json').write_text(json.dumps(report, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Validate latest website surface
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json
          required = [
              'public/index.html',
              'public/historical-command-center.html',
              'public/frontier-release-room.html',
              'public/frontier-release-case-study.html',
              'public/console.html',
              'public/meta-agentic-alpha-agi.html',
              'public/agi-alpha-node-v0.html',
              'public/agi-jobs-v0-v2.html',
              'public/research-spine.html',
              'public/paper-to-product.html',
              'public/document-series.html',
              'public/launch-narrative.html',
              'public/validator-seats.html',
              'public/proof-mission-slots.html',
              'public/falsification-box.html',
              'public/proof-metrics-dashboard.html',
              'public/holy-grail-candidate.html',
              'public/proof-run-001.html',
              'public/agialpha-control-rail.html',
              'public/multi-agent-institution.html',
              'public/coordination-console.html',
              'public/assets/goalos-v4.css',
              'public/assets/goalos-v4.js',
              'docs/series/00_SERIES_INDEX.md',
              'docs/communications/LAUNCH_NARRATIVE.md',
              'docs/proof-runs/PROOF_RUN_001_DOCKET_STRUCTURE.md',
              'docs/validators/VALIDATOR_SEAT_INVITATION.md',
              'reports/goalos-latest-website-manifest.json'
          ]
          missing = [p for p in required if not Path(p).exists()]
          if missing:
              raise SystemExit('Missing required files: ' + ', '.join(missing))
          html_pages = sorted(Path('public').glob('*.html'))
          bad = []
          for p in html_pages:
              txt = p.read_text(encoding='utf-8', errors='replace')
              if '<!doctype html' not in txt.lower():
                  bad.append(f'no doctype: {p}')
              if 'assets/goalos-v4.css' in txt and not Path('public/assets/goalos-v4.css').exists():
                  bad.append(f'missing css asset for {p}')
          if bad:
              raise SystemExit('QA failed: ' + '; '.join(bad))
          qa = {'status': 'passed','pages_checked': len(html_pages),'required_files_checked': len(required),'errors': 0,'warnings': 0,'boundary': 'public-alpha, default-deny, human-review-required'}
          Path('reports/goalos-latest-website-qa.json').write_text(json.dumps(qa, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(qa, indent=2))
          PY
          node --check public/assets/goalos-v4.js

      - name: Commit latest website update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .nojekyll public docs standards schemas templates evidence reports content issue-bodies || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update GoalOS website to latest complete public-alpha stack"
            git push
          fi

      - name: Create public tracking issues
        if: ${{ inputs.create_issues == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueSpecs = [
              ['Proof Run 001 — execute first public Evidence Docket', 'issue-bodies/proof-run-001.md'],
              ['Coordination Run 001 — prove multi-agent institution loop', 'issue-bodies/coordination-run-001.md'],
              ['Frontier Release Room — validator review and public-source case study', 'issue-bodies/frontier-release-review.md'],
              ['$AGIALPHA Control Rail — proof thermostat review', 'issue-bodies/agialpha-control-rail.md'],
              ['Validator Seat 001 — Evidence Docket adversarial review', 'issue-bodies/validator-seat-001.md'],
              ['Proof Mission Slots — founding public-safe objectives', 'issue-bodies/proof-mission-slots.md'],
              ['Proof Run 001 Falsification Box — define failure conditions', 'issue-bodies/proof-run-001-falsification-box.md']
            ];
            const { data: existing } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'all', per_page: 100 });
            for (const [title, path] of issueSpecs) {
              if (existing.some(i => i.title === title)) continue;
              const body = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : 'Tracking issue generated by the GoalOS latest website update workflow.';
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
            }

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/goalos_latest_release_notes.md <<'EOF'
          GoalOS Latest Website Complete Update

          This release refreshes the full GoalOS AGIALPHA Ascension — Sovereign Machine Economy public-alpha surface: Ascension Visual Parity V4, Historical Command Center, Frontier Release Room, Proof Console, META-Agentic α-AGI, AGI Alpha Node, AGI Jobs, Research Spine, Document Series, Launch Narrative, Validator Seats, Proof Mission Slots, Proof Metrics Dashboard, Falsification Box, and Proof Run 001.

          Boundary: this is not a claim of achieved AGI, ASI, empirical SOTA, production authorization, legal approval, user-fund authorization, mainnet activation, or guaranteed outcomes.

          AI creates output. GoalOS creates proof.
          EOF
            gh release create "$RELEASE_TAG" --title "GoalOS Latest Website Complete Update" --notes-file /tmp/goalos_latest_release_notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
