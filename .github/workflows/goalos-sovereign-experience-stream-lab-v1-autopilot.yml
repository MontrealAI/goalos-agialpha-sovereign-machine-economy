name: GoalOS Sovereign Experience Stream Lab V1 — Proof Becomes Governed Experience

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files to the repository
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      deploy_pages:
        description: Deploy GitHub Pages after installing the demo
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      create_issue:
        description: Create a public review issue
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      create_release:
        description: Create a GitHub Release after visual approval
        required: true
        default: 'false'
        type: choice
        options: ['true','false']
      release_tag:
        description: Release tag to use if create_release is true
        required: true
        default: v0.20.0-sovereign-experience-stream-lab-v1

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  install-experience-lab:
    name: Install Sovereign Experience Stream Lab
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Sovereign Experience Stream Lab pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, zipfile, pathlib
          data = ''''''
          path = pathlib.Path('goalos-sovereign-experience-stream-lab-v1-pack.zip')
          path.write_bytes(base64.b64decode(data))
          with zipfile.ZipFile(path) as z:
              z.extractall('.')
          print('Installed GoalOS Sovereign Experience Stream Lab V1 pack')
          PY

      - name: Patch navigation, README, search index, and sitemap
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json
          page = 'sovereign-experience-stream-lab.html'
          readme = Path('README.md')
          block = "\n\n## Sovereign Experience Stream Lab V1\n\n**Proof becomes governed experience.** The public demo at [`/sovereign-experience-stream-lab.html`](https://montrealai.github.io/goalos-agialpha-sovereign-machine-economy/sovereign-experience-stream-lab.html) shows how a proof run becomes a replayable, reward-governed experience stream for memory, router updates, temporal options, and safer future missions. Browser-local only: no user data, no user funds, no wallet, no transaction, no network call, human review required.\n"
          if readme.exists():
              s = readme.read_text()
              if '## Sovereign Experience Stream Lab V1' not in s:
                  readme.write_text(s.rstrip() + block + '\n')
          idx = Path('public/index.html')
          if idx.exists():
              s = idx.read_text()
              if page not in s:
                  insert = '''\n<section style="max-width:1180px;margin:42px auto;padding:24px;border:1px solid rgba(255,255,255,.14);border-radius:24px;background:rgba(255,255,255,.05)">\n  <p style="color:#ffe985;font-weight:900;letter-spacing:.22em;text-transform:uppercase">New public demo</p>\n  <h2 style="font-size:clamp(32px,5vw,68px);line-height:.95;margin:0 0 12px">Proof becomes governed experience.</h2>\n  <p style="color:#cbd6f0;max-width:820px;font-size:18px;line-height:1.6">Run a browser-local experience cycle and watch proof become memory, reward governance, router update proposals, temporal options, and safer future missions.</p>\n  <p><a href="sovereign-experience-stream-lab.html" style="display:inline-block;padding:13px 18px;border-radius:999px;background:#ffe985;color:#06101a;font-weight:900;text-decoration:none">Open Sovereign Experience Stream Lab</a></p>\n</section>\n'''
                  s = s.replace('</main>', insert + '</main>') if '</main>' in s else s + insert
                  idx.write_text(s)
          sp = Path('public/search-index.json')
          items = []
          if sp.exists():
              try:
                  items = json.loads(sp.read_text())
              except Exception:
                  items = []
          if isinstance(items, dict):
              items = items.get('items', [])
          if not any(isinstance(x, dict) and x.get('url') == page for x in items):
              items.append({'title':'Sovereign Experience Stream Lab','url':page,'description':'Proof becomes governed experience: browser-local GoalOS demo for experience streams, reward ledgers, router updates, temporal options, and human review.'})
          sp.write_text(json.dumps(items, indent=2))
          sm = Path('public/sitemap.xml')
          url = 'https://montrealai.github.io/goalos-agialpha-sovereign-machine-economy/' + page
          if sm.exists():
              ss = sm.read_text()
              if url not in ss:
                  ss = ss.replace('</urlset>', f'<url><loc>{url}</loc></url>\n</urlset>') if '</urlset>' in ss else ss + f'\n{url}\n'
                  sm.write_text(ss)
          else:
              sm.write_text(f'<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"><url><loc>{url}</loc></url></urlset>\n')
          Path('.nojekyll').write_text('')
          PY

      - name: Validate browser JavaScript and run audits
        shell: bash
        run: |
          set -euo pipefail
          node --check public/assets/goalos-experience-stream-lab-v1.js
          python scripts/install_sovereign_experience_stream_lab_v1.py
          python scripts/run_sovereign_experience_stream_lab_v1_demo.py
          python scripts/goalos_sovereign_experience_stream_lab_v1_audit.py

      - name: Commit Sovereign Experience Stream Lab update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public docs examples scripts evidence reports content issue-bodies .github/ISSUE_TEMPLATE README.md .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Sovereign Experience Stream Lab V1"
            git push
          fi

      - name: Create public review issue
        if: ${{ inputs.create_issue == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Review: Sovereign Experience Stream Lab V1';
            const body = require('fs').readFileSync('issue-bodies/sovereign-experience-stream-lab-v1.md','utf8');
            const { data: issues } = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            if (!issues.some(i => i.title === title)) {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['demo','review','user-feedback'] });
            }

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            --title "GoalOS Sovereign Experience Stream Lab V1" \
            --notes "Adds the browser-local Sovereign Experience Stream Lab: Proof becomes governed experience. No user data, no user funds, no wallet, no transaction, no network call, human review required." || \
          gh release edit "$RELEASE_TAG" \
            --title "GoalOS Sovereign Experience Stream Lab V1" \
            --notes "Adds the browser-local Sovereign Experience Stream Lab: Proof becomes governed experience."

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
