name: GoalOS Open-Ended Work Engine Lab V1 — Generate Tasks, Gate Descendants

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages after updating public/"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a tracking issue"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag"
        required: true
        default: "v0.29.0-open-ended-work-engine-lab-v1"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-open-ended-work-engine-lab-v1
  cancel-in-progress: false

jobs:
  open-ended-work-engine-lab:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install GoalOS Open-Ended Work Engine Lab pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64, zipfile
          data = """"""
          pack = Path("goalos-open-ended-work-engine-lab-v1-pack.zip")
          pack.write_bytes(base64.b64decode(data))
          with zipfile.ZipFile(pack, "r") as z:
              z.extractall(".")
          print("Extracted GoalOS Open-Ended Work Engine Lab V1 pack.")
          PY

      - name: Generate page, reports, and demo artifacts
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_open_ended_work_engine_lab_v1.py
          python scripts/run_open_ended_work_engine_lab_v1_demo.py
          python scripts/goalos_open_ended_work_engine_lab_v1_audit.py

      - name: Commit Open-Ended Work Engine Lab
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/open-ended-work-engine.html public/assets/goalos-open-ended-work-engine-v1.css public/assets/goalos-open-ended-work-engine-v1.js \
                  docs/demos/OPEN_ENDED_WORK_ENGINE_LAB_V1.md docs/reviewer/HOW_TO_REVIEW_OPEN_ENDED_WORK_ENGINE_LAB.md \
                  examples/open-ended-work-engine/public-safe-generated-work-scenarios.md \
                  scripts/install_open_ended_work_engine_lab_v1.py scripts/run_open_ended_work_engine_lab_v1_demo.py scripts/goalos_open_ended_work_engine_lab_v1_audit.py \
                  evidence/demo/open-ended-work-engine-lab-v1-reference-docket.json reports/open-ended-work-engine-lab-v1-*.json \
                  content/goalos/open-ended-work-engine-lab-v1.json .github/ISSUE_TEMPLATE/open_ended_work_engine_lab_feedback.yml \
                  issue-bodies/open-ended-work-engine-lab-v1.md README.md public/index.html public/search-index.json public/sitemap.xml public/.nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Open-Ended Work Engine Lab V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh issue list --search "GoalOS Open-Ended Work Engine Lab V1 in:title" --json number --jq '.[0].number' | grep -qE '^[0-9]+'; then
            echo "Tracking issue already exists."
          else
            gh issue create --title "GoalOS Open-Ended Work Engine Lab V1" --body-file issue-bodies/open-ended-work-engine-lab-v1.md --label "demo,proof,website" || true
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --title "GoalOS Open-Ended Work Engine Lab V1" \
              --notes "Adds a browser-local public demo: Generate tasks. Gate descendants. Keep open-endedness tethered to proof."
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
