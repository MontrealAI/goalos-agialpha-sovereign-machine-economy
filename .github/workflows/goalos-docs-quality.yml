name: GoalOS Docs Quality
on:
  workflow_dispatch:
  pull_request:
permissions:
  contents: read
jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python scripts/goalos_docs_quality.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docs-quality
          path: reports/docs-quality.json
