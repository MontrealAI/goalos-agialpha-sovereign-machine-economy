name: GoalOS Docs Quality

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  docs-quality:
    name: Deterministic docs quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run docs quality
        run: python scripts/goalos_docs_quality.py
      - name: Upload docs quality report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docs-quality-report
          path: reports/docs-quality.json
