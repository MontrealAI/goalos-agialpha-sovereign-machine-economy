name: GoalOS Proof Gradient Lab V1 — No Proof, No Evolution

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files back to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages after installation"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a public tracking issue for this demo"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after success"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag when create_release=true"
        required: true
        default: "v0.18.0-proof-gradient-lab-v1"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-proof-gradient-lab-v1-${{ github.ref }}
  cancel-in-progress: false

jobs:
  proof-gradient-lab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install GoalOS Proof Gradient Lab pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64, zipfile
          blob = """"""
          pack = Path('/tmp/goalos-proof-gradient-lab-v1-pack.zip')
          pack.write_bytes(base64.b64decode(blob.encode()))
          with zipfile.ZipFile(pack) as z:
              z.extractall('.')
          PY
          python scripts/install_proof_gradient_lab_v1.py

      - name: Validate Proof Gradient Lab
        shell: bash
        run: |
          set -euo pipefail
          node --check public/assets/goalos-proof-gradient-lab.js
          python scripts/goalos_proof_gradient_lab_v1_audit.py

      - name: Commit Proof Gradient Lab update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md public/proof-gradient-lab.html public/assets/goalos-proof-gradient-lab.css public/assets/goalos-proof-gradient-lab.js docs/demos/PROOF_GRADIENT_LAB_V1.md docs/reviewer/HOW_TO_REVIEW_PROOF_GRADIENT_LAB.md evidence/demo/proof-gradient-lab-v1-reference-docket.json content/goalos/proof-gradient-lab-v1.json reports/proof-gradient-lab-v1-manifest.json reports/proof-gradient-lab-v1-install-report.json reports/proof-gradient-lab-v1-qa.json scripts/install_proof_gradient_lab_v1.py scripts/goalos_proof_gradient_lab_v1_audit.py .github/ISSUE_TEMPLATE/proof_gradient_lab_feedback.yml .nojekyll public/search-index.json public/sitemap.xml public/index.html examples-proof-gradient.txt
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'Add GoalOS Proof Gradient Lab V1'
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          title='Proof Gradient Lab V1 — review, UX feedback, and evidence-gate testing'
          body='This issue tracks public-safe feedback for the new browser-local Proof Gradient Lab. Please do not submit personal, customer, confidential, regulated, wallet, credential, payment, or private data. Review goals: run the lab, toggle gates, verify score cannot bypass hard gates, download the docket, and confirm no data/funds/wallet boundary.'
          if gh issue list --state open --search "$title in:title" --json title --jq '.[].title' | grep -Fx "$title" >/dev/null; then
            echo 'Tracking issue already exists.'
          else
            gh issue create --title "$title" --body "$body" --label 'proof-gradient,public-safe,feedback' || gh issue create --title "$title" --body "$body"
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/goalos-proof-gradient-lab-release.md <<'EOF'
          GoalOS Proof Gradient Lab V1

          Adds a browser-local public demonstration of Aim → Act → Prove → Evolve.

          Highlights:
          - No proof, no evolution.
          - Score is advisory; hard gates are mandatory.
          - Interactive selection gate and proof-flight theatre.
          - Evidence Docket, Selection Certificate, Evolution Ledger Entry, and Proof Card exports.
          - No user data, no user funds, no wallet, no transaction, no network call, no production authority.
          EOF
            gh release create "$RELEASE_TAG" --title 'GoalOS Proof Gradient Lab V1' --notes-file /tmp/goalos-proof-gradient-lab-release.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v4
