jobs:
  final-hardening-v7:
    name: Final hardening, public downloads, QA unification, and Pages deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Final Hardening V7 generator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p scripts
          python -c "import os,base64,pathlib; pathlib.Path('scripts/goalos_final_release_hardening_v7.py').write_bytes(base64.b64decode(os.environ['GOALOS_V7_SCRIPT_B64']))"
          python -S -m py_compile scripts/goalos_final_release_hardening_v7.py

      - name: Run Final Hardening V7
        shell: bash
        run: |
          set -euo pipefail
          python -S scripts/goalos_final_release_hardening_v7.py

      - name: Run unified QA gates
        shell: bash
        run: |
          set -euo pipefail
          python -S scripts/validate_claims.py
          python -S scripts/verify_site.py
          python -S scripts/goalos_docs_quality.py
          if [ -d scripts ] || [ -d src ] || [ -d tests ]; then
            python -S -m compileall -q scripts src tests || python -m compileall -q scripts src tests
          fi
          python -c "import importlib.util, subprocess, sys; spec=importlib.util.find_spec('pytest'); sys.exit(subprocess.call([sys.executable,'-m','pytest','-q']) if spec else 0)"

      - name: Show final hardening report
        shell: bash
        run: |
          set -euo pipefail
          python -c "import json,pathlib; paths=['reports/final-hardening-v7-final-report.json','reports/final-hardening-v7-qa.json','reports/final-hardening-v7-download-health.json','reports/claim-scan.json','reports/site-verification.json','reports/docs-quality.json','evidence/proof-run-001/proof-run-001-final-hardening-v7.json']; [print('\\n###',x,'\\n', pathlib.Path(x).read_text()[:2000] if pathlib.Path(x).exists() else 'missing') for x in paths]"

      - name: Commit hardening changes
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Final hardening V7: artifact export, QA unification, route integrity"
            git push
          fi

      - name: Create review issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          BODY="issue-bodies/final-hardening-v7.md"
          if [ ! -f "$BODY" ]; then
            mkdir -p issue-bodies
            printf '%s\n' '# GoalOS Final Release Hardening V7' '' 'Final release hardening completed. Review public downloads, route integrity, claim scan, docs quality, Proof Run 001, token boundary, and no-data/no-funds boundary.' > "$BODY"
          fi
          gh issue create --title "GoalOS Final Release Hardening V7 — Review Route Integrity + Public Downloads" --label "public-alpha" --label "needs-review" --body-file "$BODY" || true

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          NOTES="reports/final-hardening-v7-final-report.json"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --title "GoalOS Final Release Hardening V7" --notes-file "$NOTES" reports/final-hardening-v7-final-report.json reports/final-hardening-v7-qa.json reports/final-hardening-v7-route-health.json reports/final-hardening-v7-download-health.json reports/claim-scan.json reports/site-verification.json reports/docs-quality.json evidence/proof-run-001/proof-run-001-final-hardening-v7.json evidence/proof-run-001/proof-run-001-final-hardening-v7-claims-matrix.csv evidence/proof-run-001/proof-run-001-final-hardening-v7-validator-packet.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
