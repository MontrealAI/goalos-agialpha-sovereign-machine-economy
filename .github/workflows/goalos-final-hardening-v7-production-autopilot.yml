name: GoalOS Final Hardening V7 — Production Release QA

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated hardening changes to main"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages after hardening"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a review issue with the V7 hardening checklist"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub release after visual approval"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag to use if create_release is true"
        required: true
        default: "v0.32.0-final-hardening-v7"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-final-hardening-v7
  cancel-in-progress: false

