name: GoalOS Proof-Settlement Chronicle Lab V1 — No ProofBundle, No Settlement

'on':
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files back to the repository
        type: boolean
        default: true
      deploy_pages:
        description: Deploy GitHub Pages after updating public files
        type: boolean
        default: true
      create_issue:
        description: Create a tracking issue for public review
        type: boolean
        default: true
      create_release:
        description: Publish a GitHub Release after visual approval
        type: boolean
        default: false
      release_tag:
        description: Release tag to use if create_release is true
        type: string
        default: v0.20.5-proof-settlement-chronicle-lab-v1

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
  actions: read

concurrency:
  group: goalos-proof-settlement-chronicle-lab-v1
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  proof-settlement-chronicle-lab:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
