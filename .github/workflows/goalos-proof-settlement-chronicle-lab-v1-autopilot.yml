      - name: Run installer, demo, audit, and JavaScript syntax check
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_proof_settlement_chronicle_lab_v1.py
          python scripts/run_proof_settlement_chronicle_lab_v1_demo.py
          python scripts/goalos_proof_settlement_chronicle_lab_v1_audit.py
          node --check public/assets/goalos-proof-settlement-chronicle-lab-v1.js

      - name: Commit proof-settlement lab update
        if: ${{ github.event.inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m 'Add GoalOS Proof-Settlement Chronicle Lab V1'
            git push
          fi

      - name: Create proof-settlement review issue
        if: ${{ github.event.inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          title='Review GoalOS Proof-Settlement Chronicle Lab V1'
          if gh issue list --state open --search "$title in:title" --json number --jq '.[0].number' | grep -q '[0-9]'; then
            echo "Tracking issue already exists."
          else
            gh issue create               --title "$title"               --label proof-settlement               --label demo               --body-file issue-bodies/proof-settlement-chronicle-lab-v1.md || true
          fi

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG"               --title 'GoalOS Proof-Settlement Chronicle Lab V1'               --notes 'Adds the browser-local proof-settlement demo: No ProofBundle, no settlement. Simulation-only. No user data, no user funds, no wallet, no transaction, no network call, human review required.'
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
