        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

