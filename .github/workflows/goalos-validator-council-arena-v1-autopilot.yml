        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_validator_council_arena_v1_demo.py
          python -m py_compile scripts/install_validator_council_arena_v1.py scripts/run_validator_council_arena_v1_demo.py scripts/goalos_validator_council_arena_v1_audit.py
          python scripts/goalos_validator_council_arena_v1_audit.py
      - name: Commit Validator Council Arena update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github/ISSUE_TEMPLATE issue-bodies || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Validator Council Arena V1"
            git push
          fi
      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f issue-bodies/validator-council-arena-v1.md ]; then
            gh issue create --title "GoalOS Validator Council Arena V1 — review" --body-file issue-bodies/validator-council-arena-v1.md --label "public-alpha" --label "validator-council" || true
          fi
      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
