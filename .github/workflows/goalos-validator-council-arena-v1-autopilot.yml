name: GoalOS Validator Council Arena V1 — Commit, Reveal, Challenge

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files back to the repository"
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages"
        type: boolean
        default: true
      create_issue:
        description: "Create a tracking issue"
        type: boolean
        default: true
      create_release:
        description: "Create a GitHub Release"
        type: boolean
        default: false
      release_tag:
        description: "Release tag"
        type: string
        default: "v0.29.5-validator-council-arena-v1"

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: goalos-validator-council-arena-v1
  cancel-in-progress: false

jobs:
  validator-council-arena:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v5
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Validator Council Arena pack
