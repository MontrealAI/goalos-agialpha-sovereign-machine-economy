      - name: Generate reference artifacts and patch public surfaces
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_proof_to_action_command_room_v1_demo.py
          python scripts/install_proof_to_action_command_room_v1.py
          python scripts/goalos_proof_to_action_command_room_v1_audit.py
          node --check public/assets/goalos-proof-to-action-v1.js

      - name: Commit Proof-to-Action Command Room update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .nojekyll README.md public/proof-to-action-command-room.html public/assets/goalos-proof-to-action-v1.css public/assets/goalos-proof-to-action-v1.js public/index.html public/search-index.json public/sitemap.xml docs/demos/PROOF_TO_ACTION_COMMAND_ROOM_V1.md docs/reviewer/HOW_TO_REVIEW_PROOF_TO_ACTION_COMMAND_ROOM.md examples/proof-to-action/public-safe-scenarios.md scripts/install_proof_to_action_command_room_v1.py scripts/goalos_proof_to_action_command_room_v1_audit.py scripts/run_proof_to_action_command_room_v1_demo.py evidence/demo/proof-to-action-command-room-v1-reference-docket.json reports/proof-to-action-command-room-v1-qa.json reports/proof-to-action-command-room-v1-install-report.json reports/proof-to-action-command-room-v1-demo-run.json reports/proof-to-action-command-room-v1-manifest.json content/goalos/proof-to-action-command-room-v1.json .github/ISSUE_TEMPLATE/proof_to_action_command_room_feedback.yml issue-bodies/proof-to-action-command-room-v1.md
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'Add GoalOS Proof-to-Action Command Room V1'
            git push
          fi

      - name: Create review tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TITLE='Proof-to-Action Command Room V1 review'
          if gh issue list --state open --search "$TITLE in:title" --json title --jq '.[].title' | grep -Fx "$TITLE" >/dev/null; then
            echo 'Issue already exists.'
          else
            gh issue create --title "$TITLE" --body-file issue-bodies/proof-to-action-command-room-v1.md || true
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/proof-to-action-release-notes.md <<'EOF'
          GoalOS Proof-to-Action Command Room V1

          Adds a browser-local public demonstration of the Mission OS loop:
          Objective → Mission Contract → Evidence Docket → Governed Decision State → Action Graph → Chronicle → Capability Package.

          Boundary: no user data, no user funds, no wallet, no transaction, no network call, no production authority, and human review required.
          EOF
            gh release create "$RELEASE_TAG" --title 'GoalOS Proof-to-Action Command Room V1' --notes-file /tmp/proof-to-action-release-notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
