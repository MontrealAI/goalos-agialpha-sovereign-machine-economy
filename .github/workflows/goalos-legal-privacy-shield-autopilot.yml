      - name: Install Legal & Privacy Shield
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_goalos_legal_privacy_shield.py
          python scripts/goalos_legal_privacy_audit.py

      - name: Commit Legal & Privacy Shield
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md PRIVACY.md TERMS.md DISCLAIMER.md DATA_BOUNDARY.md SECURITY.md .nojekyll .github/ISSUE_TEMPLATE .github/pull_request_template.md public docs/legal docs/privacy docs/compliance docs/reviewer docs/release scripts/install_goalos_legal_privacy_shield.py scripts/goalos_legal_privacy_audit.py reports/legal-privacy-shield-qa.json reports/legal-privacy-shield-manifest.json issue-bodies
          if git diff --cached --quiet; then
            echo "No legal/privacy shield changes to commit."
          else
            git commit -m "Add GoalOS legal and privacy shield"
            git push
          fi

      - name: Create legal/privacy review issues
        if: ${{ inputs.create_issues == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          for body in issue-bodies/*.md; do
            title="$(head -n 1 "$body" | sed 's/^# //')"
            if gh issue list --state open --search "$title in:title" --json title -q '.[].title' | grep -Fx "$title" >/dev/null 2>&1; then
              echo "Issue already exists: $title"
            else
              gh issue create --title "$title" --body-file "$body"
            fi
          done

      - name: Create release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ inputs.release_tag }}" >/dev/null 2>&1; then
            echo "Release already exists: ${{ inputs.release_tag }}"
          else
            cat > /tmp/legal_release_notes.md <<'EOF'
          # GoalOS Legal & Privacy Shield

          Adds a public zero-user-data boundary, privacy notice, terms, token/investment boundary, responsible-use page, data-boundary page, security boundary, issue templates, PR template, compliance matrix, and legal/privacy QA report.

          Core rule: GoalOS does not want user data. Do not submit personal, customer, confidential, regulated, credential, or trade-secret data through the public website, GitHub issues, pull requests, demos, Evidence Dockets, or public proof runs.
          EOF
            gh release create "${{ inputs.release_tag }}" --title "GoalOS Legal & Privacy Shield" --notes-file /tmp/legal_release_notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4
