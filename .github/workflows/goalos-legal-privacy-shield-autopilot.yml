name: GoalOS Legal & Privacy Shield — Zero User Data Boundary

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated legal/privacy shield files"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages after updating the public site"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issues:
        description: "Create legal/privacy review tracking issues"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after success"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag for create_release=true"
        required: true
        default: "v0.14.0-legal-privacy-shield"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-legal-privacy-shield-${{ github.ref }}
  cancel-in-progress: false

jobs:
  legal-privacy-shield:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

