name: GoalOS Website Experience OS V2 — Complete Navigation + UX

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated website/navigation updates"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a public tracking issue"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag"
        required: true
        default: "v0.31.1-website-experience-os-v2"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-website-experience-os-v2
  cancel-in-progress: false

jobs:
  website-experience-os-v2:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Extract Website Experience OS V2 pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .goalos-pack
          python - <<'PY'
          import base64, pathlib, zipfile
          data = """"""
          path = pathlib.Path('.goalos-pack/goalos-website-experience-os-v2-pack.zip')
          path.write_bytes(base64.b64decode(data))
          with zipfile.ZipFile(path) as z:
              z.extractall('.')
          PY

      - name: Install Website Experience OS V2
        run: python scripts/install_website_experience_os_v2.py

      - name: Run reference demo artifact
        run: python scripts/run_website_experience_os_v2_demo.py

      - name: Run QA audit
        run: python scripts/goalos_website_experience_os_v2_audit.py

      - name: Commit website navigation update
        if: ${{ github.event.inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add README.md public docs reports content evidence issue-bodies scripts || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Upgrade GoalOS Website Experience OS V2"
            git push
          fi

      - name: Create tracking issue
        if: ${{ github.event.inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f issue-bodies/website-experience-os-v2.md ]; then
            gh issue create --title "GoalOS Website Experience OS V2 — navigation, registry, pathfinder" --body-file issue-bodies/website-experience-os-v2.md || true
          fi

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ github.event.inputs.release_tag }}" \
            --title "GoalOS Website Experience OS V2" \
            --notes "Complete website navigation, homepage consolidation, route registry, role-based Pathfinder, site map, trust boundary, and QA reports. Public-alpha: no user data, no user funds, no wallet, no transaction, human review required." \
            reports/website-experience-os-v2-qa.json \
            reports/website-experience-os-v2-demo-run.json \
            evidence/demo/website-experience-os-v2-reference-docket.json || true

      - name: Upload GitHub Pages artifact
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ github.event.inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
