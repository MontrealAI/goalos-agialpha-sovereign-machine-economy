      - name: Patch README and package scripts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json
          readme = Path('README.md')
          patch = Path('docs/implementation/README_PATCH_CAPABILITY_PARITY_V2.md').read_text(encoding='utf-8')
          text = readme.read_text(encoding='utf-8') if readme.exists() else '# GoalOS AGIALPHA Ascension — Sovereign Machine Economy\n'
          start = '<!-- GOALOS-CAPABILITY-PARITY-V2:START -->'
          end = '<!-- GOALOS-CAPABILITY-PARITY-V2:END -->'
          if start in text and end in text:
              before = text.split(start)[0]
              after = text.split(end)[1]
              text = before + patch + after
          else:
              text = patch + '\n\n' + text
          readme.write_text(text, encoding='utf-8')

          pkg = Path('package.json')
          if pkg.exists():
              data = json.loads(pkg.read_text(encoding='utf-8'))
          else:
              data = {"name": "goalos-agialpha-sovereign-machine-economy", "private": True, "scripts": {}}
          scripts = data.setdefault('scripts', {})
          scripts['capability-parity'] = 'python scripts/run_capability_parity_audit.py'
          scripts['proof-run-001'] = 'python scripts/run_proof_run_001.py'
          scripts['mission-os-demo'] = 'python scripts/run_mission_os_demo.py'
          scripts['aep001'] = 'python scripts/run_aep001_conformance.py'
          data['version'] = data.get('version', '0.11.0-capability-parity-v2')
          pkg.write_text(json.dumps(data, indent=2) + '\n', encoding='utf-8')

          makefile = Path('Makefile')
          m = makefile.read_text(encoding='utf-8') if makefile.exists() else ''
          block = '\n.PHONY: capability-parity proof-run-001 aep001 mission-os-demo\n\ncapability-parity:\n\tpython scripts/run_capability_parity_audit.py\n\nproof-run-001:\n\tpython scripts/run_proof_run_001.py\n\naep001:\n\tpython scripts/run_aep001_conformance.py\n\nmission-os-demo:\n\tpython scripts/run_mission_os_demo.py\n'
          if 'capability-parity:' not in m:
              makefile.write_text(m.rstrip() + '\n' + block, encoding='utf-8')
          PY

      - name: Run implementation tests
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests

      - name: Generate proof, parity, and conformance artifacts
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_aep001_conformance.py
          python scripts/run_mission_os_demo.py
          python scripts/run_coordination_run_001.py
          python scripts/run_proof_run_001.py
          python scripts/run_capability_parity_audit.py

      - name: Validate generated reports
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json
          required = [
              'reports/capability-parity-audit.json',
              'reports/proof-run-001-reference-report.json',
              'reports/aep001-conformance.json',
              'reports/mission-os-demo.json',
              'reports/coordination-run-001.json',
              'evidence/proof-run-001/proof-run-001-docket.json',
              'evidence/proof-run-001/proof-run-001-report.json',
              'public/capability-parity.html',
          ]
          missing = [p for p in required if not Path(p).exists()]
          if missing:
              raise SystemExit('Missing generated files: ' + ', '.join(missing))
          parity = json.loads(Path('reports/capability-parity-audit.json').read_text(encoding='utf-8'))
          proof = json.loads(Path('evidence/proof-run-001/proof-run-001-report.json').read_text(encoding='utf-8'))
          if parity.get('status') != 'passed':
              raise SystemExit('Capability parity did not pass')
          if proof.get('status') != 'passed':
              raise SystemExit('Proof Run 001 reference report did not pass')
          if proof.get('production_authority') or proof.get('external_actions_authorized'):
              raise SystemExit('Boundary failure: production/external authority cannot be true')
          print('Capability parity status:', parity['status'])
          print('Capabilities covered:', parity['capabilities_covered'], '/', parity['capabilities_checked'])
          print('Proof Run 001 status:', proof['status'])
          PY

      - name: Commit implementation parity update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md package.json Makefile src/goalos_ascension scripts tests docs/implementation docs/aep docs/proof-runs schemas public/capability-parity.html evidence/proof-run-001 reports issue-bodies templates
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Implement GoalOS capability parity V2"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_tracking_issue == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = 'Capability Parity V2 — implementation now matches public website surface';
            const body = fs.existsSync('issue-bodies/capability-parity-v2.md')
              ? fs.readFileSync('issue-bodies/capability-parity-v2.md', 'utf8')
              : 'Review GoalOS Capability Parity V2.';
            const issues = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            if (!issues.data.some(issue => issue.title === title)) {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
            }

      - name: Create release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ inputs.release_tag }}'
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists: $TAG"
          else
            cat > /tmp/release-notes.md <<'EOF'
          # GoalOS Capability Parity V2

          This release aligns the repository implementation with the public website surface.

          It adds local reference implementation code for Mission OS, AEP-001 objects, Evidence Docket 6.1, Proof Gradient, Frontier Release Room, Multi-Agent Institution, Proof Run 001, and website-to-code parity audit.

          Boundary: public-alpha reference implementation only. No production authorization, wallet, transaction, mainnet activation, user-fund authorization, achieved AGI/ASI claim, or guaranteed outcome.
          EOF
            gh release create "$TAG" --title "GoalOS Capability Parity V2" --notes-file /tmp/release-notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v4
