name: GoalOS Capability Parity V2 — Code Matches Website

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit implementation parity files back to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages after updating the site"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_tracking_issue:
        description: "Create a public review issue for the parity upgrade"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after success"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag to create when create_release=true"
        required: true
        default: "v0.11.0-capability-parity-v2"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: capability-parity-v2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  capability-parity-v2:
    name: Install and validate implementation parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

