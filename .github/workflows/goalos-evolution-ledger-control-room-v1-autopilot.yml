      - name: Run reference demo and audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_evolution_ledger_control_room_v1_demo.py
          python scripts/goalos_evolution_ledger_control_room_v1_audit.py
          python - <<'PY'
          import json, pathlib
          report = json.loads(pathlib.Path('reports/evolution-ledger-control-room-v1-qa.json').read_text())
          print(json.dumps(report, indent=2))
          if report.get('status') != 'passed':
              raise SystemExit(1)
          PY

      - name: Commit Evolution Ledger Control Room update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add public docs examples scripts evidence reports content .github issue-bodies README.md .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Evolution Ledger Control Room V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue create --title "Review: GoalOS Evolution Ledger Control Room V1" --body-file issue-bodies/evolution-ledger-control-room-v1.md || true

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" --title "GoalOS Evolution Ledger Control Room V1" --notes-file docs/demos/EVOLUTION_LEDGER_CONTROL_ROOM_V1.md || gh release edit "$RELEASE_TAG" --notes-file docs/demos/EVOLUTION_LEDGER_CONTROL_ROOM_V1.md

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
