name: GoalOS Mainnet Contract Atlas V17 — 48 Ethereum Mainnet Contracts

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files to the repository
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: Deploy the updated public/ site to GitHub Pages
        required: true
        type: boolean
        default: true
      create_issue:
        description: Create a tracking issue after installation
        required: true
        type: boolean
        default: true
      create_release:
        description: Create a GitHub Release after visual approval
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag to use when create_release is true
        required: true
        type: string
        default: v0.39.0-mainnet-contract-atlas-v17

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PACK_ZIP: .goalos/packs/goalos-mainnet-contract-atlas-v17-pack.zip

jobs:
  mainnet-contract-atlas:
    name: Install Mainnet Contract Atlas V17
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify pack exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PACK_ZIP"
          ls -lh "$PACK_ZIP"

      - name: Unpack GoalOS Mainnet Contract Atlas pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib, zipfile
          zip_path = pathlib.Path('.goalos/packs/goalos-mainnet-contract-atlas-v17-pack.zip')
          with zipfile.ZipFile(zip_path) as z:
              z.extractall(pathlib.Path.cwd())
          print(f'unpacked {zip_path}')
          PY

      - name: Install Mainnet Contract Atlas V17
        run: python scripts/install_mainnet_contract_atlas_v17.py

      - name: Run deterministic demo
        run: python scripts/run_mainnet_contract_atlas_v17_demo.py

      - name: Audit browser-local safety and artifacts
        run: python scripts/goalos_mainnet_contract_atlas_v17_audit.py

      - name: Commit Mainnet Contract Atlas update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs scripts reports evidence content .github issue-bodies .goalos || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Mainnet Contract Atlas V17"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh issue create               --title "GoalOS Mainnet Contract Atlas V17 — Review"               --body-file issue-bodies/mainnet-contract-atlas-v17.md               --label "website"               --label "contracts"               --label "review" || true
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          if command -v gh >/dev/null 2>&1; then
            gh release create "$tag"               reports/mainnet-contract-atlas-v17-qa.json               reports/mainnet-contract-atlas-v17-route-health.json               reports/mainnet-contract-atlas-v17-demo-run.json               evidence/demo/mainnet-contract-atlas-v17-reference-docket.json               --title "GoalOS Mainnet Contract Atlas V17"               --notes "Browser-local atlas for the 48 GoalOS-created Ethereum Mainnet contracts. No user data, no user funds, no wallet, no transaction, no network call, no production authority. Human review required." || true
          fi
