name: GoalOS Loop Flight Recorder V1 — Restartable Agent Loops

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files to the repository"
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages after generation"
        type: boolean
        default: true
      create_issue:
        description: "Create a tracking issue"
        type: boolean
        default: true
      create_release:
        description: "Create a GitHub Release"
        type: boolean
        default: false
      release_tag:
        description: "Release tag to use if create_release is true"
        type: string
        default: "v0.33.5-loop-flight-recorder-v1"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-loop-flight-recorder-v1
  cancel-in-progress: false

jobs:
  loop-flight-recorder:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.11"

      - name: Decode embedded GoalOS Loop Flight Recorder pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, pathlib, zipfile
          data = """"""
          root = pathlib.Path("_goalos_loop_flight_recorder_v1")
          root.mkdir(exist_ok=True)
          pack = root / "pack.zip"
          pack.write_bytes(base64.b64decode(data))
          with zipfile.ZipFile(pack) as z:
              z.extractall(root / "pack")
          print("Decoded GoalOS Loop Flight Recorder V1 pack.")
          PY

      - name: Install Loop Flight Recorder V1 page and artifacts
        shell: bash
        run: |
          set -euo pipefail
          python _goalos_loop_flight_recorder_v1/pack/scripts/install_loop_flight_recorder_v1.py

      - name: Run deterministic Loop Flight Recorder demo
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_loop_flight_recorder_v1_demo.py

      - name: Audit Loop Flight Recorder V1
        shell: bash
        run: |
          set -euo pipefail
          python scripts/goalos_loop_flight_recorder_v1_audit.py

      - name: Commit Loop Flight Recorder update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md public docs examples evidence reports scripts content .github issue-bodies || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Loop Flight Recorder V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh issue create \
              --title "GoalOS Loop Flight Recorder V1 — review browser-local loop demo" \
              --body-file issue-bodies/loop-flight-recorder-v1.md \
              --label "demo" --label "loop" || true
          else
            echo "GitHub CLI not available; skipping issue."
          fi

      - name: Create release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh release create "${{ inputs.release_tag }}" \
              --title "GoalOS Loop Flight Recorder V1" \
              --notes "Adds browser-local Loop Flight Recorder: restartable agent loops, disk state, trace reading, bottleneck reports, and review artifacts." \
              reports/loop-flight-recorder-v1-qa.json \
              reports/loop-flight-recorder-v1-demo-run.json \
              evidence/demo/loop-flight-recorder-v1-reference-docket.json || true
          else
            echo "GitHub CLI not available; skipping release."
          fi

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0
