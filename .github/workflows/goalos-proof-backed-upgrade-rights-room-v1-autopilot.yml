      - name: Run reference demo and QA audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_proof_backed_upgrade_rights_room_v1_demo.py
          python scripts/goalos_proof_backed_upgrade_rights_room_v1_audit.py

      - name: Commit upgrade rights room
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md .nojekyll public docs examples scripts evidence reports content .github/ISSUE_TEMPLATE issue-bodies || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m 'Add GoalOS Proof-Backed Upgrade Rights Room V1'
            git push
          fi

      - name: Create review issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue create \
            --title "Review: GoalOS Proof-Backed Upgrade Rights Room V1" \
            --body-file issue-bodies/proof-backed-upgrade-rights-room-v1.md \
            --label "public-safe" \
            --label "demo" \
            --label "review" || true

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            --title "GoalOS Proof-Backed Upgrade Rights Room V1" \
            --notes "Adds the browser-local Proof-Backed Upgrade Rights Room: the artifact earns authority only after proof, eval, baseline, scope, canary, rollback, challenge, privacy, and human-review gates pass." || true

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
