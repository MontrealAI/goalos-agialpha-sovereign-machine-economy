name: Legacy prior-layer stub - goalos-proof-backed-upgrade-rights-room-v1-autopilot

on:
  workflow_dispatch:
    inputs:
      acknowledge_legacy_stub:
        description: This prior-layer workflow was replaced by V11 QA because earlier versions risked oversized inline payloads. Type REVIEWED to continue.
        required: true
        default: REVIEWED

permissions:
  contents: read

jobs:
  legacy-notice:
    runs-on: ubuntu-latest
    steps:
      - name: Prior-layer workflow notice
        run: |
          echo "This prior-layer workflow is preserved as a safe stub."
          echo "Use .goalos/packs/*.zip for large generated packs."
          echo "Run goalos-repository-website-excellence-v11.yml for current QA and optional Pages deployment."
          echo "No user data. No user funds. No wallet. No transaction. Human review required."
