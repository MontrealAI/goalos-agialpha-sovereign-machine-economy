          - QA: `reports/institutional-deployment-wedge-v1-qa.json`
          - Reference docket: `evidence/deployment-wedge/institutional-deployment-wedge-v1-reference-docket.json`

          Boundary: no user data, no user funds, no wallet, no transaction, no network call, no production authority, human review required.
          """
          if readme.exists():
              txt = readme.read_text(encoding="utf-8")
              if "GoalOS Institutional Deployment Wedge V1" not in txt:
                  readme.write_text(txt.rstrip() + "\n\n" + block, encoding="utf-8")
          else:
              readme.write_text("# GoalOS AGIALPHA Ascension — Sovereign Machine Economy\n\n" + block, encoding="utf-8")

          # Patch index
          index = PUBLIC / "index.html"
          index_block = """
          <section class="goalos-institutional-wedge-link" style="max-width:1220px;margin:40px auto;padding:28px;border:1px solid rgba(255,255,255,.16);border-radius:24px;background:rgba(255,255,255,.08);color:#fff;">
            <p style="letter-spacing:.24em;text-transform:uppercase;color:#fff17d;font-weight:900;">Institutional deployment wedge</p>
            <h2 style="font-size:clamp(34px,5vw,68px);line-height:.95;margin:0 0 12px;">Start with one workflow. Earn the right to scale.</h2>
            <p style="font-size:18px;max-width:760px;">A browser-local public demo showing how GoalOS turns a repeatable workflow into a proof-backed, canary-ready, rollbackable deployment path.</p>
            <p><a href="institutional-deployment-wedge.html" style="display:inline-block;margin-top:8px;padding:12px 18px;border-radius:999px;background:linear-gradient(90deg,#fff17d,#62ffd4);color:#071018;text-decoration:none;font-weight:900;">Open Deployment Wedge</a></p>
          </section>
          """
          if index.exists():
              txt = index.read_text(encoding="utf-8")
              if "goalos-institutional-wedge-link" not in txt:
                  if "</main>" in txt:
                      txt = txt.replace("</main>", index_block + "\n</main>", 1)
                  elif "</body>" in txt:
                      txt = txt.replace("</body>", index_block + "\n</body>", 1)
                  else:
                      txt += index_block
                  index.write_text(txt, encoding="utf-8")

          # Search index
          search_path = PUBLIC / "search-index.json"
          entry = {
              "title": "Institutional Deployment Wedge",
              "url": "institutional-deployment-wedge.html",
              "description": "Start with one workflow. Earn the right to scale.",
              "tags": ["deployment", "proof", "canary", "rollback", "institution", "adoption"]
          }
          try:
              data = json.loads(search_path.read_text(encoding="utf-8")) if search_path.exists() else []
              if isinstance(data, dict):
                  arr = data.get("items", [])
                  if not any(x.get("url") == entry["url"] for x in arr):
                      arr.append(entry)
                  data["items"] = arr
              elif isinstance(data, list):
                  if not any(x.get("url") == entry["url"] for x in data if isinstance(x, dict)):
                      data.append(entry)
              else:
                  data = [entry]
          except Exception:
              data = [entry]
          search_path.write_text(json.dumps(data, indent=2), encoding="utf-8")

          # Sitemap
          sitemap = PUBLIC / "sitemap.xml"
          url_line = "  <url><loc>https://montrealai.github.io/goalos-agialpha-sovereign-machine-economy/institutional-deployment-wedge.html</loc></url>"
          if sitemap.exists():
              txt = sitemap.read_text(encoding="utf-8")
              if "institutional-deployment-wedge.html" not in txt:
                  if "</urlset>" in txt:
                      txt = txt.replace("</urlset>", url_line + "\n</urlset>")
                  else:
                      txt += "\n" + url_line
                  sitemap.write_text(txt, encoding="utf-8")
          else:
              sitemap.write_text('<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n' + url_line + '\n</urlset>\n', encoding="utf-8")

          (PUBLIC / ".nojekyll").write_text("", encoding="utf-8")

          # Run demo and audit
          exec((SCRIPTS / "run_institutional_deployment_wedge_v1_demo.py").read_text(encoding="utf-8"), {})
          exec((SCRIPTS / "goalos_institutional_deployment_wedge_v1_audit.py").read_text(encoding="utf-8"), {})
          PY
          python scripts/install_institutional_deployment_wedge_v1.py

      - name: Run Institutional Deployment Wedge QA audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/goalos_institutional_deployment_wedge_v1_audit.py

      - name: Commit generated update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add README.md public docs examples evidence reports content issue-bodies scripts || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Institutional Deployment Wedge V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue create \
            --title "GoalOS Institutional Deployment Wedge V1 — Start with one workflow" \
            --body-file issue-bodies/institutional-deployment-wedge-v1.md \
            --label "goalos,proof,website,user-experience" || true

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/goalos-institutional-deployment-wedge-v1-release.md <<'EOF'
          # GoalOS Institutional Deployment Wedge V1

          Start with one workflow. Earn the right to scale.

          This release adds a browser-local public demo showing how a repeatable workflow moves through GoalOSCommit, bounded execution, Evidence Docket, Selection Gate, canary monitoring, and rollbackable expansion.

          Boundary: no user data, no user funds, no wallet, no transaction, no network call, no production authority, human review required.
          EOF
          gh release create "$RELEASE_TAG" \
            --title "GoalOS Institutional Deployment Wedge V1" \
            --notes-file /tmp/goalos-institutional-deployment-wedge-v1-release.md || \
          gh release edit "$RELEASE_TAG" \
            --title "GoalOS Institutional Deployment Wedge V1" \
            --notes-file /tmp/goalos-institutional-deployment-wedge-v1-release.md

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
