isplay:grid;gap:10px;margin-top:20px}.download-stack button{background:rgba(255,255,255,.12);color:#fff;padding:12px 14px}.explain{width:min(1220px,calc(100% - 32px));margin:28px auto 70px;border-radius:26px;padding:32px;display:grid;grid-template-columns:1fr .8fr;gap:34px}.explain h2{font-size:clamp(32px,5vw,72px);line-height:.92;letter-spacing:-.055em;margin:0 0 14px}.explain p{font-size:18px;color:#eaf0ff;font-weight:700}.law{border:1px solid rgba(98,255,212,.28);border-radius:20px;padding:22px;background:rgba(98,255,212,.08)}.law b{display:block;color:#fff17d;letter-spacing:.24em;text-transform:uppercase;margin-bottom:12px}.law code{display:block;white-space:pre-wrap;color:#62ffd4;font-weight:900;font-size:16px}footer{width:min(1220px,calc(100% - 32px));margin:0 auto 42px;color:#aebbd5;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-weight:800}@media(max-width:980px){.hero,.workspace,.explain{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.topbar{align-items:flex-start;flex-direction:column}h1{font-size:62px}.panel{min-height:auto}.insight{grid-template-columns:1fr}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{scroll-behavior:auto!important;animation:none!important;transition:none!important}}"""

          JS = """(() => {
            const $ = (id) => document.getElementById(id);
            const scenarios = {
              repo: {
