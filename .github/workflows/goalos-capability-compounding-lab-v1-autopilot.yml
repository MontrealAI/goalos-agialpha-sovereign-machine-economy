      - name: Run reference demo and QA audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_capability_compounding_lab_v1_demo.py
          python scripts/goalos_capability_compounding_lab_v1_audit.py

      - name: Commit Capability Compounding Lab update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md public docs examples scripts evidence reports content .github issue-bodies .nojekyll
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'Add GoalOS Capability Compounding Lab V1'
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TITLE='GoalOS Capability Compounding Lab V1 — review and polish'
          if gh issue list --state open --search "$TITLE in:title" --json title --jq '.[].title' | grep -Fx "$TITLE" >/dev/null; then
            echo 'Tracking issue already exists.'
          else
            gh issue create --title "$TITLE" --body-file issue-bodies/capability-compounding-lab-v1.md --label demo --label user-feedback || gh issue create --title "$TITLE" --body-file issue-bodies/capability-compounding-lab-v1.md
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/release_notes.md <<'EOF'
          GoalOS Capability Compounding Lab V1

          Public browser-local demonstration: verified work becomes reusable capability.

          Adds:
          - capability-compounding-lab.html
          - dynamic compounding flywheel
          - Evidence Docket download
          - Capability Package download
          - Chronicle Entry download
          - Compounding report and proof card
          - strict no-data / no-funds / no-wallet / no-network boundary
          EOF
            gh release create "$RELEASE_TAG" --title 'GoalOS Capability Compounding Lab V1' --notes-file /tmp/release_notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
