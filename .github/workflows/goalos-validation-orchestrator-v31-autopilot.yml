name: GoalOS Validation Orchestrator V31 — Human or AGI Node

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files to the repository
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: Deploy updated public/ site to GitHub Pages
        required: true
        type: boolean
        default: true
      create_issue:
        description: Create a tracking issue after installation
        required: true
        type: boolean
        default: true
      create_release:
        description: Create a GitHub Release after visual approval
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag to use when create_release is true
        required: true
        type: string
        default: v0.51.0-validation-orchestrator-v31

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PACK_ZIP: .goalos/packs/goalos-validation-orchestrator-v31-pack.zip

jobs:
  validation-orchestrator:
    name: Install Validation Orchestrator V31
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Verify pack exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PACK_ZIP"
          ls -lh "$PACK_ZIP"
      - name: Unpack Validation Orchestrator pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import zipfile
          z=Path('.goalos/packs/goalos-validation-orchestrator-v31-pack.zip')
          with zipfile.ZipFile(z) as archive:
              archive.extractall(Path.cwd())
          print(f'unpacked {z}')
          PY
      - name: Install Validation Orchestrator V31
        run: python scripts/install_validation_orchestrator_v31.py
      - name: Run deterministic demo
        run: python scripts/run_validation_orchestrator_v31_demo.py
      - name: Audit browser-local safety and route integrity
        run: python scripts/goalos_validation_orchestrator_v31_audit.py
      - name: Commit Validation Orchestrator update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github issue-bodies .goalos || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Validation Orchestrator V31"
            git push
          fi
      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue create --title "GoalOS Validation Orchestrator V31 — Review" --body-file issue-bodies/validation-orchestrator-v31.md --label "validation" --label "review" --label "demo" || true
      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          gh release create "$tag" reports/validation-orchestrator-v31-install-report.json reports/validation-orchestrator-v31-qa.json reports/validation-orchestrator-v31-demo-run.json evidence/demo/validation-orchestrator-v31-reference-docket.json --title "GoalOS Validation Orchestrator V31" --notes "Human or AGI Node can validate. Browser-local, no user data, no funds, no wallet, no transaction, no network call, human escalation for high-impact outcomes." || true
