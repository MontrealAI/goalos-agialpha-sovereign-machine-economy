name: GoalOS Validation Control Tower V33 — Human or AGI Node

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files to the repository
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: Deploy the updated public/ site to GitHub Pages
        required: true
        type: boolean
        default: true
      create_issue:
        description: Create a tracking issue after installation
        required: true
        type: boolean
        default: true
      create_release:
        description: Create a GitHub Release after visual approval
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag to use when create_release is true
        required: true
        type: string
        default: v0.53.0-validation-control-tower-v33

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PACK_ZIP: .goalos/packs/goalos-validation-control-tower-v33-pack.zip

jobs:
  validation-control-tower:
    name: Install GoalOS Validation Control Tower V33
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify pack exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PACK_ZIP"
          ls -lh "$PACK_ZIP"

      - name: Unpack Validation Control Tower pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import zipfile, pathlib
          p = pathlib.Path('.goalos/packs/goalos-validation-control-tower-v33-pack.zip')
          with zipfile.ZipFile(p) as z:
              z.extractall(pathlib.Path.cwd())
          print(f'unpacked {p}')
          PY

      - name: Install Validation Control Tower
        run: python scripts/install_validation_control_tower_v33.py

      - name: Run deterministic demo
        run: python scripts/run_validation_control_tower_v33_demo.py

      - name: Audit browser-local safety and routes
        run: python scripts/goalos_validation_control_tower_v33_audit.py

      - name: Commit Validation Control Tower update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs examples scripts reports evidence content .github issue-bodies .goalos || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Validation Control Tower V33"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh issue create --title "GoalOS Validation Control Tower V33 — Review" --body-file issue-bodies/validation-control-tower-v33.md --label "demo" --label "validation" --label "review" || true
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          if command -v gh >/dev/null 2>&1; then
            gh release create "$tag" reports/validation-control-tower-v33-qa.json reports/validation-control-tower-v33-demo-run.json reports/validation-control-tower-v33-install-report.json evidence/demo/validation-control-tower-v33-reference-docket.json --title "GoalOS Validation Control Tower V33" --notes "Human or AGI Node can validate. Browser-local, no data, no funds, no wallet, no transaction." || true
          fi
