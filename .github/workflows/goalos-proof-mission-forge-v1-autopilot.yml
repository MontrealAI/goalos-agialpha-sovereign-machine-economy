name: GoalOS Proof Mission Forge V1 — Turn Objective Into Docket

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated website/repository files"
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy GitHub Pages after update"
        type: boolean
        default: true
      create_issue:
        description: "Create a public tracking issue"
        type: boolean
        default: true
      create_release:
        description: "Create/update a GitHub Release"
        type: boolean
        default: false
      release_tag:
        description: "Release tag to use if create_release is true"
        type: string
        default: "v0.23.0-proof-mission-forge-v1"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
  actions: read

concurrency:
  group: goalos-proof-mission-forge-v1
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  proof-mission-forge:
    name: Install Proof Mission Forge, audit, commit, and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

