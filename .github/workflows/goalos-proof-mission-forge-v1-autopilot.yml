      - name: Patch README, homepage, search index, and sitemap
        shell: python
        run: |
          from pathlib import Path
          import json, datetime
          root = Path.cwd()
          section = '''\n\n<!-- GOALOS_PROOF_MISSION_FORGE_V1 -->\n## GoalOS Proof Mission Forge V1 — turn an objective into a proof mission\n\nThe Proof Mission Forge is the public-safe intake bridge from ordinary objectives to GoalOS proof missions. It runs entirely in the browser and generates a Mission Contract, Claims Matrix, Evidence Docket plan, validator packet, and GitHub-ready issue draft.\n\n- Website: [`/proof-mission-forge.html`](https://montrealai.github.io/goalos-agialpha-sovereign-machine-economy/proof-mission-forge.html)\n- Boundary: no user data, no user funds, no wallet, no transaction, no network call, human review required.\n- Purpose: convert public-safe objectives into review-ready proof missions for Proof Run 001 and future mission slots.\n<!-- /GOALOS_PROOF_MISSION_FORGE_V1 -->\n'''
          readme = root / "README.md"
          if readme.exists():
              text = readme.read_text()
              start = text.find("<!-- GOALOS_PROOF_MISSION_FORGE_V1 -->")
              end = text.find("<!-- /GOALOS_PROOF_MISSION_FORGE_V1 -->")
              if start != -1 and end != -1:
                  end += len("<!-- /GOALOS_PROOF_MISSION_FORGE_V1 -->")
                  text = text[:start] + section.strip() + text[end:]
              else:
                  text += section
              readme.write_text(text)
          index = root / "public/index.html"
          if index.exists():
              text = index.read_text()
              card = '''\n<section class="goalos-proof-mission-forge-callout" style="margin:48px auto;padding:28px;border:1px solid rgba(255,255,255,.16);border-radius:28px;background:rgba(255,255,255,.06);max-width:1180px">\n  <p style="letter-spacing:.28em;text-transform:uppercase;color:#ffe879;font-weight:900">New public-safe intake</p>\n  <h2 style="font-size:clamp(34px,5vw,72px);line-height:.95;margin:.2em 0">Turn an objective into a proof mission.</h2>\n  <p style="font-size:20px;line-height:1.5;color:#dfe8ff">The GoalOS Proof Mission Forge runs entirely in the browser and generates a Mission Contract, Claims Matrix, Evidence Docket plan, validator packet, and GitHub-ready issue draft. No user data. No user funds. No wallet. No transaction.</p>\n  <p><a href="proof-mission-forge.html" style="display:inline-block;padding:14px 22px;border-radius:999px;background:#ffe879;color:#08101c;font-weight:900;text-decoration:none">Open Proof Mission Forge</a></p>\n</section>\n'''
              if "proof-mission-forge.html" not in text:
                  if "</main>" in text:
                      text = text.replace("</main>", card + "\n</main>", 1)
                  elif "</body>" in text:
                      text = text.replace("</body>", card + "\n</body>", 1)
                  else:
                      text += card
                  index.write_text(text)
          search = root / "public/search-index.json"
          item = {
              "title": "Proof Mission Forge",
              "url": "proof-mission-forge.html",
              "description": "Turn a public-safe objective into a Mission Contract, Claims Matrix, Evidence Docket plan, validator packet, and GitHub-ready issue draft."
          }
          if search.exists():
              try:
                  data = json.loads(search.read_text())
                  if isinstance(data, list):
                      data = [x for x in data if x.get("url") != item["url"]] + [item]
                      search.write_text(json.dumps(data, indent=2))
              except Exception:
                  pass
          else:
              search.parent.mkdir(parents=True, exist_ok=True)
              search.write_text(json.dumps([item], indent=2))
          sitemap = root / "public/sitemap.xml"
          url = "https://montrealai.github.io/goalos-agialpha-sovereign-machine-economy/proof-mission-forge.html"
          now = datetime.datetime.now(datetime.UTC).date().isoformat()
          if sitemap.exists():
              text = sitemap.read_text()
              if "proof-mission-forge.html" not in text:
                  entry = f"\n  <url><loc>{url}</loc><lastmod>{now}</lastmod></url>\n"
                  text = text.replace("</urlset>", entry + "</urlset>") if "</urlset>" in text else text + entry
                  sitemap.write_text(text)
          else:
              sitemap.parent.mkdir(parents=True, exist_ok=True)
              sitemap.write_text(f'''<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n  <url><loc>{url}</loc><lastmod>{now}</lastmod></url>\n</urlset>\n''')
          (root / ".nojekyll").write_text("")

      - name: Run installer, demo, JavaScript syntax check, and audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/install_proof_mission_forge_v1.py
          python scripts/run_proof_mission_forge_v1_demo.py
          node --check public/assets/goalos-proof-mission-forge-v1.js
          python scripts/goalos_proof_mission_forge_v1_audit.py
          python - <<'PY'
          import json
          qa=json.load(open("reports/proof-mission-forge-v1-qa.json"))
          assert qa["status"] == "passed", qa
          print("GoalOS Proof Mission Forge V1 QA passed.")
          PY

      - name: Commit Proof Mission Forge update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github issue-bodies .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Proof Mission Forge V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue create \
            --title "GoalOS Proof Mission Forge V1 — public-safe mission intake review" \
            --label "proof-mission" \
            --label "public-alpha" \
            --body-file issue-bodies/proof-mission-forge-v1.md || true

      - name: Create or update GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          BODY_FILE=/tmp/goalos-proof-mission-forge-v1-release.md
          cat > "$BODY_FILE" <<'EOF'
          GoalOS Proof Mission Forge V1 adds the browser-local intake bridge from public-safe objective to Mission Contract, Claims Matrix, Evidence Docket plan, validator packet, and GitHub-ready issue draft.

          Boundary: no user data, no user funds, no wallet, no transaction, no network call, human review required.
          EOF
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "GoalOS Proof Mission Forge V1" --notes-file "$BODY_FILE"
          else
            gh release create "$RELEASE_TAG" --title "GoalOS Proof Mission Forge V1" --notes-file "$BODY_FILE"
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5
