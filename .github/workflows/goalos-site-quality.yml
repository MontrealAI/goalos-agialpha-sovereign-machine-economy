name: GoalOS Site Quality

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  site-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run site quality checks
        run: python scripts/goalos_site_quality.py
      - name: Upload site quality reports
        uses: actions/upload-artifact@v4
        with:
          name: goalos-site-quality-reports
          path: |
            reports/site-quality.json
            reports/site-route-health.json
