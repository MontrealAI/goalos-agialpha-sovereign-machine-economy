name: GoalOS Site Quality
on:
  workflow_dispatch:
  pull_request:
permissions:
  contents: read
jobs:
  site-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python scripts/verify_site.py
      - run: python scripts/goalos_site_quality.py
      - run: python scripts/goalos_public_downloads.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: site-quality
          path: reports/*.json
