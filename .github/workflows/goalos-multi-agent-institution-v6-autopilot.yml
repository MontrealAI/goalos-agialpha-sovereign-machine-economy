name: GoalOS Multi-Agent Institution V6 — Not a Swarm, An Institution

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files back to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages after updating the page"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issue:
        description: "Create a review/tracking issue"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag"
        required: true
        default: "v0.17.0-multi-agent-institution-v6"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-multi-agent-institution-v6-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  multi-agent-institution-v6:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Multi-Agent Institution V6 pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64, zipfile
          blob = """"""
          path = Path('goalos-multi-agent-institution-v6-pack.zip')
          path.write_bytes(base64.b64decode(blob))
          with zipfile.ZipFile(path) as z:
              z.extractall('.')
          print('Extracted Multi-Agent Institution V6 pack')
          PY
          python scripts/install_multi_agent_institution_v6.py

      - name: Run demo artifact generator and QA audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_multi_agent_institution_v6_demo.py
          python -m py_compile scripts/install_multi_agent_institution_v6.py scripts/run_multi_agent_institution_v6_demo.py scripts/goalos_multi_agent_institution_v6_audit.py
          node --check public/assets/goalos-institution-v6.js
          python scripts/goalos_multi_agent_institution_v6_audit.py

      - name: Commit Multi-Agent Institution V6 update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public/multi-agent-institution.html public/assets/goalos-institution-v6.css public/assets/goalos-institution-v6.js public/index.html public/search-index.json public/sitemap.xml docs/institution scripts reports content/goalos examples/institution issue-bodies .github/ISSUE_TEMPLATE/multi_agent_institution_feedback.yml evidence/demo .nojekyll || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m 'Upgrade Multi-Agent Institution to browser-local V6 experience'
            git push
          fi

      - name: Create review issue
        if: ${{ inputs.create_issue == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh issue list --state open --search "Multi-Agent Institution V6 review" --json title --jq '.[].title' | grep -F "Multi-Agent Institution V6 review" >/dev/null; then
            echo "Tracking issue already exists."
          else
            gh issue create --title "Multi-Agent Institution V6 review" --body-file issue-bodies/multi-agent-institution-v6.md --label "multi-agent-institution,review,public-safe" || gh issue create --title "Multi-Agent Institution V6 review" --body-file issue-bodies/multi-agent-institution-v6.md
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/goalos_multi_agent_institution_v6_release.md <<'EOF'
          GoalOS Multi-Agent Institution V6

          - Upgrades public/multi-agent-institution.html into a browser-local interactive institution lab.
          - Adds Executive and Technical modes.
          - Adds proof flight theatre, swarm comparator, dynamic metrics, stress mode, and download-ready Evidence Docket / review brief / capability package.
          - Adds no-data/no-funds browser-local safety boundary.
          - Adds docs, audit report, demo artifact generator, and public-safe feedback issue template.
          EOF
            gh release create "$RELEASE_TAG" --title "GoalOS Multi-Agent Institution V6" --notes-file /tmp/goalos_multi_agent_institution_v6_release.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v5
