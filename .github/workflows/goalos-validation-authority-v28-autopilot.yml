name: GoalOS Validation Authority V28 — Human or AGI Node

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files to the repository
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: Deploy the updated public/ site to GitHub Pages
        required: true
        type: boolean
        default: true
      create_issue:
        description: Create a tracking issue after installation
        required: true
        type: boolean
        default: true
      create_release:
        description: Create a GitHub Release after visual approval
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag to use when create_release is true
        required: true
        type: string
        default: v0.48.0-validation-authority-v28

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PACK_ZIP: .goalos/packs/goalos-validation-authority-v28-pack.zip

jobs:
  validation-authority:
    name: Install Validation Authority
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify pack exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PACK_ZIP"
          ls -lh "$PACK_ZIP"

      - name: Unpack GoalOS Validation Authority pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib, zipfile
          zip_path = pathlib.Path('.goalos/packs/goalos-validation-authority-v28-pack.zip')
          with zipfile.ZipFile(zip_path) as z:
              z.extractall(pathlib.Path.cwd())
          print(f'unpacked {zip_path}')
          PY

      - name: Install validation authority page and navigation
        run: python scripts/install_validation_authority_v28.py

      - name: Run deterministic validation demo
        run: python scripts/run_validation_authority_v28_demo.py

      - name: Audit browser-local safety and required artifacts
        run: python scripts/goalos_validation_authority_v28_audit.py

      - name: Commit Validation Authority update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github issue-bodies .goalos || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Validation Authority V28"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh issue create --title "GoalOS Validation Authority V28 — Review" --body-file issue-bodies/validation-authority-v28.md --label "validation" --label "review" --label "ux" || true
          else
            echo "gh CLI unavailable; skipping issue creation."
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          if command -v gh >/dev/null 2>&1; then
            gh release create "$tag" reports/validation-authority-v28-qa.json reports/validation-authority-v28-demo-run.json reports/validation-authority-v28-install-report.json evidence/demo/validation-authority-v28-reference-docket.json --title "GoalOS Validation Authority V28" --notes "Human or AGI Node validation console. Browser-local. No user data, no funds, no wallet, no transaction, no external call, no production authority." || true
          else
            echo "gh CLI unavailable; skipping release creation."
          fi
