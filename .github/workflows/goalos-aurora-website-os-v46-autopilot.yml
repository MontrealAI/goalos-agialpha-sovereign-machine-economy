name: GoalOS Aurora Website OS V46 — Critic-Grade Colored Website

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files to the repository"
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy updated public/ site to GitHub Pages"
        required: true
        type: boolean
        default: true
      create_issue:
        description: "Create human visual QA issue"
        required: true
        type: boolean
        default: true
      create_release:
        description: "Create GitHub release after human visual approval"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release tag to use when create_release is true"
        required: true
        type: string
        default: "v0.66.0-aurora-website-os-v46"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PACK_ZIP: .goalos/packs/goalos-aurora-website-os-v46-pack.zip

jobs:
  install-audit-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify pack exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PACK_ZIP" || { echo "Missing $PACK_ZIP"; exit 1; }

      - name: Install Aurora Website OS V46
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .goalos/tmp/v46
          mkdir -p .goalos/tmp/v46
          unzip -q "$PACK_ZIP" -d .goalos/tmp/v46
          python3 .goalos/tmp/v46/install_v46.py

      - name: Show V46 audit
        if: always()
        shell: bash
        run: |
          cat reports/aurora-website-os-v46-audit.json || true

      - name: Commit changes
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "actions@github.com"
          git add public reports docs content evidence examples goalos-aurora-website-os-v46-summary.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Ship GoalOS Aurora Website OS V46"
            git push
          fi

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/deploy-pages@v4

      - name: Create human visual QA issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh issue create \
            --title "GoalOS Aurora Website OS V46 — human visual QA" \
            --body "Review index.html, goalos-aurora-command-center.html, visual-flow-proof.html, ux-proof-check.html, site-map.html, search.html, and site-health.html. Confirm colored identity, no overlapping text, readable proof flow, complete navigation, working search, visible boundary, no wallet prompt, no transaction, no backend call, and no user-data form."

      - name: Create release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ inputs.release_tag }}" \
            "$PACK_ZIP" \
            "reports/aurora-website-os-v46-audit.json" \
            "reports/aurora-website-os-v46-qa.json" \
            "evidence/demo/aurora-website-os-v46-reference-docket.json" \
            --title "GoalOS Aurora Website OS V46 — Critic-Grade Colored Website" \
            --notes "GoalOS Aurora Website OS V46: colored command center, complete route navigation, aligned visual proof flow, browser-local mission console, human UX proof check, and preserved public-alpha boundary."
