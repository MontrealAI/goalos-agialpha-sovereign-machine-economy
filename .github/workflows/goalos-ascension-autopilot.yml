name: GoalOS AGIALPHA Ascension — Sovereign Machine Economy Autopilot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "How should Autopilot publish the generated repository?"
        required: true
        default: "direct_commit_and_publish"
        type: choice
        options:
          - direct_commit_and_publish
          - pull_request
          - website_only
          - dry_run
      overwrite_existing_files:
        description: "Overwrite existing scaffold files with the embedded institutional evidence seed?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches: [main]
    paths:
      - "content/**"
      - "docs/**"
      - "standards/**"
      - "schemas/**"
      - "examples/**"
      - "evidence/**"
      - "templates/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "brand/**"
      - "blueprints/**"

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

defaults:
  run:
    shell: bash

concurrency:
  group: goalos-agialpha-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  seed-build-qa:
    name: Seed, build, QA, evidence gate, digest, and package site
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.mode.outputs.should_deploy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve Autopilot mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ github.event.inputs.mode }}"
            OVERWRITE="${{ github.event.inputs.overwrite_existing_files }}"
          else
            MODE="website_only"
            OVERWRITE="false"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "overwrite=$OVERWRITE" >> "$GITHUB_OUTPUT"
          if [[ "$MODE" == "direct_commit_and_publish" || "$MODE" == "website_only" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi
          echo "GoalOS Autopilot mode: $MODE"
          echo "Overwrite scaffold files: $OVERWRITE"

