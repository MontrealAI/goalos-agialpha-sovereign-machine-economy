          overwrite = os.environ.get('GOALOS_OVERWRITE','false').lower() == 'true'
          data = base64.b64decode(''.join(payload.split()))
          with tarfile.open(fileobj=io.BytesIO(data), mode='r:gz') as tar:
              for member in tar.getmembers():
                  if not member.isfile():
                      continue
                  target = Path(member.name)
                  rel = target.as_posix()
                  if target.parts and target.parts[0] == '.git':
                      continue
                  if rel.startswith('.github/workflows/') or rel.startswith('public/') or rel.startswith('reports/'):
                      continue
                  if '__pycache__' in target.parts or '.pytest_cache' in target.parts:
                      continue
                  if target.exists() and not overwrite:
                      continue
                  target.parent.mkdir(parents=True, exist_ok=True)
                  extracted = tar.extractfile(member)
                  if extracted is None:
                      continue
                  target.write_bytes(extracted.read())
          print('GoalOS institutional evidence seed materialized. Workflow files were intentionally not overwritten.')
          PY

      - name: Run proof and evidence QA
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python scripts/build_site.py
          python scripts/verify_site.py
          python scripts/validate_claims.py
          python scripts/validate_repo.py
          python scripts/compute_institutional_scorecard.py
          python scripts/validate_market_evidence.py
          python scripts/compute_proof_velocity.py
          python scripts/generate_evidence_room.py
          python scripts/compute_strategic_evidence_scorecard.py
          python scripts/run_demo_mission.py
          python scripts/hash_artifacts.py
          python -m unittest discover -s tests -t .
          find . -name '__pycache__' -type d -prune -exec rm -rf {} +
          find . -name '*.pyc' -delete

      - name: Configure Git identity
        if: ${{ steps.mode.outputs.mode == 'direct_commit_and_publish' || steps.mode.outputs.mode == 'pull_request' }}
        run: |
          git config user.name "goalos-autopilot[bot]"
          git config user.email "goalos-autopilot[bot]@users.noreply.github.com"

      - name: Commit generated repository and proof reports
        if: ${{ steps.mode.outputs.mode == 'direct_commit_and_publish' }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: materialize GoalOS institutional evidence repository"
            git push
          fi

      - name: Create pull request branch
        if: ${{ steps.mode.outputs.mode == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="goalos-institutional-evidence-autopilot-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: propose GoalOS institutional evidence repository" || true
          git push --set-upstream origin "$BRANCH"
          gh pr create --title "GoalOS AGIALPHA institutional evidence repository seed" --body "Autonomous repository seed generated by GoalOS Autopilot. Review the evidence reports before merging." --base main --head "$BRANCH" || true

      - name: Configure GitHub Pages
        if: ${{ steps.mode.outputs.should_deploy == 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ steps.mode.outputs.should_deploy == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy GitHub Pages
    needs: seed-build-qa
    if: ${{ needs.seed-build-qa.outputs.should_deploy == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
