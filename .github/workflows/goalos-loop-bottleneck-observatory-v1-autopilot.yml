name: GoalOS Loop Bottleneck Observatory V1 — The Bottleneck Always Moves

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated files to the repository"
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: "Deploy the updated public/ site to GitHub Pages"
        required: true
        type: boolean
        default: true
      create_issue:
        description: "Create a tracking issue after installation"
        required: true
        type: boolean
        default: true
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        type: boolean
        default: false
      release_tag:
        description: "Release tag to use when create_release is true"
        required: true
        type: string
        default: "v0.33.6-loop-bottleneck-observatory-v1"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PACK_ZIP: .goalos-loop-bottleneck-observatory-v1-pack.zip

jobs:
  loop-bottleneck-observatory:
    name: Install Loop Bottleneck Observatory
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Unpack GoalOS Loop Bottleneck Observatory pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, pathlib, zipfile
          data = """"""
          zip_path = pathlib.Path("${{ env.PACK_ZIP }}")
          zip_path.write_bytes(base64.b64decode(data))
          with zipfile.ZipFile(zip_path) as z:
              z.extractall(pathlib.Path.cwd())
          print(f"unpacked {zip_path}")
          PY

      - name: Install page, docs, registry, and reports
        run: python scripts/install_loop_bottleneck_observatory_v1.py

      - name: Run deterministic demo
        run: python scripts/run_loop_bottleneck_observatory_v1_demo.py

      - name: Audit browser-local safety and required artifacts
        run: python scripts/goalos_loop_bottleneck_observatory_v1_audit.py

      - name: Commit Loop Bottleneck Observatory update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content .github issue-bodies || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add GoalOS Loop Bottleneck Observatory V1"
            git push
          fi

      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh issue create               --title "GoalOS Loop Bottleneck Observatory V1 — Review"               --body-file issue-bodies/loop-bottleneck-observatory-v1.md               --label "demo,loop,review" || true
          else
            echo "gh CLI unavailable; skipping issue creation."
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          if command -v gh >/dev/null 2>&1; then
            gh release create "$tag"               reports/loop-bottleneck-observatory-v1-qa.json               reports/loop-bottleneck-observatory-v1-demo-run.json               reports/loop-bottleneck-observatory-v1-install-report.json               evidence/demo/loop-bottleneck-observatory-v1-reference-docket.json               --title "GoalOS Loop Bottleneck Observatory V1"               --notes "Browser-local public demo: the bottleneck always moves. No user data, no user funds, no wallet, no transaction, human review required." || true
          else
            echo "gh CLI unavailable; skipping release creation."
          fi
