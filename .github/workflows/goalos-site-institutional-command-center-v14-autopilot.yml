name: GoalOS Site Institutional Command Center V14 — Complete UX + Navigation

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated files to the repository
        required: true
        type: boolean
        default: true
      deploy_pages:
        description: Deploy the updated public/ site to GitHub Pages
        required: true
        type: boolean
        default: true
      create_issue:
        description: Create a tracking issue after installation
        required: true
        type: boolean
        default: true
      create_release:
        description: Create a GitHub Release after visual approval
        required: true
        type: boolean
        default: false
      release_tag:
        description: Release tag to use when create_release is true
        required: true
        type: string
        default: v0.36.0-site-institutional-command-center-v14

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  PACK_ZIP: .goalos/packs/goalos-site-institutional-command-center-v14-pack.zip

jobs:
  site-command-center-v14:
    name: Install Site Institutional Command Center V14
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Configure Pages
        if: ${{ inputs.deploy_pages }}
        uses: actions/configure-pages@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Verify V14 pack exists
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PACK_ZIP"
          ls -lh "$PACK_ZIP"
      - name: Unpack V14 pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib, zipfile
          zip_path = pathlib.Path('.goalos/packs/goalos-site-institutional-command-center-v14-pack.zip')
          with zipfile.ZipFile(zip_path) as z:
              z.extractall(pathlib.Path.cwd())
          print(f'unpacked {zip_path}')
          PY
      - name: Install complete UX, navigation, registry, and site health
        run: python scripts/install_site_institutional_command_center_v14.py
      - name: Run deterministic V14 demo
        run: python scripts/run_site_institutional_command_center_v14_demo.py
      - name: Audit V14 browser-local safety and route integrity
        run: python scripts/goalos_site_institutional_command_center_v14_audit.py
      - name: Commit V14 update
        if: ${{ inputs.commit_changes }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs reports evidence content scripts .github issue-bodies .goalos || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Upgrade GoalOS Site Institutional Command Center V14"
            git push
          fi
      - name: Create tracking issue
        if: ${{ inputs.create_issue }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v gh >/dev/null 2>&1; then
            gh issue create \
              --title "GoalOS Site Institutional Command Center V14 — Review" \
              --body-file issue-bodies/site-institutional-command-center-v14.md \
              --label "website" \
              --label "ux" \
              --label "review" || true
          fi
      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          if command -v gh >/dev/null 2>&1; then
            gh release create "$tag" \
              reports/site-institutional-command-center-v14-qa.json \
              reports/site-institutional-command-center-v14-route-health.json \
              reports/site-institutional-command-center-v14-report.json \
              evidence/demo/site-institutional-command-center-v14-reference-docket.json \
              --title "GoalOS Site Institutional Command Center V14" \
              --notes "Complete UX + navigation + command center. Preserves prior work, repairs stale framing, restores route discoverability, and keeps no-data/no-funds/no-wallet/human-review boundaries." || true
          fi
