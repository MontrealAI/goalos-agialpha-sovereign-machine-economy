name: GoalOS User Adoption Layer V2 — Usable Institution Upgrade

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit generated user-adoption files back to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages after updating the site"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_issues:
        description: "Create public onboarding / validator / proof-mission issues"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag if create_release=true"
        required: true
        default: "v0.13.0-user-adoption-layer"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: goalos-user-adoption-layer-v2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  user-adoption-layer:
    name: Install User Adoption Layer
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Decode embedded User Adoption Layer pack
