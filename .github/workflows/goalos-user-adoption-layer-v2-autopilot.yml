      - name: Apply user adoption layer and generate reports
        shell: bash
        run: |
          set -euo pipefail
          python scripts/apply_user_adoption_layer.py
          python -m json.tool reports/user-adoption-layer-qa.json >/dev/null
          python -m json.tool reports/evidence-room-index.json >/dev/null
          node --check public/assets/goalos-adoption.js
          echo "User Adoption Layer QA:"
          cat reports/user-adoption-layer-qa.json

      - name: Commit user adoption layer
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs examples .github/ISSUE_TEMPLATE issue-bodies reports scripts templates .nojekyll
          if git diff --cached --quiet; then
            echo "No user-adoption changes to commit."
          else
            git commit -m "Add GoalOS User Adoption Layer V2"
            git push
          fi

      - name: Create onboarding and review issues
        if: ${{ inputs.create_issues == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issues = [
              {
                title: 'User Adoption Layer: Start Here + Evidence Room review',
                body: 'Review the new Start Here, Try GoalOS, Evidence Room, Proof Run 001 Live, Validator Room, Proof Mission Slots, Proof Metrics Dashboard, and Falsification Box pages. Focus: can a non-technical visitor know what to do in under 3 minutes?',
                labels: ['user-adoption','usability']
              },
              {
                title: 'Validator Seats: Evidence Docket and replay reviewers requested',
                body: 'GoalOS is preparing Proof Run 001. Reviewers are invited to inspect Evidence Dockets, replay paths, claim boundaries, cost/risk ledgers, and validator reports. The ask is adversarial review, not endorsement.',
                labels: ['validator-review','evidence']
              },
              {
                title: 'Founding Proof Mission Slots: propose a bounded public-safe mission',
                body: 'Propose a bounded public-safe objective for a proof-backed governed decision state. Target outputs: Mission Contract, Claims Matrix, Evidence Docket, Verifier Report, Risk Ledger, Governed Decision State, Chronicle Entry, and Capability Package.',
                labels: ['proof-mission','pilot']
              }
            ];
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            for (const item of issues) {
              if (!existing.some(issue => issue.title === item.title)) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: item.title,
                  body: item.body,
                  labels: item.labels
                });
              }
            }

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/release_notes.md <<'EOF'
          GoalOS User Adoption Layer V2

          This release adds the usability layer that turns the spectacular public-alpha launch into a usable institution:

          - Start Here
          - Try GoalOS
          - Evidence Room
          - Proof Run 001 Live
          - Validator Room
          - Proof Mission Slots
          - Proof Metrics Dashboard
          - What GoalOS Does / Does Not Do
          - Glossary
          - Run Locally
          - Reviewer Path
          - Falsification Box
          - Reviewer and pilot docs
          - User-friendly examples
          - GitHub issue forms
          - Evidence Room index and QA reports

          Boundary remains: no wallet, no transaction, no external action, no production authorization, no achieved AGI/ASI claim, human review required.
          EOF
            gh release create "$RELEASE_TAG" --title "GoalOS User Adoption Layer V2" --notes-file /tmp/release_notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4
