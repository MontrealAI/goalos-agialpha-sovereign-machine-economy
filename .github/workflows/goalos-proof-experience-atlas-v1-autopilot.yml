name: GoalOS Proof Experience Atlas V1 — Unified Public Demo Journey

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: Commit generated Atlas files to the repository
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      deploy_pages:
        description: Deploy GitHub Pages after update
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      create_issue:
        description: Create a public review issue
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      create_release:
        description: Create a GitHub Release after visual approval
        required: true
        default: 'false'
        type: choice
        options: ['true','false']
      release_tag:
        description: Release tag to use if create_release is true
        required: true
        default: v0.22.5-proof-experience-atlas-v1

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: goalos-proof-experience-atlas-v1
  cancel-in-progress: false

jobs:
  proof-experience-atlas:
    name: Install Proof Experience Atlas, QA, commit, and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

