      - name: Run demo artifact generator and QA audit
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_proof_experience_atlas_v1_demo.py
          python scripts/goalos_proof_experience_atlas_v1_audit.py
          python -m json.tool reports/proof-experience-atlas-v1-qa.json >/dev/null
          python -m json.tool reports/proof-experience-atlas-v1-demo-run.json >/dev/null

      - name: Commit Atlas update
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-autopilot"
          git config user.email "goalos-autopilot@users.noreply.github.com"
          git add README.md public docs examples scripts evidence reports content issue-bodies .github/ISSUE_TEMPLATE .nojekyll
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m 'Add GoalOS Proof Experience Atlas V1'
            git push
          fi

      - name: Create public review issue
        if: ${{ inputs.create_issue == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh issue create             --title "Review: GoalOS Proof Experience Atlas V1"             --body-file issue-bodies/proof-experience-atlas-v1.md             --label "proof-experience-atlas,public-safe,review" || true

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG"             --title 'GoalOS Proof Experience Atlas V1'             --notes-file reports/proof-experience-atlas-v1-qa.json || true

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v5
