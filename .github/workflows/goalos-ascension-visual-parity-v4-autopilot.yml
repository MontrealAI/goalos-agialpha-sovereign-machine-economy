name: GoalOS Ascension Visual Parity V4 — Cinematic Master Upgrade

on:
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit upgraded website files back to the repository"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      deploy_pages:
        description: "Deploy GitHub Pages after the upgrade"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      create_release:
        description: "Create a GitHub Release after visual approval"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      create_issues:
        description: "Create public tracking issues for review and Proof Run 001"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag to create when create_release=true"
        required: true
        default: "v0.8.0-ascension-visual-parity-v4"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: ascension-visual-parity-v4-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/configure-pages@v5

