      - name: Validate upgraded website
        shell: bash
        run: |
          set -euo pipefail
          test -f public/index.html
          test -f public/frontier-release-room.html
          test -f public/meta-agentic-alpha-agi.html
          test -f public/agi-alpha-node-v0.html
          test -f public/multi-agent-institution.html
          test -f public/assets/goalos-v4.css
          test -f public/assets/goalos-v4.js
          node --check public/assets/goalos-v4.js
          python - <<'PY'
          from pathlib import Path
          import json
          required = [
            'public/index.html','public/frontier-release-room.html','public/console.html',
            'public/meta-agentic-alpha-agi.html','public/agi-alpha-node-v0.html','public/agi-jobs-v0-v2.html',
            'public/multi-agent-institution.html','public/proof-run-001.html','public/research-spine.html'
          ]
          missing = [p for p in required if not Path(p).exists()]
          if missing:
              raise SystemExit('Missing required pages: ' + ', '.join(missing))
          combined = '\n'.join(Path(p).read_text(encoding='utf-8') for p in required)
          checks = {
              'cinematic_hero': 'Turn AI work into' in combined and 'verified capability' in combined,
              'frontier_release_room': 'Do not argue from authority' in Path('public/frontier-release-room.html').read_text(encoding='utf-8'),
              'dynamic_console': 'Run proof flight' in combined and 'readiness' in combined,
              'meta_agentic_foundry': 'Ascend the institution' in Path('public/meta-agentic-alpha-agi.html').read_text(encoding='utf-8'),
              'claim_boundary': 'No external action' in combined or 'no external authority' in combined.lower()
          }
          failed = [k for k,v in checks.items() if not v]
          if failed:
              raise SystemExit('Visual parity validation failed: ' + ', '.join(failed))
          report = {'status':'passed','version':'ascension-visual-parity-v4','pages_checked':len(required),'checks':checks,'errors':0}
          Path('reports/ascension-visual-parity-v4-validation.json').write_text(json.dumps(report, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(report, indent=2))
          PY

      - name: Commit upgraded files
        if: ${{ inputs.commit_changes == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md public docs/design reports issue-bodies
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Upgrade website to Ascension Visual Parity V4"
            git push
          fi

      - name: Create public tracking issues
        if: ${{ inputs.create_issues == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh issue create --title "Ascension Visual Parity V4 — design QA and approval" --body-file issue-bodies/visual-parity-v4-review.md || true
          gh issue create --title "Proof Run 001 — convert architecture into first public Evidence Docket" --body-file issue-bodies/proof-run-001.md || true
          gh issue create --title "Frontier Release Room — validator review request" --body "Invite review of FRG-001, the release-governance decision theatre, and the public-source case-study framing. Boundary: no legal advice, no model safety certification, no release approval." || true

      - name: Create GitHub Release
        if: ${{ inputs.create_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release already exists: $RELEASE_TAG"
          else
            cat > /tmp/release_notes.md <<'EOF'
          GoalOS Ascension Visual Parity V4

          This release upgrades the public website to match and surpass the flagship GoalOS AGIALPHA Ascension visual language.

          Highlights:
          - Cinematic command-center homepage
          - Premium Frontier Release Room with dynamic readiness score
          - Interactive Proof Console
          - Meta-Agentic Institution Foundry
          - Sovereign Node Theatre
          - Multi-Agent Institution and Coordination Console
          - Proof Run 001 and Holy Grail Candidate pages
          - Research Spine and paper-to-product pages
          - Browser-local proof theatre; no external authority
          EOF
            gh release create "$RELEASE_TAG" --title "GoalOS Ascension Visual Parity V4" --notes-file /tmp/release_notes.md
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == 'true' }}
        uses: actions/deploy-pages@v4
